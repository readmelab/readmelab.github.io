<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 영혼카드 보기 | 나를읽다 연구소</title>
<meta name="description" content="생년월일과 MBTI로 알아보는 나만의 영혼카드. 사주 오행 × 띠 × MBTI 조합으로 960가지 중 단 하나.">

<!-- Open Graph -->
<meta property="og:title" content="내 영혼카드 보기 | 나를읽다">
<meta property="og:description" content="960가지 중 나만의 영혼카드를 무료로 확인하세요">
<meta property="og:image" content="https://audio.readmelab.co.kr/cards/water_dragon.png">
<meta property="og:url" content="https://readmelab.co.kr/free">

<!-- Kakao SDK -->
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --card-bg: #1a1a2e;
    --accent: #c9a96e;
    --accent-light: #e4cc9c;
    --text: #f0ede6;
    --text-dim: #8a8a9a;
    --water: #4a90d9;
    --fire: #d94a4a;
    --wood: #4ad97a;
    --metal: #d9d94a;
    --earth: #d9944a;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 헤더 ── */
  .header {
    text-align: center;
    padding: 60px 20px 30px;
  }

  .header-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 30px;
  }

  .header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* ── 입력 폼 ── */
  .form-section {
    max-width: 420px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  .form-card {
    background: var(--surface);
    border: 1px solid rgba(201, 169, 110, 0.15);
    border-radius: 20px;
    padding: 32px 24px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 14px 16px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.3s;
    -webkit-appearance: none;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--accent);
  }

  .form-row {
    display: flex;
    gap: 12px;
  }

  .form-row .form-group {
    flex: 1;
  }

  .calendar-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .calendar-toggle button {
    flex: 1;
    padding: 10px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .calendar-toggle button.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  .mbti-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .mbti-grid button {
    padding: 10px 0;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
  }

  .mbti-grid button.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  .mbti-grid button:hover {
    border-color: var(--accent);
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #b8943e);
    border: none;
    border-radius: 14px;
    color: var(--bg);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201, 169, 110, 0.3);
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* ── 로딩 ── */
  .loading-section {
    display: none;
    text-align: center;
    padding: 80px 20px;
  }

  .loading-section.show {
    display: block;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(201, 169, 110, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 24px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 16px;
    color: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── 결과 카드 ── */
  .result-section {
    display: none;
    max-width: 420px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .result-section.show {
    display: block;
    animation: fadeUp 0.8s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 카드 캡처 영역 */
  .card-capture {
    position: relative;
    width: 100%;
    aspect-ratio: 9/16;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .card-capture img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 30px 24px 24px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85) 30%);
  }

  .card-element-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .card-element-badge.water { background: var(--water); color: #fff; }
  .card-element-badge.fire { background: var(--fire); color: #fff; }
  .card-element-badge.wood { background: var(--wood); color: #000; }
  .card-element-badge.metal { background: var(--metal); color: #000; }
  .card-element-badge.earth { background: var(--earth); color: #fff; }

  .card-mbti-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    background: rgba(255,255,255,0.15);
    color: #fff;
    margin-left: 8px;
  }

  .card-title-ko {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin: 8px 0 4px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  .card-title-en {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 12px;
    letter-spacing: 1px;
  }

  .card-desc {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(255,255,255,0.85);
  }

  .card-watermark {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
  }

  /* 뒤집기 문구 */
  .flip-section {
    background: var(--surface);
    border: 1px solid rgba(201, 169, 110, 0.15);
    border-radius: 16px;
    padding: 24px;
    margin-top: 20px;
    text-align: center;
  }

  .flip-label {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .flip-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
  }

  /* 버튼들 */
  .action-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .action-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.3s;
  }

  .btn-save {
    background: var(--card-bg);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-share {
    background: #FEE500;
    color: #000;
  }

  .btn-save:hover { border-color: var(--accent); }
  .btn-share:hover { opacity: 0.9; }

  /* CTA */
  .cta-section {
    background: linear-gradient(135deg, rgba(201,169,110,0.1), rgba(201,169,110,0.05));
    border: 1px solid rgba(201, 169, 110, 0.2);
    border-radius: 16px;
    padding: 28px 24px;
    margin-top: 24px;
    text-align: center;
  }

  .cta-text {
    font-size: 15px;
    color: var(--accent-light);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .cta-btn {
    display: inline-block;
    padding: 14px 36px;
    background: linear-gradient(135deg, var(--accent), #b8943e);
    border: none;
    border-radius: 12px;
    color: var(--bg);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s;
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201, 169, 110, 0.3);
  }

  /* 다시하기 */
  .retry-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.3s;
  }

  .retry-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* 에러 */
  .error-msg {
    display: none;
    text-align: center;
    padding: 16px;
    background: rgba(217, 74, 74, 0.1);
    border: 1px solid rgba(217, 74, 74, 0.3);
    border-radius: 12px;
    color: #d94a4a;
    font-size: 14px;
    margin-top: 16px;
  }

  .error-msg.show { display: block; }

  /* 푸터 */
  .footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 12px;
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .birth-selects {
    display: flex;
    gap: 8px;
  }

  .birth-selects select {
    flex: 1;
    padding: 14px 8px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.3s;
    -webkit-appearance: none;
    text-align: center;
  }

  .birth-selects select:focus {
    border-color: var(--accent);
  }
  
</style>
</head>
<body>

<!-- ════════ 헤더 ════════ -->
<div class="header">
  <div class="header-logo">나를읽다 연구소</div>
  <h1>내 영혼카드 보기</h1>
  <p>생년월일과 MBTI만 입력하면<br>960가지 중 당신만의 카드가 나타납니다</p>
</div>

<!-- ════════ 입력 폼 ════════ -->
<div class="form-section" id="formSection">
  <div class="form-card">

    <div class="form-group">
      <label>생년월일</label>
      <div class="birth-selects">
        <select id="birthYear"></select>
        <select id="birthMonth"></select>
        <select id="birthDay"></select>
      </div>
    </div>

    <div class="calendar-toggle">
      <button type="button" class="active" data-cal="양력" onclick="setCalendar(this)">양력</button>
      <button type="button" data-cal="음력" onclick="setCalendar(this)">음력</button>
    </div>

    <div class="form-group">
      <label>성별</label>
      <select id="gender">
        <option value="남">남성</option>
        <option value="여">여성</option>
      </select>
    </div>

    <div class="form-group">
      <label>MBTI</label>
      <div class="mbti-grid" id="mbtiGrid">
        <button type="button" onclick="setMbti(this)">INTJ</button>
        <button type="button" onclick="setMbti(this)">INTP</button>
        <button type="button" onclick="setMbti(this)">ENTJ</button>
        <button type="button" onclick="setMbti(this)">ENTP</button>
        <button type="button" onclick="setMbti(this)">INFJ</button>
        <button type="button" onclick="setMbti(this)">INFP</button>
        <button type="button" onclick="setMbti(this)">ENFJ</button>
        <button type="button" onclick="setMbti(this)">ENFP</button>
        <button type="button" onclick="setMbti(this)">ISTJ</button>
        <button type="button" onclick="setMbti(this)">ISFJ</button>
        <button type="button" onclick="setMbti(this)">ESTJ</button>
        <button type="button" onclick="setMbti(this)">ESFJ</button>
        <button type="button" onclick="setMbti(this)">ISTP</button>
        <button type="button" onclick="setMbti(this)">ISFP</button>
        <button type="button" onclick="setMbti(this)">ESTP</button>
        <button type="button" onclick="setMbti(this)">ESFP</button>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="getMyCard()" disabled>내 영혼카드 확인하기</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- ════════ 로딩 ════════ -->
<div class="loading-section" id="loadingSection">
  <div class="spinner"></div>
  <div class="loading-text">당신의 사주를 읽고 있습니다...</div>
</div>

<!-- ════════ 결과 ════════ -->
<div class="result-section" id="resultSection">

  <!-- 캡처 대상 -->
  <div class="card-capture" id="cardCapture">
    <img id="cardImage" src="" alt="영혼카드" crossorigin="anonymous">
    <div class="card-watermark">나를읽다 연구소</div>
    <div class="card-overlay">
      <span class="card-element-badge" id="cardBadge"></span>
      <span class="card-mbti-badge" id="cardMbti"></span>
      <div class="card-title-ko" id="cardTitleKo"></div>
      <div class="card-title-en" id="cardTitleEn"></div>
      <div class="card-desc" id="cardDesc"></div>
    </div>
  </div>

  <!-- 반전 문구 -->
  <div class="flip-section">
    <div class="flip-label">SOUL MESSAGE</div>
    <div class="flip-text" id="flipText"></div>
  </div>

  <!-- 액션 버튼 -->
  <div class="action-buttons">
    <button class="action-btn btn-save" onclick="saveCard()">카드 저장</button>
    <button class="action-btn btn-share" onclick="shareKakao()">카카오 공유</button>
  </div>

  <!-- CTA -->
  <div class="cta-section">
    <div class="cta-text" id="ctaText"></div>
    <a href="https://readmelab.co.kr" class="cta-btn">전체 리포트 보러가기</a>
  </div>

  <button class="retry-btn" onclick="retry()">다른 생년월일로 다시 해보기</button>
</div>

<!-- ════════ 푸터 ════════ -->
<div class="footer">
  <p>© 2026 <a href="https://readmelab.co.kr">나를읽다 연구소</a>. All rights reserved.</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 설정
// ═══════════════════════════════════════════════════════════
const API_BASE = 'https://naread-server-1075269376260.asia-northeast3.run.app';
const IMG_BASE = 'https://audio.readmelab.co.kr/cards/';

const ELEMENT_NAMES = {
  water: '수(水)', fire: '화(火)', wood: '목(木)',
  metal: '금(金)', earth: '토(土)'
};

// ═══════════════════════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════════════════════
let selectedMbti = '';
let calendarType = '양력';

// ═══════════════════════════════════════════════════════════
// 폼 인터랙션
// ═══════════════════════════════════════════════════════════
function setCalendar(btn) {
  document.querySelectorAll('.calendar-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  calendarType = btn.dataset.cal;
}

function setMbti(btn) {
  document.querySelectorAll('.mbti-grid button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMbti = btn.textContent;
  document.getElementById('submitBtn').disabled = false;
}

// ═══════════════════════════════════════════════════════════
// API 호출
// ═══════════════════════════════════════════════════════════
async function getMyCard() {
  const year = document.getElementById('birthYear').value;
  const month = document.getElementById('birthMonth').value;
  const day = document.getElementById('birthDay').value;
  const gender = document.getElementById('gender').value;

  if (!year || !month || !day || !selectedMbti) {
    showError('생년월일과 MBTI를 모두 입력해주세요.');
    return;
  }

  hideError();
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('loadingSection').classList.add('show');
  document.getElementById('resultSection').classList.remove('show');

  try {
    const response = await fetch(`${API_BASE}/api/free-card`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        birthYear: year,
        birthMonth: month,
        birthDay: day,
        mbti: selectedMbti,
        isLunar: calendarType === '음력',
        gender: gender
      })
    });

    const data = await response.json();

    if (!response.ok || !data.success) {
      throw new Error(data.error || '카드를 찾을 수 없습니다');
    }

    renderCard(data.card, data.spiProperties);

  } catch (err) {
    console.error('에러:', err);
    document.getElementById('loadingSection').classList.remove('show');
    document.getElementById('formSection').style.display = 'block';
    showError(err.message || '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
}

// ═══════════════════════════════════════════════════════════
// 카드 렌더링
// ═══════════════════════════════════════════════════════════
function renderCard(card, spiProps) {
  // 이미지
  const img = document.getElementById('cardImage');
  img.src = IMG_BASE + card.image;

  // 뱃지
  const badge = document.getElementById('cardBadge');
  badge.textContent = ELEMENT_NAMES[card.elementEn] || card.element;
  badge.className = 'card-element-badge ' + card.elementEn;

  // MBTI
  document.getElementById('cardMbti').textContent = card.mbti;

  // 텍스트
  document.getElementById('cardTitleKo').textContent = card.titleKo;
  document.getElementById('cardTitleEn').textContent = card.titleEn;
  document.getElementById('cardDesc').textContent = card.descKo;

  // 반전 문구
  document.getElementById('flipText').textContent = card.flipKo || '';

  // CTA
  document.getElementById('ctaText').textContent = card.cta || '이 카드에 숨겨진 인생 시나리오가 궁금하다면?';

  // UI 전환
  document.getElementById('loadingSection').classList.remove('show');
  document.getElementById('resultSection').classList.add('show');

  // 이미지 로드 대기 (캡처용)
  img.onload = function() {
    console.log('✅ 카드 이미지 로드 완료');
  };
}

// ═══════════════════════════════════════════════════════════
// 카드 저장 (PNG)
// ═══════════════════════════════════════════════════════════
async function saveCard() {
  const el = document.getElementById('cardCapture');

  try {
    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#0a0a0f'
    });

    const link = document.createElement('a');
    link.download = '나의영혼카드_나를읽다.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (err) {
    console.error('저장 실패:', err);
    alert('카드 저장에 실패했습니다. 스크린샷으로 저장해주세요.');
  }
}

function retry() {

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

(function initBirthSelects() {
  const yearEl = document.getElementById('birthYear');
  const monthEl = document.getElementById('birthMonth');
  const dayEl = document.getElementById('birthDay');
  const currentYear = new Date().getFullYear();

  yearEl.innerHTML = '<option value="">년</option>';
  for (let y = currentYear; y >= 1940; y--) {
    yearEl.innerHTML += `<option value="${y}">${y}년</option>`;
  }

  monthEl.innerHTML = '<option value="">월</option>';
  for (let m = 1; m <= 12; m++) {
    const mv = String(m).padStart(2, '0');
    monthEl.innerHTML += `<option value="${mv}">${m}월</option>`;
  }

  function updateDays() {
    const y = parseInt(yearEl.value) || 2000;
    const m = parseInt(monthEl.value) || 1;
    const maxDay = new Date(y, m, 0).getDate();
    const prevDay = dayEl.value;

    dayEl.innerHTML = '<option value="">일</option>';
    for (let d = 1; d <= maxDay; d++) {
      const dv = String(d).padStart(2, '0');
      dayEl.innerHTML += `<option value="${dv}">${d}일</option>`;
    }

    if (parseInt(prevDay) <= maxDay) {
      dayEl.value = prevDay;
    }
  }

  yearEl.addEventListener('change', updateDays);
  monthEl.addEventListener('change', updateDays);
  updateDays();
})();
  
</script>
