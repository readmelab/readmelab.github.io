<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>호왕당 — 본풀이 결과</title>
<meta name="description" content="호왕당 본풀이 — 사주 종합 해석">
<meta property="og:title" content="호왕당 본풀이">
<meta property="og:image" content="https://audio.readmelab.co.kr/howang/door.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0906;--card:#1a1410;--gold:#d4af37;--red:#b4391e;--text:#e8dcc8;--sub:#a89a85;--border:#2a2218;--accent:#c8a84e;--green:#4a7c59;--blue:#4a6a8c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif KR',serif;min-height:100vh;overflow-x:hidden;}
.container{max-width:520px;margin:0 auto;padding:24px 16px 80px;}

/* 로딩 */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s;}
.loading-screen.hide{opacity:0;pointer-events:none;}
.loading-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:16px;color:var(--sub);font-size:14px;}

/* 에러 */
.error-box{text-align:center;padding:60px 20px;}
.error-box h2{color:var(--red);font-size:20px;margin-bottom:12px;}
.error-box p{color:var(--sub);font-size:14px;}
.error-box a{color:var(--gold);text-decoration:underline;}

/* 헤더 */
.result-header{text-align:center;padding:32px 0 24px;border-bottom:1px solid var(--border);}
.result-header h1{font-size:28px;color:var(--gold);letter-spacing:6px;}
.result-header .subtitle{color:var(--sub);font-size:13px;margin-top:8px;}
.user-info{display:flex;justify-content:center;gap:16px;margin-top:12px;font-size:13px;color:var(--sub);}

/* 섹션 공통 */
.section{margin-top:32px;opacity:0;transform:translateY(24px);transition:all .6s ease;}
.section.visible{opacity:1;transform:translateY(0);}
.section-label{font-size:11px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;}
.section-title{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text);}
.section-body{font-size:14px;line-height:2;color:var(--text);word-break:keep-all;}
.divider{height:1px;background:var(--border);margin:32px 0;}

/* 사주 네 기둥 */
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
.pillar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 4px;text-align:center;}
.pillar-label{font-size:10px;color:var(--sub);margin-bottom:6px;}
.pillar-hanja{font-size:22px;color:var(--gold);font-weight:900;}
.pillar-hangul{font-size:11px;color:var(--sub);margin-top:4px;}

/* 오행 게이지 */
.gauge-group{margin:16px 0;}
.gauge-row{display:flex;align-items:center;margin-bottom:8px;}
.gauge-label{width:32px;font-size:12px;color:var(--sub);text-align:right;margin-right:8px;}
.gauge-track{flex:1;height:14px;background:var(--card);border-radius:7px;overflow:hidden;border:1px solid var(--border);}
.gauge-fill{height:100%;border-radius:7px;transition:width 1.2s ease;}
.gauge-fill.wood{background:#4a7c59;}
.gauge-fill.fire{background:#b4391e;}
.gauge-fill.earth{background:#a89a55;}
.gauge-fill.metal{background:#8c8c8c;}
.gauge-fill.water{background:#4a6a8c;}
.gauge-val{width:32px;font-size:11px;color:var(--sub);text-align:left;margin-left:6px;}

/* 키워드 배지 */
.keyword-badge{display:inline-block;background:var(--card);border:1px solid var(--gold);color:var(--gold);padding:6px 16px;border-radius:20px;font-size:13px;margin:8px 0 16px;}

/* 강점/약점 */
.trait-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.trait-label{font-size:11px;color:var(--sub);margin-bottom:4px;}
.trait-text{font-size:14px;color:var(--text);}
.trait-box.strength{border-left:3px solid var(--green);}
.trait-box.weakness{border-left:3px solid var(--red);}

/* 등급 배지 */
.grade-badge{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;font-size:22px;font-weight:900;margin:8px 0 16px;}
.grade-A{background:rgba(212,175,55,.2);color:var(--gold);border:2px solid var(--gold);}
.grade-B{background:rgba(74,124,89,.2);color:var(--green);border:2px solid var(--green);}
.grade-C{background:rgba(168,154,133,.2);color:var(--sub);border:2px solid var(--sub);}
.grade-D{background:rgba(180,57,30,.2);color:var(--red);border:2px solid var(--red);}

/* 점수 바 */
.score-bar-wrap{margin:12px 0 16px;}
.score-bar-header{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:4px;}
.score-bar-track{height:10px;background:var(--card);border-radius:5px;overflow:hidden;border:1px solid var(--border);}
.score-bar-fill{height:100%;border-radius:5px;transition:width 1.2s ease;}

/* 태그 그룹 */
.tag-group{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 16px;}
.tag{background:var(--card);border:1px solid var(--border);color:var(--sub);padding:5px 12px;border-radius:16px;font-size:12px;}
.tag.highlight{border-color:var(--gold);color:var(--gold);}
.tag.warn{border-color:var(--red);color:var(--red);}

/* 10년 그래프 */
.decade-graph{display:flex;align-items:flex-end;gap:12px;height:140px;padding:16px 0;margin:12px 0 16px;}
.decade-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.decade-bar-wrap{width:100%;height:100px;display:flex;align-items:flex-end;justify-content:center;}
.decade-bar{width:28px;border-radius:4px 4px 0 0;transition:height 1.2s ease;min-height:4px;}
.decade-bar.s5{background:var(--gold);}
.decade-bar.s4{background:var(--green);}
.decade-bar.s3{background:var(--sub);}
.decade-bar.s2{background:var(--blue);}
.decade-bar.s1{background:var(--red);}
.decade-label{font-size:9px;color:var(--sub);text-align:center;word-break:keep-all;}
.decade-score{font-size:11px;color:var(--gold);font-weight:700;}
.decade-comment{font-size:10px;color:var(--sub);text-align:center;line-height:1.3;}

/* 연도 카드 */
.year-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0 16px;}
.year-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;}
.year-card .yc-year{font-size:16px;font-weight:700;color:var(--gold);}
.year-card .yc-score{font-size:24px;font-weight:900;margin:6px 0;color:var(--text);}
.year-card .yc-comment{font-size:11px;color:var(--sub);line-height:1.4;}

/* 월 그리드 */
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0 16px;}
.month-cell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center;}
.month-cell .mc-num{font-size:12px;color:var(--sub);}
.month-cell .mc-score{font-size:18px;font-weight:900;margin:4px 0;}
.month-cell .mc-text{font-size:10px;color:var(--sub);line-height:1.3;}
.mc-score.s5{color:var(--gold);}
.mc-score.s4{color:var(--green);}
.mc-score.s3{color:var(--text);}
.mc-score.s2{color:var(--blue);}
.mc-score.s1{color:var(--red);}

/* 처방 카드 */
.rx-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0 16px;}
.rx-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.rx-card .rx-label{font-size:10px;color:var(--sub);margin-bottom:4px;}
.rx-card .rx-value{font-size:16px;font-weight:700;color:var(--gold);}

/* 체크리스트 */
.checklist{margin:16px 0;}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px;}
.check-icon{width:20px;height:20px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gold);flex-shrink:0;}

/* 밀서 */
.secret-box{background:linear-gradient(135deg,rgba(212,175,55,.08),rgba(180,57,30,.08));border:1px solid var(--gold);border-radius:12px;padding:20px;margin:16px 0;position:relative;}
.secret-box::before{content:'密書';position:absolute;top:-10px;left:20px;background:var(--bg);color:var(--gold);padding:0 8px;font-size:12px;letter-spacing:4px;}
.secret-text{font-size:14px;line-height:2;color:var(--text);}

/* CTA */
.cta-section{text-align:center;margin-top:40px;padding:24px 0;border-top:1px solid var(--border);}
.cta-btn{display:inline-block;background:var(--gold);color:var(--bg);padding:14px 28px;border-radius:8px;font-size:15px;font-weight:700;text-decoration:none;letter-spacing:2px;transition:all .3s;}
.cta-btn:hover{background:var(--accent);transform:translateY(-2px);}
.cta-sub{color:var(--sub);font-size:12px;margin-top:8px;}

/* 질문 */
.ask-section{margin-top:32px;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;}
.ask-title{font-size:14px;color:var(--gold);margin-bottom:12px;}
.ask-textarea{width:100%;height:80px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:10px;resize:none;}
.ask-textarea:focus{outline:none;border-color:var(--gold);}
.ask-btn{width:100%;margin-top:10px;padding:12px;background:var(--gold);color:var(--bg);border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.ask-btn:disabled{opacity:.5;cursor:not-allowed;}
.ask-answer{margin-top:12px;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px;line-height:1.8;color:var(--text);display:none;}
.ask-remaining{font-size:11px;color:var(--sub);margin-top:6px;}

/* 스크롤바 */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">본풀이를 불러오고 있습니다…</div>
</div>

<div class="container" id="content" style="display:none;">
  <!-- 헤더 -->
  <div class="result-header">
    <h1>虎王堂</h1>
    <div class="subtitle">본풀이 — 사주 종합 해석</div>
    <div class="user-info">
      <span id="userName"></span>
      <span id="userJob"></span>
    </div>
  </div>

  <!-- CH1: 명식총론 -->
  <div class="section" id="ch1">
    <div class="section-label">第一章</div>
    <div class="section-title">명식총론</div>
    <div class="pillars" id="pillars"></div>
    <div class="gauge-group" id="gauges"></div>
    <div id="ch1Keyword"></div>
    <div class="section-body" id="ch1Body"></div>
  </div>
  <div class="divider"></div>

  <!-- CH2: 성정론 -->
  <div class="section" id="ch2">
    <div class="section-label">第二章</div>
    <div class="section-title">성정론</div>
    <div id="ch2Traits"></div>
    <div class="section-body" id="ch2Body"></div>
  </div>
  <div class="divider"></div>

  <!-- CH3: 재물론 -->
  <div class="section" id="ch3">
    <div class="section-label">第三章</div>
    <div class="section-title">재물론</div>
    <div id="ch3Grade"></div>
    <div class="section-body" id="ch3Body"></div>
  </div>
  <div class="divider"></div>

  <!-- CH4: 관록론 -->
  <div class="section" id="ch4">
    <div class="section-label">第四章</div>
    <div class="section-title">관록론</div>
    <div class="tag-group" id="ch4Jobs"></div>
    <div class="score-bar-wrap" id="ch4Score"></div>
    <div class="section-body" id="ch4Body"></div>
  </div>
  <div class="divider"></div>

  <!-- CH5: 인연론 -->
  <div class="section" id="ch5">
    <div class="section-label">第五章</div>
    <div class="section-title">인연론</div>
    <div class="tag-group" id="ch5Partner"></div>
    <div class="score-bar-wrap" id="ch5Score"></div>
    <div class="section-body" id="ch5Body"></div>
  </div>
  <div class="divider"></div>

  <!-- CH6: 건강론 -->
  <div class="section" id="ch6">
    <div class="section-label">第六章</div>
    <div class="section-title">건강론</div>
    <div class="tag-group" id="ch6Organs"></div>
    <div class="score-bar-wrap" id="ch6Score"></div>
    <div class="section-body" id="ch6Body"></div>
  </div>
  <div class="divider"></div>

  <!-- CH7: 대운론 -->
  <div class="section" id="ch7">
    <div class="section-label">第七章</div>
    <div class="section-title">대운론</div>
    <div class="section-body" id="ch7Body"></div>
    <div class="decade-graph" id="ch7Graph"></div>
  </div>
  <div class="divider"></div>

  <!-- CH8: 세운론 -->
  <div class="section" id="ch8">
    <div class="section-label">第八章</div>
    <div class="section-title">세운론</div>
    <div class="section-body" id="ch8Body"></div>
    <div class="year-cards" id="ch8Cards"></div>
  </div>
  <div class="divider"></div>

  <!-- CH9: 월운론 -->
  <div class="section" id="ch9">
    <div class="section-label">第九章</div>
    <div class="section-title">2026 월운론</div>
    <div class="section-body" id="ch9Body"></div>
    <div class="month-grid" id="ch9Grid"></div>
  </div>
  <div class="divider"></div>

  <!-- CH10: 호왕 처방전 -->
  <div class="section" id="ch10">
    <div class="section-label">第十章</div>
    <div class="section-title">호왕 처방전</div>
    <div class="rx-cards" id="ch10Cards"></div>
    <div class="section-body" id="ch10Body"></div>
    <div class="checklist" id="ch10Checklist"></div>
    <div class="secret-box">
      <div class="secret-text" id="ch10Secret"></div>
    </div>
  </div>

  <!-- 질문권 -->
  <div class="ask-section" id="askSection" style="display:none;">
    <div class="ask-title">🐯 호왕에게 물어보기</div>
    <textarea class="ask-textarea" id="askInput" placeholder="궁금한 것을 물어보세요…"></textarea>
    <button class="ask-btn" id="askBtn" onclick="submitAsk()">질문하기</button>
    <div class="ask-remaining" id="askRemaining"></div>
    <div class="ask-answer" id="askAnswer"></div>
  </div>

  <!-- CTA -->
  <div class="cta-section">
    <a class="cta-btn" href="index.html">호왕당 처음으로 돌아가기</a>
    <div class="cta-sub">다른 풀이도 받아보세요</div>
  </div>
</div>

<script>
const API_BASE = 'https://hw-server-1075269376260.asia-northeast3.run.app';

// orderId 파싱
const params = new URLSearchParams(location.search);
const orderId = params.get('orderId') || params.get('id');

if (!orderId) {
  document.getElementById('loading').classList.add('hide');
  document.getElementById('content').style.display = 'block';
  document.getElementById('content').innerHTML = '<div class="error-box"><h2>주문 정보 없음</h2><p>잘못된 접근입니다. <a href="index.html">처음으로</a></p></div>';
}

// 데이터 로드
async function loadResult() {
  try {
    let res = await fetch(`${API_BASE}/result/${orderId}`);
    let json = await res.json();
    if (!json.success) {
      res = await fetch(`${API_BASE}/order-info/${orderId}`);
      json = await res.json();
    }
    if (!json.success || !json.data) throw new Error('데이터 없음');
    render(json.data);
  } catch (e) {
    console.error(e);
    document.getElementById('loading').classList.add('hide');
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').innerHTML = `<div class="error-box"><h2>결과를 불러올 수 없습니다</h2><p>${e.message}<br><a href="index.html">처음으로</a></p></div>`;
  }
}

function render(d) {
  const s = d.sections || {};

  // 헤더
  document.getElementById('userName').textContent = d.userName || '';
  document.getElementById('userJob').textContent = d.job || '';

  // CH1: 사주 네 기둥
  const pLabels = ['년주', '월주', '일주', '시주'];
  const pKeys = ['year', 'month', 'day', 'hour'];
  const pillarsEl = document.getElementById('pillars');
  pKeys.forEach((k, i) => {
    pillarsEl.innerHTML += `<div class="pillar"><div class="pillar-label">${pLabels[i]}</div><div class="pillar-hanja">${d.fourPillars?.[k] || ''}</div><div class="pillar-hangul">${d.fourPillarsHangul?.[k] || ''}</div></div>`;
  });

  // CH1: 오행 게이지
  const elNames = { wood: '木', fire: '火', earth: '土', metal: '金', water: '水' };
  const gaugesEl = document.getElementById('gauges');
  const eg = d.elementGauge || {};
  Object.keys(elNames).forEach(k => {
    const v = eg[k] || 0;
    gaugesEl.innerHTML += `<div class="gauge-row"><div class="gauge-label">${elNames[k]}</div><div class="gauge-track"><div class="gauge-fill ${k}" data-width="${v}"></div></div><div class="gauge-val">${v}%</div></div>`;
  });

  // CH1: 키워드 + 본문
  document.getElementById('ch1Keyword').innerHTML = s.ch1_keyword ? `<div class="keyword-badge">${s.ch1_keyword}</div>` : '';
  document.getElementById('ch1Body').textContent = s.ch1_summary || '';

  // CH2: 성정론
  const traitsEl = document.getElementById('ch2Traits');
  traitsEl.innerHTML = `<div class="trait-box strength"><div class="trait-label">강점</div><div class="trait-text">${s.ch2_strength || ''}</div></div><div class="trait-box weakness"><div class="trait-label">약점</div><div class="trait-text">${s.ch2_weakness || ''}</div></div>`;
  document.getElementById('ch2Body').textContent = s.ch2_personality || '';

  // CH3: 재물론
  const grade = s.ch3_grade || 'C';
  document.getElementById('ch3Grade').innerHTML = `<div class="grade-badge grade-${grade}">${grade}</div>`;
  document.getElementById('ch3Body').textContent = s.ch3_wealth || '';

  // CH4: 관록론
  const jobsEl = document.getElementById('ch4Jobs');
  (s.ch4_fit_jobs || []).forEach(j => { jobsEl.innerHTML += `<div class="tag highlight">${j}</div>`; });
  const cs = s.ch4_career_score || 0;
  document.getElementById('ch4Score').innerHTML = `<div class="score-bar-header"><span>적성 점수</span><span>${cs}점</span></div><div class="score-bar-track"><div class="score-bar-fill" data-width="${cs}" style="background:var(--gold);"></div></div>`;
  document.getElementById('ch4Body').textContent = s.ch4_career || '';

  // CH5: 인연론
  const partnerEl = document.getElementById('ch5Partner');
  if (s.ch5_partner_type) partnerEl.innerHTML = `<div class="tag highlight">${s.ch5_partner_type}</div>`;
  const ls = s.ch5_love_score || 0;
  document.getElementById('ch5Score').innerHTML = `<div class="score-bar-header"><span>애정운</span><span>${ls}점</span></div><div class="score-bar-track"><div class="score-bar-fill" data-width="${ls}" style="background:var(--red);"></div></div>`;
  document.getElementById('ch5Body').textContent = s.ch5_love || '';

  // CH6: 건강론
  const organsEl = document.getElementById('ch6Organs');
  (s.ch6_weak_organs || []).forEach(o => { organsEl.innerHTML += `<div class="tag warn">${o}</div>`; });
  const hs = s.ch6_health_score || 0;
  document.getElementById('ch6Score').innerHTML = `<div class="score-bar-header"><span>건강 점수</span><span>${hs}점</span></div><div class="score-bar-track"><div class="score-bar-fill" data-width="${hs}" style="background:var(--green);"></div></div>`;
  document.getElementById('ch6Body').textContent = s.ch6_health || '';

  // CH7: 대운론
  document.getElementById('ch7Body').textContent = s.ch7_bigfortune || '';
  const graphEl = document.getElementById('ch7Graph');
  (s.ch7_decades || []).forEach(dec => {
    const h = dec.score * 20;
    graphEl.innerHTML += `<div class="decade-col"><div class="decade-score">${dec.score}</div><div class="decade-bar-wrap"><div class="decade-bar s${dec.score}" data-height="${h}"></div></div><div class="decade-label">${dec.period}</div><div class="decade-comment">${dec.comment}</div></div>`;
  });

  // CH8: 세운론
  document.getElementById('ch8Body').textContent = s.ch8_yearly || '';
  const yearCardsEl = document.getElementById('ch8Cards');
  (s.ch8_years || []).forEach(y => {
    yearCardsEl.innerHTML += `<div class="year-card"><div class="yc-year">${y.year}</div><div class="yc-score">${'★'.repeat(y.score)}${'☆'.repeat(5 - y.score)}</div><div class="yc-comment">${y.comment}</div></div>`;
  });

  // CH9: 월운론
  document.getElementById('ch9Body').textContent = s.ch9_monthly || '';
  const gridEl = document.getElementById('ch9Grid');
  (s.ch9_months || []).forEach(m => {
    gridEl.innerHTML += `<div class="month-cell"><div class="mc-num">${m.month}월</div><div class="mc-score s${m.score}">${m.score}</div><div class="mc-text">${m.text}</div></div>`;
  });

  // CH10: 처방전
  document.getElementById('ch10Cards').innerHTML = `
    <div class="rx-card"><div class="rx-label">용신</div><div class="rx-value">${s.ch10_yongsin || ''}</div></div>
    <div class="rx-card"><div class="rx-label">방위</div><div class="rx-value">${s.ch10_direction || ''}</div></div>
    <div class="rx-card"><div class="rx-label">색상</div><div class="rx-value">${s.ch10_color || ''}</div></div>
    <div class="rx-card"><div class="rx-label">숫자</div><div class="rx-value">${s.ch10_number || ''}</div></div>`;
  document.getElementById('ch10Body').textContent = s.ch10_prescription || '';

  const clEl = document.getElementById('ch10Checklist');
  (s.ch10_checklist || []).forEach(c => {
    clEl.innerHTML += `<div class="check-item"><div class="check-icon">✓</div><span>${c}</span></div>`;
  });
  document.getElementById('ch10Secret').textContent = s.ch10_secret || '';

  // 질문권 표시
  document.getElementById('askSection').style.display = 'block';
  document.getElementById('askRemaining').textContent = '질문 1회 가능';

  // 로딩 해제
  document.getElementById('loading').classList.add('hide');
  document.getElementById('content').style.display = 'block';

  // 애니메이션
  setTimeout(animateBars, 300);
  observeSections();
}

// 바 애니메이션
function animateBars() {
  document.querySelectorAll('.gauge-fill[data-width]').forEach(el => {
    el.style.width = el.dataset.width + '%';
  });
  document.querySelectorAll('.score-bar-fill[data-width]').forEach(el => {
    el.style.width = el.dataset.width + '%';
  });
  document.querySelectorAll('.decade-bar[data-height]').forEach(el => {
    el.style.height = el.dataset.height + 'px';
  });
}

// 스크롤 등장
function observeSections() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.section').forEach(s => observer.observe(s));
}

// 질문하기
async function submitAsk() {
  const q = document.getElementById('askInput').value.trim();
  if (!q) return;
  const btn = document.getElementById('askBtn');
  btn.disabled = true;
  btn.textContent = '답변 중…';
  try {
    const res = await fetch(`${API_BASE}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId, question: q })
    });
    const json = await res.json();
    if (json.success) {
      const ansEl = document.getElementById('askAnswer');
      ansEl.textContent = json.answer || json.data?.answer || '답변을 받았습니다.';
      ansEl.style.display = 'block';
      document.getElementById('askRemaining').textContent = '질문 소진';
      btn.textContent = '질문 완료';
    } else {
      btn.textContent = '질문하기';
      btn.disabled = false;
      alert(json.error || '오류가 발생했습니다.');
    }
  } catch (e) {
    btn.textContent = '질문하기';
    btn.disabled = false;
    alert('서버 오류: ' + e.message);
  }
}

if (orderId) loadResult();
</script>
