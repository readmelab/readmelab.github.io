<style>
:root{
  --bg:#0a0a0a;--surface:#151515;--gold:#c9a84c;--gold-dim:#8a7230;
  --text:#e8e0d0;--text-sub:#a89880;
  --wood:#4a8c6f;--fire:#c4453a;--earth:#b8963e;--metal:#a8a8b0;--water:#3a6b8c;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif KR',serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* ── 입력 섹션 ── */
#input-section{width:100%;max-width:420px;padding:40px 20px;text-align:center}
.brand{font-family:'Nanum Brush Script',cursive;font-size:2.4rem;color:var(--gold);letter-spacing:6px}
.page-title{font-family:'Nanum Brush Script',cursive;font-size:1.5rem;color:var(--text-sub);margin:8px 0 30px}
.form-group{margin-bottom:18px;text-align:left}
.form-group label{display:block;font-size:.85rem;color:var(--text-sub);margin-bottom:6px;font-family:'Noto Serif KR',serif}
.form-group select,
.form-group input[type="date"]{
  width:100%;padding:12px;background:var(--surface);border:1px solid var(--gold-dim);
  border-radius:8px;color:var(--text);font-size:1rem;font-family:'Noto Serif KR',serif;
  -webkit-appearance:none;appearance:none}
.form-group select option{background:var(--surface);color:var(--text)}

/* 라디오 그룹 (양력/음력, 성별) */
.radio-row{display:flex;gap:10px}
.radio-row label{
  flex:1;text-align:center;padding:12px;background:var(--surface);
  border:1px solid var(--gold-dim);border-radius:8px;font-size:.95rem;
  color:var(--text-sub);cursor:pointer;transition:all .2s}
.radio-row input{display:none}
.radio-row input:checked+span{color:var(--gold)}
.radio-row label.active{border-color:var(--gold);background:#1a1508}

.btn-submit{
  width:100%;padding:16px;margin-top:24px;
  background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  border:none;border-radius:10px;font-family:'Nanum Brush Script',cursive;
  font-size:1.4rem;color:#0a0a0a;cursor:pointer;letter-spacing:4px}

/* ── 로딩 ── */
#loading-section{display:none;width:100%;max-width:420px;padding:40px 20px;text-align:center}
.loading-img{width:60%;border-radius:12px;opacity:.8}
.loading-text{font-family:'Nanum Brush Script',cursive;font-size:1.3rem;color:var(--gold);margin-top:16px}

/* ── 결과 ── */
#result-section{display:none;width:100%;max-width:420px;padding:20px;text-align:center}

/* 카드 */
.card{
  position:relative;width:100%;aspect-ratio:3/4;border-radius:12px;overflow:hidden;
  background-size:cover;background-position:center;margin-bottom:24px}
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,transparent 35%,transparent 60%,rgba(0,0,0,.55) 100%);
  display:flex;flex-direction:column;justify-content:space-between;padding:24px;text-align:left}
.card-top .card-brand{font-family:'Nanum Brush Script',cursive;font-size:1.1rem;color:var(--gold);opacity:.8}
.card-top .card-title{font-family:'Nanum Brush Script',cursive;font-size:1.6rem;color:#fff;margin-top:2px}
.card-bottom .element-big{font-family:'Noto Serif KR',serif;font-size:3.5rem;font-weight:900;line-height:1}
.card-bottom .guardian-name{font-family:'Nanum Brush Script',cursive;font-size:1.4rem;color:#fff;margin-top:4px}
.card-bottom .prescription{font-family:'Noto Serif KR',serif;font-size:.85rem;color:var(--text);margin-top:6px;opacity:.9}

/* 사주 원국 */
.saju-title{font-family:'Nanum Brush Script',cursive;font-size:1.3rem;color:var(--gold);margin:20px 0 10px}
.saju-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.saju-pillar{background:var(--surface);border:1px solid var(--gold-dim);border-radius:8px;padding:10px 4px;text-align:center}
.saju-pillar .pillar-label{font-size:.7rem;color:var(--text-sub)}
.saju-pillar .pillar-hanja{font-family:'Noto Serif KR',serif;font-size:1.3rem;color:var(--gold);margin:4px 0}
.saju-pillar .pillar-hangul{font-size:.75rem;color:var(--text-sub)}

/* 오행 게이지 */
.gauge-title{font-family:'Nanum Brush Script',cursive;font-size:1.3rem;color:var(--gold);margin:20px 0 10px}
.gauge-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
.gauge-label{width:28px;font-family:'Noto Serif KR',serif;font-size:.9rem;font-weight:700;text-align:center}
.gauge-track{flex:1;height:14px;background:var(--surface);border-radius:7px;overflow:hidden;position:relative}
.gauge-fill{height:100%;border-radius:7px;transition:width 1.2s ease}
.gauge-pct{width:36px;font-size:.75rem;color:var(--text-sub);text-align:right}
.badge-weak{
  display:inline-block;font-size:.6rem;background:var(--fire);color:#fff;
  padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}

/* 호왕의 한마디 */
.hotong-box{
  background:var(--surface);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;
  padding:16px;margin:20px 0;text-align:left}
.hotong-box .hotong-label{font-family:'Nanum Brush Script',cursive;font-size:1.1rem;color:var(--gold);margin-bottom:6px}
.hotong-box .hotong-text{font-family:'Noto Serif KR',serif;font-size:.9rem;color:var(--text);line-height:1.7}

/* CTA */
.cta-box{
  background:linear-gradient(135deg,#1a1508,#0a0a0a);border:1px solid var(--gold);
  border-radius:12px;padding:20px;margin:24px 0;text-align:center}
.cta-box p{font-family:'Noto Serif KR',serif;font-size:.9rem;color:var(--text);margin-bottom:12px;line-height:1.6}
.cta-btn{
  display:inline-block;padding:12px 32px;background:var(--gold);color:#0a0a0a;
  border:none;border-radius:8px;font-family:'Nanum Brush Script',cursive;
  font-size:1.2rem;text-decoration:none;cursor:pointer}

/* ── 공유 버튼 (색상별) ── */
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.share-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 0;border:none;border-radius:10px;font-family:'Noto Serif KR',serif;
  font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.share-btn:active{opacity:.8}

/* 카카오톡 – 노란색 */
.share-kakao{background:#FEE500;color:#3C1E1E}
/* 이미지 저장 – 보라색 */
.share-save{background:#8B5CF6;color:#fff}
/* 링크 복사 – 진한 회색 */
.share-link{background:#333;color:#fff;border:1px solid #555}
/* 인스타 스토리 – 그라데이션 */
.share-insta{background:linear-gradient(135deg,#f9ce34,#ee2a7b,#6228d7);color:#fff}

.btn-retry{
  display:inline-block;margin-top:16px;padding:10px 28px;
  background:transparent;border:1px solid var(--gold-dim);border-radius:8px;
  color:var(--text-sub);font-size:.85rem;cursor:pointer;font-family:'Noto Serif KR',serif}

.footer{font-size:.7rem;color:var(--text-sub);padding:20px;opacity:.5}

/* 토스트 */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#0a0a0a;padding:10px 24px;border-radius:20px;
  font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ═══ 입력 ═══ -->
<div id="input-section">

<!-- ═══ 결과 ═══ -->
<div id="result-section">

  <!-- 카드 -->
  <div class="card" id="suhoCard">
    <div class="card-overlay">
      <div class="card-top">
        <div class="card-brand">虎王堂</div>

        <div class="guardian-name" id="guardianName"></div>

  </div>

  <!-- 사주 원국 -->
  <div class="saju-title">사주 원국 (四柱)</div>
  <div class="saju-grid">
    <div class="saju-pillar"><div class="pillar-label">시주</div><div class="pillar-hanja" id="pHour"></div><div class="pillar-hangul" id="pHourH"></div></div>
    <div class="saju-pillar"><div class="pillar-label">일주</div><div class="pillar-hanja" id="pDay"></div><div class="pillar-hangul" id="pDayH"></div></div>
    <div class="saju-pillar"><div class="pillar-label">월주</div><div class="pillar-hanja" id="pMonth"></div><div class="pillar-hangul" id="pMonthH"></div></div>
    <div class="saju-pillar"><div class="pillar-label">년주</div><div class="pillar-hanja" id="pYear"></div><div class="pillar-hangul" id="pYearH"></div></div>
  </div>

  <!-- 오행 게이지 -->
  <div class="gauge-title">오행 분포</div>
  <div id="gaugeWrap"></div>

  <!-- 호왕의 한마디 -->
  <div class="hotong-box">
    <div class="hotong-label">호왕의 한마디</div>
    <div class="hotong-text" id="hotongText"></div>
  </div>

  <!-- CTA -->
  <div class="cta-box">
    <p id="ctaText"></p>
    <a class="cta-btn" href="chogyeon.html">초견 보러가기</a>

  <!-- 공유 버튼 -->
  <div class="share-grid">
    <button class="share-btn share-kakao" id="btnKakao">💬 카카오톡 공유</button>
    <button class="share-btn share-save" id="btnSave">📷 이미지 저장</button>
    <button class="share-btn share-link" id="btnLink">🔗 링크 복사</button>
    <button class="share-btn share-insta" id="btnInsta">✨ 인스타 스토리</button>
  </div>

  <button class="btn-retry" onclick="location.reload()">다시 뽑기</button>
</div>

<div class="footer">@howangdang · 虎王堂</div>

<script>

const API_URL  = 'https://hw-server-1075269376260.asia-northeast3.run.app';
const IMG_BASE = 'https://audio.readmelab.co.kr/howang/suhopae';

/* ═══ 수호신 데이터 ═══ */
const GUARDIANS = {

  earth: {element:'土',hanja:'麒麟',name:'기린',color:'var(--earth)',
           direction:'중앙',goodColor:'황금색',season:'환절기',numbers:'5, 10',
           desc:'기린은 중앙을 지키는 신수로, 균형과 안정의 기운을 관장한다.',
           weakDesc:'토(土)의 기운이 부족하구나. 중심을 잡는 힘, 안정감이 약하다. 기린이 네 발밑에 단단한 땅을 깔아 줄 것이다.',

  metal: {element:'金',hanja:'白虎',name:'백호',color:'var(--metal)',
           direction:'서쪽',goodColor:'흰색',season:'가을',numbers:'4, 9',
           desc:'백호는 서쪽을 지키는 신수로, 결단과 정화의 기운을 관장한다.',

           hotong:'네 안에 흐르는 물이 말랐다. 현무의 깊은 물줄기가 네 안을 다시 적셔줄 것이다. 유연해져라.'}

const PRESCRIPTIONS = {
  wood: '잠든 푸른 기운을 깨워야 하느니라',
  fire: '식어버린 불꽃을 되살려야 하느니라',
  earth:'흔들리는 중심을 다잡아야 하느니라',
  metal:'무뎌진 칼날을 다시 세워야 하느니라',
  water:'마른 물줄기를 다시 흘려야 하느니라'
};

const ELEMENT_COLORS = {wood:'var(--wood)',fire:'var(--fire)',earth:'var(--earth)',metal:'var(--metal)',water:'var(--water)'};
const ELEMENT_KO = {wood:'木',fire:'火',earth:'土',metal:'金',water:'水'};

/* ═══ 드롭다운 초기화 ═══ */
(function initDropdowns(){
  // 생년 (1940~2025, 기본 1980)
  const ySel = document.getElementById('birthYear');
  for(let y=1940;y<=2025;y++){
    const o = document.createElement('option');
    o.value=y; o.textContent=y+'년';
    if(y===1980) o.selected=true;
    ySel.appendChild(o);
  }
  // 월 (1~12, 기본 6)
  const mSel = document.getElementById('birthMonth');
  for(let m=1;m<=12;m++){
    const o = document.createElement('option');
    o.value=String(m).padStart(2,'0'); o.textContent=m+'월';
    if(m===6) o.selected=true;
    mSel.appendChild(o);
  }
  // 일 (1~31, 기본 15)
  const dSel = document.getElementById('birthDay');
  for(let d=1;d<=31;d++){
    const o = document.createElement('option');
    o.value=String(d).padStart(2,'0'); o.textContent=d+'일';
    if(d===15) o.selected=true;
    dSel.appendChild(o);
  }
  // 시간
  const tSel = document.getElementById('birthTime');
  const times = [
    {v:'',l:'모름'},
    {v:'23:00',l:'자시 (23:00~01:00)'},
    {v:'01:00',l:'축시 (01:00~03:00)'},
    {v:'03:00',l:'인시 (03:00~05:00)'},
    {v:'05:00',l:'묘시 (05:00~07:00)'},
    {v:'07:00',l:'진시 (07:00~09:00)'},
    {v:'09:00',l:'사시 (09:00~11:00)'},
    {v:'11:00',l:'오시 (11:00~13:00)'},
    {v:'13:00',l:'미시 (13:00~15:00)'},
    {v:'15:00',l:'신시 (15:00~17:00)'},
    {v:'17:00',l:'유시 (17:00~19:00)'},
    {v:'19:00',l:'술시 (19:00~21:00)'},
    {v:'21:00',l:'해시 (21:00~23:00)'}
  ];
  times.forEach(t=>{
    const o=document.createElement('option');
    o.value=t.v; o.textContent=t.l;
    tSel.appendChild(o);
  });
})();

/* ═══ 라디오 활성화 ═══ */
document.querySelectorAll('.radio-row').forEach(row=>{
  row.querySelectorAll('label').forEach(lbl=>{
    lbl.addEventListener('click',()=>{
      row.querySelectorAll('label').forEach(l=>l.classList.remove('active'));
      lbl.classList.add('active');
    });
  });
});

/* ═══ 토스트 ═══ */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

/* ═══ 제출 ═══ */
document.getElementById('btnSubmit').addEventListener('click', async()=>{
  const year = document.getElementById('birthYear').value;
  const month = document.getElementById('birthMonth').value;
  const day = document.getElementById('birthDay').value;
  const birthDate = `${year}-${month}-${day}`;
  const birthTime = document.getElementById('birthTime').value;
  const calendarType = document.querySelector('input[name="calendar"]:checked').value;
  const gender = document.querySelector('input[name="gender"]:checked').value;

  document.getElementById('input-section').style.display='none';
  document.getElementById('loading-section').style.display='block';

  // 문 소리
  try{ new Audio('https://audio.readmelab.co.kr/howang/door_creak.mp3').play(); }catch(e){}

  try{
    const res = await fetch(`${API_URL}/api/howangpae`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({birthDate,birthTime,calendarType,gender})
    });
    if(!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();

    setTimeout(()=>{
      document.getElementById('loading-section').style.display='none';
      document.getElementById('result-section').style.display='block';
      renderResult(data);
    },2500);
  }catch(e){
    console.error(e);
    document.getElementById('loading-section').style.display='none';
    document.getElementById('input-section').style.display='block';
    showToast('호왕이 응답하지 않습니다. 다시 시도해주세요.');
  }
});

/* ═══ 결과 렌더링 ═══ */
function renderResult(data){
  const sp = data.spiProperties;
  const gauge = sp.elementGauge;

  // 부족한 오행 찾기
  let weakEl='wood', weakVal=Infinity;
  for(const [k,v] of Object.entries(gauge)){
    if(v < weakVal){weakVal=v; weakEl=k;}
  }

  const g = GUARDIANS[weakEl];

  // 카드 배경 이미지
  const card = document.getElementById('suhoCard');
  card.style.backgroundImage = `url(${IMG_BASE}/${weakEl}.jpeg)`;

  // 카드 텍스트
  document.getElementById('elementBig').textContent = g.element;
  document.getElementById('elementBig').style.color = g.color;
  document.getElementById('guardianName').textContent = `${g.hanja} · ${g.name}`;
  document.getElementById('prescription').textContent = PRESCRIPTIONS[weakEl];

  // 사주 사기둥
  const fp = sp.fourPillars;
  const fph = sp.fourPillarsHangul;
  document.getElementById('pYear').textContent = fp.year;
  document.getElementById('pYearH').textContent = fph.year;
  document.getElementById('pMonth').textContent = fp.month;
  document.getElementById('pMonthH').textContent = fph.month;
  document.getElementById('pDay').textContent = fp.day;
  document.getElementById('pDayH').textContent = fph.day;
  document.getElementById('pHour').textContent = fp.hour || '—';
  document.getElementById('pHourH').textContent = fph.hour || '모름';

  // 오행 게이지
  const wrap = document.getElementById('gaugeWrap');
  wrap.innerHTML='';
  const order=['wood','fire','earth','metal','water'];
  order.forEach(el=>{
    const pct = gauge[el];
    const isWeak = (el===weakEl);
    const row = document.createElement('div');
    row.className='gauge-row';
    row.innerHTML=`
      <div class="gauge-label" style="color:${ELEMENT_COLORS[el]}">${ELEMENT_KO[el]}</div>
      <div class="gauge-track">
        <div class="gauge-fill" style="width:0%;background:${ELEMENT_COLORS[el]}"></div>
      </div>
      <div class="gauge-pct">${pct}%${isWeak?'<span class="badge-weak">부족</span>':''}</div>`;
    wrap.appendChild(row);
    // 애니메이션
    setTimeout(()=>{
      row.querySelector('.gauge-fill').style.width = pct+'%';
    },200);
  });

  // 호왕의 한마디
  document.getElementById('hotongText').textContent = g.hotong;

  // CTA
  document.getElementById('ctaText').textContent = data.card.cta || '네 사주는 봤다. 그 안의 뜻은 아직 모르지? 호왕이 풀어주마.';

  // 저장용 데이터
  window.__suhoData = {weakEl, g, data};
}

/* ═══ 공유 – 카카오 ═══ */
Kakao.init(KAKAO_KEY);
document.getElementById('btnKakao').addEventListener('click',()=>{
  const d = window.__suhoData;
  if(!d) return;
  Kakao.Share.sendDefault({
    objectType:'feed',
    content:{
      title:`호왕 수호패 – ${d.g.hanja} ${d.g.name}`,
      description:PRESCRIPTIONS[d.weakEl],
      imageUrl:`${IMG_BASE}/${d.weakEl}.jpeg`,
      link:{mobileWebUrl:location.href,webUrl:location.href}
    },
    buttons:[{title:'나도 뽑아보기',link:{mobileWebUrl:location.href,webUrl:location.href}}]
  });
});

/* ═══ 공유 – 이미지 저장 (Canvas API) ═══ */
document.getElementById('btnSave').addEventListener('click', async()=>{
  const d = window.__suhoData;
  if(!d) return;
  showToast('이미지 생성 중…');

  try{
    const W=900, H=1200;
    const canvas = document.createElement('canvas');
    canvas.width=W; canvas.height=H;
    const ctx = canvas.getContext('2d');

    // 배경 이미지 로드 (프록시 경유)
    const img = new Image();
    img.crossOrigin='anonymous';
    const imgUrl = `${API_URL}/proxy-image?url=${encodeURIComponent(IMG_BASE+'/'+d.weakEl+'.jpeg')}`;
    
    await new Promise((resolve,reject)=>{
      img.onload=resolve;
      img.onerror=()=>{
        // 프록시 실패 시 직접 로드 시도
        img.crossOrigin='';
        img.src=`${IMG_BASE}/${d.weakEl}.jpeg`;
        img.onload=resolve;
        img.onerror=reject;
      };
      img.src=imgUrl;
    });

    // 배경 그리기
    const scale = Math.max(W/img.width, H/img.height);
    const sw = W/scale, sh = H/scale;
    const sx = (img.width-sw)/2, sy = (img.height-sh)/2;
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);

    // 상단 오버레이
    const grdTop = ctx.createLinearGradient(0,0,0,300);
    grdTop.addColorStop(0,'rgba(0,0,0,0.5)');
    grdTop.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grdTop; ctx.fillRect(0,0,W,300);

    // 하단 오버레이
    const grdBot = ctx.createLinearGradient(0,H-350,0,H);
    grdBot.addColorStop(0,'rgba(0,0,0,0)');
    grdBot.addColorStop(1,'rgba(0,0,0,0.6)');
    ctx.fillStyle=grdBot; ctx.fillRect(0,H-350,W,350);

    // 상단 텍스트
    ctx.fillStyle='#c9a84c';
    ctx.font='36px "Nanum Brush Script", cursive';
    ctx.fillText('虎王堂',40,60);
    ctx.fillStyle='#ffffff';
    ctx.font='48px "Nanum Brush Script", cursive';
    ctx.fillText('守護牌',40,110);

    // 하단 텍스트
    const colorMap = {wood:'#4a8c6f',fire:'#c4453a',earth:'#b8963e',metal:'#a8a8b0',water:'#3a6b8c'};
    ctx.fillStyle = colorMap[d.weakEl];
    ctx.font='bold 120px "Noto Serif KR", serif';
    ctx.fillText(d.g.element, 40, H-160);
    ctx.fillStyle='#ffffff';
    ctx.font='48px "Nanum Brush Script", cursive';
    ctx.fillText(`${d.g.hanja} · ${d.g.name}`, 40, H-100);
    ctx.fillStyle='#e8e0d0';
    ctx.font='28px "Noto Serif KR", serif';
    ctx.fillText(PRESCRIPTIONS[d.weakEl], 40, H-55);

    // 다운로드
    const link = document.createElement('a');
    link.download='호왕수호패.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    showToast('저장 완료!');
  }catch(e){
    console.error(e);
    showToast('이미지 저장에 실패했습니다.');
  }
});

/* ═══ 공유 – 링크 복사 ═══ */
document.getElementById('btnLink').addEventListener('click',()=>{
  navigator.clipboard.writeText(location.href)
    .then(()=>showToast('링크가 복사되었습니다!'))
    .catch(()=>showToast('복사에 실패했습니다.'));
});

/* ═══ 공유 – 인스타 스토리 ═══ */
document.getElementById('btnInsta').addEventListener('click', async()=>{
  if(navigator.share){
    try{
      await navigator.share({title:'호왕 수호패',text:'나의 수호패를 확인해봐!',url:location.href});
    }catch(e){}
  }else{
    showToast('공유 기능을 지원하지 않는 브라우저입니다.');
  }
});
