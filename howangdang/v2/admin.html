<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>호왕당 V2 어드민</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a06;--card:rgba(26,16,8,.9);--gold:#c5975b;--red:#8B1A1A;--green:#4a8c5c;--blue:#4a6a9c;--text:#e8d5b0;--sub:#8a7a5a;--border:#2a1a0a;--border2:#3a2a1a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif KR',serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:920px;margin:0 auto;padding:20px 16px 100px}

/* ── 로그인 ── */
.login-box{max-width:320px;margin:100px auto;text-align:center}
.login-box h1{font-size:28px;color:var(--gold);letter-spacing:6px;margin-bottom:8px}
.login-box .sub{font-size:12px;color:var(--sub);margin-bottom:24px}
.login-input{width:100%;padding:14px;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:inherit;font-size:15px;outline:none;text-align:center;margin-bottom:12px}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#8B1A1A,#5a1010);border:1px solid var(--gold);border-radius:8px;color:var(--text);font-family:inherit;font-size:16px;font-weight:700;cursor:pointer}
.login-error{color:#c44a4a;font-size:12px;margin-top:8px;display:none}

/* ── 공통 ── */
.dashboard{display:none}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.header h1{font-size:22px;color:var(--gold);letter-spacing:4px}
.v2-badge{display:inline-block;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;margin-left:8px;vertical-align:middle}
.header-right{display:flex;align-items:center;gap:8px}
.header-time{font-size:11px;color:var(--sub)}

/* ── 탭 ── */
.tab-row{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:12px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;background:var(--card);border:1px solid var(--border2);border-radius:8px 8px 0 0;color:var(--sub);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:1px}
.tab-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(197,151,91,.1);border-bottom-color:transparent}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── 기간 필터 ── */
.period-row{display:flex;gap:6px;margin-bottom:16px}
.period-btn{padding:6px 14px;background:var(--card);border:1px solid var(--border2);border-radius:6px;color:var(--sub);font-family:inherit;font-size:11px;cursor:pointer;transition:all .2s}
.period-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(197,151,91,.1)}

/* ── 지표 카드 ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 12px;text-align:center}
.stat-card .label{font-size:10px;color:var(--sub);margin-bottom:6px;letter-spacing:1px}
.stat-card .value{font-size:26px;font-weight:900;color:var(--gold)}
.stat-card .value.revenue{color:#e8c56e}
.stat-card .unit{font-size:10px;color:var(--sub);margin-top:2px}

/* ── 퍼널 ── */
.funnel-section{margin-bottom:24px}
.section-title{font-size:13px;color:var(--gold);margin-bottom:10px;letter-spacing:2px}
.funnel-step{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.funnel-label{width:80px;font-size:11px;color:var(--sub);text-align:right;flex-shrink:0}
.funnel-bar-bg{flex:1;height:26px;background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.funnel-bar{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:700;color:var(--bg);min-width:28px;transition:width 1s ease}
.funnel-bar.c1{background:linear-gradient(90deg,#c5975b,#e8c56e)}
.funnel-bar.c2{background:linear-gradient(90deg,#3a6a4a,#4a8c5c)}
.funnel-bar.c3{background:linear-gradient(90deg,#3a5a7a,#4a6a9c)}
.funnel-bar.c4{background:linear-gradient(90deg,#7a2a1a,#c44a4a)}
.funnel-rate{width:50px;font-size:10px;color:var(--sub);flex-shrink:0}

/* ── 차트 ── */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:24px;overflow-x:auto}
.chart-wrap svg{display:block;width:100%;min-width:480px}

/* ── 테이블 ── */
.table-wrap{overflow-x:auto;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
th{background:rgba(26,16,8,.95);color:var(--gold);font-size:10px;padding:10px 10px;text-align:left;border-bottom:1px solid var(--border);letter-spacing:1px;white-space:nowrap}
td{padding:10px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);white-space:nowrap}
tr:hover td{background:rgba(197,151,91,.03)}

/* ── 뱃지 ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge-hw1{background:rgba(138,122,90,.2);color:var(--sub)}
.badge-hw2{background:rgba(197,80,80,.15);color:#c44a4a}
.badge-hw3{background:rgba(197,151,91,.2);color:var(--gold)}
.badge-up{background:rgba(74,140,92,.15);color:var(--green);margin-left:3px}

.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.st-waiting{background:rgba(197,151,91,.2);color:var(--gold)}
.st-confirmed{background:rgba(74,140,92,.2);color:var(--green)}
.st-processing{background:rgba(74,106,156,.2);color:var(--blue)}
.st-done{background:rgba(138,122,90,.2);color:var(--sub)}

/* ── 페이지별 방문 ── */
.page-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:24px}
.page-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.page-card .pg-name{font-size:10px;color:var(--sub);margin-bottom:4px}
.page-card .pg-count{font-size:20px;font-weight:900;color:var(--text)}

/* ── 주문 카드 ── */
.order-card{padding:16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.order-card.s-confirmed{border-left:3px solid var(--green)}
.order-card.s-waiting{border-left:3px solid var(--gold)}
.order-card.s-done{border-left:3px solid var(--blue)}
.order-card.s-processing{border-left:3px solid #c44a4a}

.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.order-product{font-size:14px;font-weight:700;color:var(--gold)}
.order-price{font-size:14px;font-weight:700}

.order-info{font-size:12px;color:var(--sub);line-height:1.8;margin-top:6px}
.order-info strong{color:#a89878}

.order-actions{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.action-btn{padding:6px 14px;border-radius:6px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.action-btn:hover{transform:scale(1.03)}
.btn-done{background:rgba(74,106,156,.2);color:var(--blue);border:1px solid var(--blue)}
.btn-copy{background:rgba(197,151,91,.1);color:var(--gold);border:1px solid var(--border2)}
.btn-result{background:rgba(74,140,92,.15);color:var(--green);border:1px solid var(--green)}

/* ── 필터 ── */
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;background:var(--card);border:1px solid var(--border2);border-radius:8px;color:var(--sub);font-family:inherit;font-size:11px;cursor:pointer;transition:all .2s}
.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(197,151,91,.1)}

.empty{text-align:center;padding:40px;color:#6a5a4a;font-size:13px}

/* ── 토스트 ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(197,151,91,.9);color:#1a1008;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:600px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .funnel-label{width:60px;font-size:10px}
  .header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<!-- ══════ 로그인 ══════ -->
<div class="login-box" id="loginBox">
  <h1>虎王堂</h1>
  <div class="sub">V2 관리자 대시보드</div>
  <input class="login-input" id="pwInput" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="login-btn" onclick="doLogin()">입장</button>
  <div class="login-error" id="loginError">비밀번호가 틀렸습니다</div>
</div>

<!-- ══════ 대시보드 ══════ -->
<div class="dashboard" id="dashboard">
<div class="container">

  <div class="header">
    <h1>虎王堂 어드민 <span class="v2-badge">V2</span></h1>
    <div class="header-right">
      <span class="header-time" id="lastUpdate"></span>
      <button onclick="loadAll()" style="padding:6px 12px;background:var(--card);border:1px solid var(--border2);border-radius:6px;color:var(--sub);font-family:inherit;font-size:11px;cursor:pointer">새로고침</button>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('overview',this)">대시보드</button>
    <button class="tab-btn" onclick="switchTab('orders',this)">주문 관리</button>
    <button class="tab-btn" onclick="switchTab('monitor',this)">모니터링</button>
    <button class="tab-btn" onclick="switchTab('test',this)">테스트</button>
  </div>

  <!-- ════ 탭 1: 대시보드 ════ -->
  <div class="tab-content active" id="tab-overview">

    <div class="period-row">
      <button class="period-btn" data-p="1d" onclick="changePeriod('1d',this)">오늘</button>
      <button class="period-btn" data-p="7d" onclick="changePeriod('7d',this)">7일</button>
      <button class="period-btn active" data-p="30d" onclick="changePeriod('30d',this)">30일</button>
      <button class="period-btn" data-p="all" onclick="changePeriod('all',this)">전체</button>
    </div>

    <div class="stat-grid" id="statGrid"></div>

    <div class="funnel-section">
      <div class="section-title">전환 퍼널</div>
      <div id="funnelWrap"></div>
    </div>

    <div class="section-title">일별 추이</div>
    <div class="chart-wrap" id="chartWrap"></div>

    <div class="section-title">상품별 매출</div>
    <div class="table-wrap">
      <table><thead><tr><th>상품</th><th>주문 수</th><th>매출</th><th>비중</th></tr></thead>
      <tbody id="productTbody"></tbody></table>
    </div>

    <div class="section-title">페이지별 방문</div>
    <div class="page-grid" id="pageGrid"></div>

    <div class="section-title">최근 결제 (20건)</div>
    <div class="table-wrap">
      <table><thead><tr><th>주문번호</th><th>상품</th><th>금액</th><th>고객</th><th>상태</th><th>일시</th></tr></thead>
      <tbody id="recentTbody"></tbody></table>
    </div>
  </div>

  <!-- ════ 탭 2: 주문 관리 ════ -->
  <div class="tab-content" id="tab-orders">

    <div class="stats" style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <div class="stat-card"><div class="value" id="oStatTotal">0</div><div class="unit">전체</div></div>
      <div class="stat-card"><div class="value" id="oStatPaid">0</div><div class="unit">결제완료</div></div>
      <div class="stat-card"><div class="value" id="oStatRev">0</div><div class="unit">매출(원)</div></div>
      <div class="stat-card"><div class="value" id="oStatToday">0</div><div class="unit">오늘</div></div>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-f="all" onclick="filterOrders(this)">전체</button>
      <button class="filter-btn" data-f="confirmed" onclick="filterOrders(this)">풀이완료</button>
      <button class="filter-btn" data-f="processing" onclick="filterOrders(this)">풀이생성중</button>
      <button class="filter-btn" data-f="done" onclick="filterOrders(this)">알림발송완료</button>
      <button class="filter-btn" data-f="waiting" onclick="filterOrders(this)">대기</button>
    </div>

    <div id="orderList"><div class="empty">불러오는 중...</div></div>
  </div>

  <!-- ════ 탭 3: 모니터링 ════ -->
  <div class="tab-content" id="tab-monitor">
    <div class="section-title">실시간 상태</div>
    <div class="stat-grid" id="monitorStatus"></div>

    <div class="section-title">오늘 시간별 추이 (방문 / 카드 / 결제)</div>
    <div class="chart-wrap" id="hourlyChart"></div>

    <div class="section-title">무료 콘텐츠별 현황</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>콘텐츠</th><th>오늘</th><th>어제</th><th>7일 합계</th><th>전일 대비</th></tr></thead>
        <tbody id="cardTypeTbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ════ 탭 4: 테스트 ════ -->
  <div class="tab-content" id="tab-test">
    <div class="section-title">1. 서버 상태 체크</div>
    <button class="action-btn btn-done" onclick="runHealthCheck()" style="margin-bottom:16px">전체 상태 체크</button>
    <div id="healthResult" style="margin-bottom:24px"></div>

    <div class="section-title">2. 무료 콘텐츠 테스트</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <select id="testGender" class="login-input" style="width:auto;padding:8px 12px"><option value="male">남</option><option value="female">여</option></select>
      <input id="testYear" class="login-input" style="width:80px;padding:8px" type="number" value="1990" placeholder="년">
      <input id="testMonth" class="login-input" style="width:60px;padding:8px" type="number" value="5" placeholder="월">
      <input id="testDay" class="login-input" style="width:60px;padding:8px" type="number" value="15" placeholder="일">
      <input id="testHour" class="login-input" style="width:60px;padding:8px" type="number" value="12" placeholder="시">
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <button class="action-btn btn-result" onclick="testAPI('howangpae')">호왕패</button>
      <button class="action-btn btn-result" onclick="testAPI('suhopae')">수호패</button>
    </div>
    <div id="freeTestResult" style="margin-bottom:24px"></div>

    <div class="section-title">3. 유료 결과 페이지 테스트</div>
    <div id="paidTestBtns" style="margin-bottom:12px"><span style="color:var(--sub);font-size:12px">로딩 중...</span></div>
    <div id="paidTestResult" style="margin-bottom:24px"></div>

    <div class="section-title">4. 알림톡 테스트</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <input id="testPhone" class="login-input" style="width:160px;padding:8px" placeholder="전화번호 (01012345678)">
      <button class="action-btn btn-copy" onclick="testAlimtalk()">테스트 발송</button>
    </div>
    <div id="alimtalkResult" style="margin-bottom:24px"></div>
  </div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = 'https://hw-server-1075269376260.asia-northeast3.run.app';
var PW = localStorage.getItem('hw_admin_pw') || '';
if(PW){
  fetch(API+'/admin/dashboard?pw='+encodeURIComponent(PW)+'&period=1d')
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.success){
        document.getElementById('loginBox').style.display='none';
        document.getElementById('dashboard').style.display='block';
        dashData=d;
        renderOverview(d);
        loadOrders();
      } else { localStorage.removeItem('hw_admin_pw'); PW=''; }
    })
    .catch(function(){ localStorage.removeItem('hw_admin_pw'); PW=''; });
}
var period = '1d';
var allOrders = [];
var currentFilter = 'all';
var dashData = null;

function doLogin(){
  PW = document.getElementById('pwInput').value;
  if(!PW) return;
  fetch(API+'/admin/dashboard?pw='+encodeURIComponent(PW)+'&period=1d')
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.success){
        localStorage.setItem('hw_admin_pw', PW);
        document.getElementById('loginBox').style.display='none';
        document.getElementById('dashboard').style.display='block';
        dashData=d;
        renderOverview(d);
        loadOrders();
      } else {
        document.getElementById('loginError').style.display='block';
      }
    })
    .catch(function(){document.getElementById('loginError').style.display='block'});
}

function switchTab(id,btn){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

function changePeriod(p,btn){
  period=p;
  document.querySelectorAll('.period-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  loadDashboard();
}

function loadAll(){
  loadDashboard();
  loadOrders();
}

function loadDashboard(){
  fetch(API+'/admin/dashboard?pw='+encodeURIComponent(PW)+'&period='+period)
    .then(function(r){return r.json()})
    .then(function(d){if(d.success){dashData=d;renderOverview(d)}});
}

function renderOverview(data){
  var s=data.summary;
  var ps=data.productStats;

  document.getElementById('lastUpdate').textContent='갱신: '+new Date().toLocaleTimeString('ko');

  document.getElementById('statGrid').innerHTML=
    sc('총 방문',fmt(s.totalVisits),'명')+
    sc('호왕패',fmt(s.totalHowangpae),'회')+
    sc('수호패',fmt(s.totalSuhopae),'회')+
    sc('총 결제',fmt(s.totalOrders),'건')+
    sc('총 매출',fmt(s.totalRevenue),'원',true)+
    sc('업그레이드',fmt(s.upgradeCount),'건')+
    sc('방문→결제',s.conversionRate,'')+
    sc('카드→결제',s.cardToPayRate,'')+
    sc('업셀 전환',s.upgradeRate,'')+
    sc('객단가',fmt(s.avgOrderValue||0),'원');

  var fw=document.getElementById('funnelWrap');
  var maxF=Math.max(s.totalVisits,1);
  var steps=[
    {l:'방문자',v:s.totalVisits,c:'c1'},
    {l:'패 뽑기',v:s.totalCards,c:'c2'},
    {l:'결제',v:s.totalOrders,c:'c3'},
    {l:'업그레이드',v:s.upgradeCount,c:'c4'}
  ];
  var fh='';
  for(var i=0;i<steps.length;i++){
    var st=steps[i];
    var pct=Math.max((st.v/maxF)*100,3);
    var rate=i>0&&steps[i-1].v>0?(st.v/steps[i-1].v*100).toFixed(1)+'%':'';
    fh+='<div class="funnel-step"><div class="funnel-label">'+st.l+'</div><div class="funnel-bar-bg"><div class="funnel-bar '+st.c+'" style="width:'+pct+'%">'+fmt(st.v)+'</div></div><div class="funnel-rate">'+rate+'</div></div>';
  }
  fw.innerHTML=fh;

  renderChart(data.dailyStats||[]);

  var ptb=document.getElementById('productTbody');
  var tr=s.totalRevenue||1;
  var prods=[{c:'HW1',n:'초견',b:'hw1'},{c:'HW2',n:'재물풀이',b:'hw2'},{c:'HW3',n:'본풀이',b:'hw3'}];
  var ph='';
  prods.forEach(function(p){
    var d=ps[p.c]||{count:0,revenue:0};
    ph+='<tr><td><span class="badge badge-'+p.b+'">'+p.n+'</span></td><td>'+d.count+'건</td><td>'+fmt(d.revenue)+'원</td><td>'+(tr>0?(d.revenue/tr*100).toFixed(1):'0')+'%</td></tr>';

function renderChart(stats){
  var w=document.getElementById('chartWrap');
  if(!stats.length){w.innerHTML='<div style="text-align:center;color:var(--sub);padding:40px;font-size:12px">데이터 없음</div>';return}
  var sorted=stats.slice().sort(function(a,b){return a.date.localeCompare(b.date)});
  var W=800,H=300,pL=48,pR=56,pT=28,pB=40;
  var pW=W-pL-pR,pH=H-pT-pB;
  var n=sorted.length;

  // 좌측 Y축: 방문수
  var mx=1;
  sorted.forEach(function(d){if((d.visits||0)>mx)mx=d.visits});
  mx=Math.ceil(mx/5)*5||5;

  // 우측 Y축: 전환율 (%)
  var mxR=1;
  sorted.forEach(function(d){if((d.convCard||0)>mxR)mxR=d.convCard;if((d.convVisit||0)>mxR)mxR=d.convVisit});
  mxR=Math.ceil(mxR/2)*2||2;
  if(mxR<4) mxR=4;

  var svg='<svg viewBox="0 0 '+W+' '+H+'">';

  // 그리드
  for(var i=0;i<=4;i++){
    var y=pT+pH-(pH*i/4);
    var v=Math.round(mx*i/4);
    var vR=(mxR*i/4).toFixed(1);
    svg+='<line x1="'+pL+'" y1="'+y+'" x2="'+(W-pR)+'" y2="'+y+'" stroke="#2a1a0a" stroke-width="1"/>';
    svg+='<text x="'+(pL-6)+'" y="'+(y+4)+'" fill="#8a7a5a" font-size="9" text-anchor="end">'+v+'</text>';
    svg+='<text x="'+(W-pR+6)+'" y="'+(y+4)+'" fill="#c44a4a" font-size="9" text-anchor="start">'+vR+'%</text>';
  }

  function gX(idx){return pL+(n>1?(pW/(n-1))*idx:pW/2)}
  function gY(val){return pT+pH-(val/mx)*pH}
  function gYR(val){return pT+pH-(val/mxR)*pH}

  // 방문 라인
  var vp=sorted.map(function(d,i){return gX(i)+','+gY(d.visits||0)});
  svg+='<polyline points="'+vp.join(' ')+'" fill="none" stroke="#c5975b" stroke-width="2"/>';

  // 결제 라인 (막대)
  var barW=n>1?Math.min((pW/(n-1))*0.4,16):20;
  sorted.forEach(function(d,i){
    var x=gX(i);
    var orders=d.orders||0;
    if(orders>0){
      var barH=Math.max((orders/mx)*pH,3);
      svg+='<rect x="'+(x-barW/2)+'" y="'+(pT+pH-barH)+'" width="'+barW+'" height="'+barH+'" fill="rgba(74,106,156,0.6)" rx="2"/>';
      svg+='<text x="'+x+'" y="'+(pT+pH-barH-4)+'" fill="#4a6a9c" font-size="8" text-anchor="middle">'+orders+'</text>';
    }
  });

  // 카드→결제 전환율 라인 (우축)
  var cp=sorted.map(function(d,i){return gX(i)+','+gYR(d.convCard||0)});
  svg+='<polyline points="'+cp.join(' ')+'" fill="none" stroke="#c44a4a" stroke-width="2"/>';

  // 방문→결제 전환율 라인 (우축)
  var vcp=sorted.map(function(d,i){return gX(i)+','+gYR(d.convVisit||0)});
  svg+='<polyline points="'+vcp.join(' ')+'" fill="none" stroke="#e8c56e" stroke-width="1.5" stroke-dasharray="4,3"/>';

  // 점 + 날짜
  sorted.forEach(function(d,i){
    var x=gX(i);
    svg+='<circle cx="'+x+'" cy="'+gY(d.visits||0)+'" r="3" fill="#c5975b"/>';
    svg+='<circle cx="'+x+'" cy="'+gYR(d.convCard||0)+'" r="3" fill="#c44a4a"/>';
    svg+='<circle cx="'+x+'" cy="'+gYR(d.convVisit||0)+'" r="2" fill="#e8c56e"/>';
    var show=n<=10||i%Math.ceil(n/8)===0||i===n-1;
    if(show) svg+='<text x="'+x+'" y="'+(H-8)+'" fill="#8a7a5a" font-size="9" text-anchor="middle">'+d.date.slice(5)+'</text>';
  });

  // 범례
  svg+='<circle cx="'+(pL+8)+'" cy="14" r="4" fill="#c5975b"/><text x="'+(pL+16)+'" y="18" fill="#c5975b" font-size="9">방문</text>';
  svg+='<rect x="'+(pL+52)+'" y="10" width="8" height="8" fill="rgba(74,106,156,0.6)" rx="1"/><text x="'+(pL+64)+'" y="18" fill="#4a6a9c" font-size="9">결제</text>';
  svg+='<circle cx="'+(pL+104)+'" cy="14" r="4" fill="#c44a4a"/><text x="'+(pL+112)+'" y="18" fill="#c44a4a" font-size="9">카드→결제%</text>';
  svg+='<circle cx="'+(pL+190)+'" cy="14" r="4" fill="#e8c56e"/><text x="'+(pL+198)+'" y="18" fill="#e8c56e" font-size="9">방문→결제%</text>';
  svg+='</svg>';
  w.innerHTML=svg;

  // ── 일별 전환율 테이블 ──
  var tableId='dailyConvTable';
  var oldTable=document.getElementById(tableId);
  if(oldTable) oldTable.remove();

  var tbl=document.createElement('div');
  tbl.id=tableId;
  tbl.className='table-wrap';
  tbl.style.marginTop='16px';

  var th='<table><thead><tr><th>날짜</th><th>방문</th><th>카드</th><th>결제</th><th>매출</th><th>방문→결제</th><th>카드→결제</th><th>객단가</th></tr></thead><tbody>';
  sorted.slice().reverse().forEach(function(d){
    th+='<tr><td>'+d.date.slice(5)+'</td><td>'+fmt(d.visits||0)+'</td><td>'+fmt(d.cards||0)+'</td><td style="color:var(--gold);font-weight:700">'+(d.orders||0)+'</td><td>'+fmt(d.revenue||0)+'</td><td style="color:#e8c56e">'+(d.convVisit||0).toFixed(2)+'%</td><td style="color:#c44a4a;font-weight:700">'+(d.convCard||0).toFixed(2)+'%</td><td>'+fmt(d.avgOrderValue||0)+'</td></tr>';
  });
  th+='</tbody></table>';
  tbl.innerHTML=th;
  w.parentNode.insertBefore(tbl,w.nextSibling);
}


// ══════ 주문 관리 ══════
function loadOrders(){
  fetch(API+'/admin/orders?pw='+encodeURIComponent(PW))
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.success){showToast('주문 불러오기 실패');return}
      allOrders=d.orders;
      updateOrderStats();
      renderOrders();
    })
    .catch(function(){showToast('서버 연결 실패')});
}

function updateOrderStats(){
  var paid=allOrders.filter(function(o){return o.paymentStatus==='confirmed'||o.status==='done'});
  var rev=paid.reduce(function(s,o){return s+(o.price||0)},0);
  var today=new Date().toISOString().slice(0,10);
  var todayO=allOrders.filter(function(o){return o.createdAt&&o.createdAt.slice(0,10)===today});
  document.getElementById('oStatTotal').textContent=allOrders.length;
  document.getElementById('oStatPaid').textContent=paid.length;
  document.getElementById('oStatRev').textContent=fmt(rev);
  document.getElementById('oStatToday').textContent=todayO.length;
}

function filterOrders(btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  currentFilter=btn.dataset.f;
  renderOrders();
}

function renderOrders(){
  var orders=allOrders;
  if(currentFilter==='waiting') orders=orders.filter(function(o){return o.paymentStatus==='waiting'});
  else if(currentFilter==='confirmed') orders=orders.filter(function(o){return o.paymentStatus==='confirmed'&&o.status!=='done'});
  else if(currentFilter==='processing') orders=orders.filter(function(o){return o.status==='processing'});
  else if(currentFilter==='done') orders=orders.filter(function(o){return o.status==='done'});

  var list=document.getElementById('orderList');
  if(!orders.length){list.innerHTML='<div class="empty">주문이 없습니다</div>';return}

  var resultPages={HW1:'v2/chogyeon-result.html',HW2:'v2/jaemul-result.html',HW3:'v2/bonpuli-result.html'};

  list.innerHTML=orders.map(function(o){
    var sc=o.status==='done'?'s-done':(o.status==='processing'?'s-processing':(o.paymentStatus==='confirmed'?'s-confirmed':'s-waiting'));
    var stText='대기';
    var stBadge='st-waiting';
    if(o.paymentStatus==='waiting'){stText='대기';stBadge='st-waiting'}
    else if(o.status==='done'&&o.alimtalkFailed){stText='알림발송실패';stBadge='st-processing'}
    else if(o.status==='done'){stText='알림발송완료';stBadge='st-done'}
    else if(o.status==='error'){stText='생성실패';stBadge='st-processing'}
    else if(o.status==='processing'&&o.product==='HW3'){stText='풀이생성중';stBadge='st-confirmed'}
    else if(o.paymentStatus==='confirmed'){stText='풀이완료';stBadge='st-confirmed'}
    var resultUrl='https://readmelab.github.io/howangdang/'+(resultPages[o.product]||'chogyeon-result.html')+'?id='+o.orderId;

    return '<div class="order-card '+sc+'">'+
      '<div class="order-top"><span class="order-product">'+(o.productName||o.product)+(o.isUpgrade?' <span class="badge badge-up">업그레이드</span>':'')+'</span><span class="order-price">'+fmt(o.price||0)+'원</span></div>'+
      '<div class="order-top"><span class="status-badge '+stBadge+'">'+stText+'</span><span style="font-size:10px;color:var(--sub)">'+(o.createdAt?new Date(o.createdAt).toLocaleString('ko'):'')+'</span></div>'+
      '<div class="order-info">'+
        '<strong>이름:</strong> '+(o.user&&o.user.name||'-')+'<br>'+
        '<strong>연락처:</strong> '+(o.user&&o.user.phone||'-')+'<br>'+
        '<strong>생년월일:</strong> '+(o.user&&o.user.birthDate||'-')+'<br>'+
        '<strong>시:</strong> '+(o.user&&o.user.birthTime||'-')+'<br>'+
        (o.job?'<strong>직업:</strong> '+o.job+'<br>':'')+
        (o.marriage&&o.marriage!=='미입력'?'<strong>혼인:</strong> '+o.marriage+'<br>':'')+
        (o.interest&&o.interest!=='전체'?'<strong>관심:</strong> '+o.interest+'<br>':'')+
        (o.question?'<strong>질문:</strong> '+o.question+'<br>':'')+
        (o.question2?'<strong>질문2:</strong> '+o.question2+'<br>':'')+
        '<strong>주문번호:</strong> '+o.orderId+
      '</div>'+
      '<div class="order-actions">'+
        (o.paymentStatus==='confirmed'&&o.status!=='done'?'<button class="action-btn btn-done" onclick="markDone(\''+o.orderId+'\')">풀이 완료</button>':'')+
        (o.product==='HW3'&&o.status==='error'?'<button class="action-btn btn-done" onclick="retryBonpuri(\''+o.orderId+'\')">본풀이 재생성</button>':'')+
        (o.paymentStatus==='confirmed'?'<button class="action-btn btn-copy" onclick="resendAlimtalk(\''+o.orderId+'\')">알림톡 재발송</button>':'')+
        '<button class="action-btn btn-copy" onclick="copyInfo(\''+o.orderId+'\')">정보 복사</button>'+
        (o.paymentStatus==='confirmed'?'<a class="action-btn btn-result" href="'+resultUrl+'" target="_blank">결과 보기</a>':'')+
      '</div>'+
    '</div>';
  }).join('');
}

function markDone(orderId){
  if(!confirm('풀이 완료 처리할까요?')) return;
  fetch(API+'/admin/done',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({orderId:orderId,pw:PW})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success){showToast('완료 처리됨');loadOrders()}
    else showToast('실패: '+(d.error||''));
  }).catch(function(){showToast('서버 오류')});
}

function copyInfo(orderId){
  var o=allOrders.find(function(x){return x.orderId===orderId});
  if(!o) return;
  var t='['+(o.productName||o.product)+'] '+(o.user&&o.user.name||'')+'\n연락처: '+(o.user&&o.user.phone||'')+'\n생년월일: '+(o.user&&o.user.birthDate||'')+'\n시: '+(o.user&&o.user.birthTime||'')+'\n'+(o.job?'직업: '+o.job+'\n':'')+(o.question?'질문: '+o.question+'\n':'')+'주문번호: '+o.orderId;
  navigator.clipboard.writeText(t).then(function(){showToast('복사 완료')});
}

function retryBonpuri(orderId){
  if(!confirm('본풀이를 재생성할까요?')) return;
  fetch(API+'/admin/retry-bonpuri',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({orderId:orderId,pw:PW})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success){showToast('재생성 시작됨 (1~2분 소요)');loadOrders()}
    else showToast('실패: '+(d.error||''));
  }).catch(function(){showToast('서버 오류')});
}

function resendAlimtalk(orderId){
  if(!confirm('알림톡을 재발송할까요?')) return;
  fetch(API+'/admin/resend-alimtalk',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({orderId:orderId,pw:PW})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.success) showToast('알림톡 발송 완료');
    else showToast('실패: '+(d.error||''));
  }).catch(function(){showToast('서버 오류')});
}

function renderMonitorStatus(d){
  var todayData=d.daily[d.today]||{};
  var h=todayData.hourly||{};
  var now=new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul',hour:'2-digit',hour12:false}).padStart(2,'0');
  var prevH=String(Number(now)-1).padStart(2,'0');
  var curVisits=(h[now]&&h[now].visits)||0;
  var prevVisits=(h[prevH]&&h[prevH].visits)||0;
  var curCards=(h[now]&&h[now].cards)||0;
  var curOrders=(h[now]&&h[now].orders)||0;

  var visitColor=curVisits>0?'var(--green)':(prevVisits>0?'#c5975b':'#c44a4a');
  var visitLabel=curVisits>0?'정상':(prevVisits>0?'주의':'경고');

  var el=document.getElementById('monitorStatus');
  el.innerHTML=
    '<div class="stat-card" style="border-top:3px solid '+visitColor+'"><div class="label">이번 시간 방문</div><div class="value" style="color:'+visitColor+'">'+curVisits+'</div><div class="unit">'+visitLabel+'</div></div>'+
    '<div class="stat-card"><div class="label">이번 시간 카드</div><div class="value">'+curCards+'</div><div class="unit">회</div></div>'+
    '<div class="stat-card"><div class="label">이번 시간 결제</div><div class="value">'+curOrders+'</div><div class="unit">건</div></div>'+
    '<div class="stat-card"><div class="label">오늘 총 방문</div><div class="value">'+(todayData.totalVisits||0)+'</div><div class="unit">명</div></div>'+
    '<div class="stat-card"><div class="label">오늘 총 카드</div><div class="value">'+(todayData.totalCards||0)+'</div><div class="unit">회</div></div>';
}

function renderHourlyChart(d){
  var todayData=d.daily[d.today]||{};
  var h=todayData.hourly||{};
  var W=800,H=200,pL=48,pR=16,pT=28,pB=32;
  var pW=W-pL-pR,pH=H-pT-pB;
  var mx=1;
  for(var i=0;i<24;i++){
    var k=String(i).padStart(2,'0');
    var hd=h[k]||{};
    var v=(hd.visits||0);
    if(v>mx) mx=v;
  }
  mx=Math.ceil(mx/5)*5||5;

  var svg='<svg viewBox="0 0 '+W+' '+H+'">';
  for(var g=0;g<=4;g++){
    var y=pT+pH-(pH*g/4);
    var v2=Math.round(mx*g/4);
    svg+='<line x1="'+pL+'" y1="'+y+'" x2="'+(W-pR)+'" y2="'+y+'" stroke="#2a1a0a" stroke-width="1"/>';
    svg+='<text x="'+(pL-6)+'" y="'+(y+4)+'" fill="#8a7a5a" font-size="9" text-anchor="end">'+v2+'</text>';
  }

  var bw=(pW/24)*0.7;
  var gap=(pW/24)*0.3;
  var nowH=Number(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul',hour:'2-digit',hour12:false}));

  for(var i=0;i<24;i++){
    var k=String(i).padStart(2,'0');
    var hd=h[k]||{};
    var visits=hd.visits||0;
    var cards=hd.cards||0;
    var orders=hd.orders||0;
    var x=pL+(pW/24)*i;
    var barH=visits>0?(visits/mx)*pH:0;
    var opacity=i<=nowH?1:0.3;

    svg+='<rect x="'+x+'" y="'+(pT+pH-barH)+'" width="'+bw+'" height="'+barH+'" fill="#c5975b" opacity="'+opacity+'" rx="2"/>';
    if(cards>0){
      var cH=(cards/mx)*pH;
      svg+='<rect x="'+(x+bw*0.15)+'" y="'+(pT+pH-cH)+'" width="'+(bw*0.35)+'" height="'+cH+'" fill="#4a8c5c" opacity="0.7" rx="1"/>';
    }
    if(orders>0){
      var oH=Math.max((orders/mx)*pH,4);
      svg+='<circle cx="'+(x+bw/2)+'" cy="'+(pT+pH-oH)+'" r="4" fill="#c44a4a"/>';
    }
    if(i%2===0) svg+='<text x="'+(x+bw/2)+'" y="'+(H-6)+'" fill="#8a7a5a" font-size="8" text-anchor="middle">'+k+'</text>';
  }

  svg+='<rect x="'+(pL+8)+'" y="10" width="8" height="8" fill="#c5975b" rx="1"/><text x="'+(pL+20)+'" y="18" fill="#c5975b" font-size="9">방문</text>';
  svg+='<rect x="'+(pL+60)+'" y="10" width="8" height="8" fill="#4a8c5c" rx="1"/><text x="'+(pL+72)+'" y="18" fill="#4a8c5c" font-size="9">카드</text>';
  svg+='<circle cx="'+(pL+116)+'" cy="14" r="4" fill="#c44a4a"/><text x="'+(pL+124)+'" y="18" fill="#c44a4a" font-size="9">결제</text>';
  svg+='</svg>';

  document.getElementById('hourlyChart').innerHTML=svg;
}

function renderCardTypes(d){
  var ct=d.cardTypes||{};
  var names={'howangpae':'호왕패','suhopae':'수호패'};
  var tbody=document.getElementById('cardTypeTbody');
  var keys=Object.keys(ct).sort();
  if(!keys.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--sub)">데이터 없음</td></tr>';return}
  var html='';
  keys.forEach(function(k){
    var c=ct[k];
    var diff=c.yesterday>0?((c.today-c.yesterday)/c.yesterday*100).toFixed(0):'--';
    var diffColor=diff==='--'?'var(--sub)':(Number(diff)>=0?'var(--green)':'#c44a4a');
    var warn=c.yesterday>0&&c.today<c.yesterday*0.5?' style="background:rgba(196,74,74,.1)"':'';
    html+='<tr'+warn+'><td style="font-weight:700">'+(names[k]||k)+'</td><td>'+c.today+'</td><td>'+c.yesterday+'</td><td>'+c.week+'</td><td style="color:'+diffColor+'">'+(diff==='--'?'-':diff+'%')+'</td></tr>';
  });
  tbody.innerHTML=html;
}

function runHealthCheck(){
  var el=document.getElementById('healthResult');
  el.innerHTML='<div style="color:var(--sub);font-size:12px">체크 중...</div>';
  var checks=[
    {name:'서버 응답',url:API+'/',method:'GET'},
    {name:'Firestore 연결',url:API+'/test-firestore',method:'GET'},
    {name:'대시보드 API',url:API+'/admin/dashboard?pw='+encodeURIComponent(PW)+'&period=7d',method:'GET'},
    {name:'시간별 API',url:API+'/admin/hourly?pw='+encodeURIComponent(PW),method:'GET'}
  ];
  var results=[];
  var done=0;
  checks.forEach(function(c,i){
    var start=Date.now();
    fetch(c.url).then(function(r){return r.json().then(function(d){
      results[i]={name:c.name,ok:true,ms:Date.now()-start,detail:r.status};
    })}).catch(function(e){
      results[i]={name:c.name,ok:false,ms:Date.now()-start,detail:e.message};
    }).finally(function(){
      done++;
      if(done===checks.length) showHealthResults(results);
    });
  });
}

function showHealthResults(results){
  var html='';
  results.forEach(function(r){
    var color=r.ok?'var(--green)':'#c44a4a';
    var icon=r.ok?'●':'✖';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px"><span style="color:'+color+';font-size:16px">'+icon+'</span><span>'+r.name+'</span><span style="color:var(--sub);font-size:11px">'+r.ms+'ms</span></div>';
  });
  document.getElementById('healthResult').innerHTML=html;
}

function loadPaidTests(){
  fetch(API+'/admin/orders?pw='+encodeURIComponent(PW))
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.success||!d.orders.length) return;
      var pages={HW1:'v2/chogyeon-result.html',HW2:'v2/jaemul-result.html',HW3:'v2/bonpuli-result.html'};
      var names={HW1:'초견',HW2:'재물풀이',HW3:'본풀이'};
      var found={};
      d.orders.forEach(function(o){
        if(o.paymentStatus==='confirmed'&&!found[o.product]){found[o.product]=o}
      });
      var html='';
      Object.keys(found).forEach(function(p){
        var o=found[p];
        var url='https://readmelab.github.io/howangdang/'+pages[p]+'?id='+o.orderId;
        html+='<a class="action-btn btn-result" href="'+url+'" target="_blank" style="margin-right:6px">'+(names[p]||p)+' ('+o.orderId.slice(-6)+')</a>';
      });
      html+='<button class="action-btn btn-copy" onclick="testResultAPIs()" style="margin-left:8px">결과 API 일괄 체크</button>';
      document.getElementById('paidTestBtns').innerHTML=html||'<span style="color:var(--sub);font-size:12px">결제 주문 없음</span>';
    });
}

function testResultAPIs(){
  var el=document.getElementById('paidTestResult');
  el.innerHTML='<div style="color:var(--sub);font-size:12px">체크 중...</div>';
  fetch(API+'/admin/orders?pw='+encodeURIComponent(PW))
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.success) return;
      var found={};
      d.orders.forEach(function(o){if(o.paymentStatus==='confirmed'&&!found[o.product]) found[o.product]=o});
      var keys=Object.keys(found);
      var results=[];var done=0;
      var names={HW1:'초견',HW2:'재물풀이',HW3:'본풀이'};
      keys.forEach(function(p,i){
        fetch(API+'/result/'+found[p].orderId)
          .then(function(r){return r.json().then(function(j){results[i]={name:names[p],ok:!j.error,id:found[p].orderId}})})
          .catch(function(){results[i]={name:names[p],ok:false,id:found[p].orderId}})
          .finally(function(){
            done++;
            if(done===keys.length){
              var h='';results.forEach(function(r2){
                h+='<div style="font-size:13px;margin-bottom:4px"><span style="color:'+(r2.ok?'var(--green)':'#c44a4a')+'">'+(r2.ok?'●':'✖')+'</span> '+r2.name+' ('+r2.id.slice(-6)+')</div>';
              });
              el.innerHTML=h;
            }
          });
      });
    });
}
