<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>결제 처리 중…</title>
<style>
  body{margin:0;background:#0d0906;color:#c8a96e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Noto Serif KR',serif;}
  .msg{text-align:center;font-size:16px;letter-spacing:2px;}
</style>
</head><body>
<div class="msg">재물풀이를 준비하고 있습니다…</div>
<script>
(async function(){
  var API_BASE = 'https://hw-server-v2-1075269376260.asia-northeast3.run.app';
  var p = new URLSearchParams(location.search);
  var orderId = p.get('orderId');
  var paymentKey = p.get('paymentKey');
  var amount = p.get('amount');

  if(!orderId || !paymentKey){
    alert('결제 정보를 찾을 수 없습니다.');
    return;
  }

  try {
    var res = await fetch(API_BASE+'/confirm', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ orderId: orderId, paymentKey: paymentKey, amount: Number(amount) })
    });
    var result = await res.json();
    if(result.success){
      location.href = 'jaemul-result.html?id=' + orderId;
    } else {
      alert('결제 확인 실패: ' + (result.error||''));
    }
  } catch(err){
    alert('오류: ' + err.message);
  }
})();
</script>
</body></html>
