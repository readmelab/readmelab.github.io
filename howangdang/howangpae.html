<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>호왕패 - 虎王堂</title>
<meta property="og:title" content="호왕패 - 너의 사주를 한 장에 담다">
<meta property="og:description" content="생년월일만 넣어라. 호왕이 네 패를 꺼내주마.">
<meta property="og:image" content="https://audio.readmelab.co.kr/howang/door.jpeg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Serif KR', serif;
  background: #000;
  color: #e8d5b0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========== 화면 1: 입력 폼 ========== */
#screen-input {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: radial-gradient(ellipse at center, #1a1008 0%, #000 70%);
  position: relative;
}

#screen-input::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url('https://audio.readmelab.co.kr/howang/door.jpeg') center center / cover no-repeat;
  opacity: 0.15;
  z-index: 0;
}

#screen-input > * { position: relative; z-index: 1; }

.logo-text {
  font-size: 42px;
  font-weight: 900;
  color: #c5975b;
  text-shadow: 0 0 20px rgba(197,151,91,0.5);
  letter-spacing: 8px;
  margin-bottom: 8px;
}

.logo-sub {
  font-size: 14px;
  color: #8a7a5a;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.form-box {
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.form-row {
  display: flex;
  gap: 8px;
}

.form-row select, .form-row input {
  flex: 1;
}

label {
  font-size: 13px;
  color: #8a7a5a;
  margin-bottom: 4px;
  display: block;
}

select, input[type="number"] {
  width: 100%;
  padding: 14px 12px;
  background: rgba(26,16,8,0.9);
  border: 1px solid #3a2a1a;
  border-radius: 8px;
  color: #e8d5b0;
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  outline: none;
  -webkit-appearance: none;
}

select:focus, input:focus {
  border-color: #c5975b;
}

select option {
  background: #1a1008;
  color: #e8d5b0;
}

.gender-row {
  display: flex;
  gap: 8px;
}

.gender-btn {
  flex: 1;
  padding: 14px;
  background: rgba(26,16,8,0.9);
  border: 1px solid #3a2a1a;
  border-radius: 8px;
  color: #8a7a5a;
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s;
}

.gender-btn.active {
  border-color: #c5975b;
  color: #c5975b;
  background: rgba(197,151,91,0.1);
}

.submit-btn {
  margin-top: 12px;
  padding: 16px;
  background: linear-gradient(135deg, #8B1A1A, #5a1010);
  border: 1px solid #c5975b;
  border-radius: 8px;
  color: #e8d5b0;
  font-family: 'Noto Serif KR', serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 4px;
  transition: all 0.3s;
}

.submit-btn:hover {
  background: linear-gradient(135deg, #a52020, #7a1a1a);
  transform: scale(1.02);
}

/* ========== 화면 2: 로딩 (문 열림) ========== */
#screen-loading {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #000;
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.door-container {
  width: 100%;
  max-width: 400px;
  position: relative;
}

.door-img {
  width: 100%;
  border-radius: 4px;
  transition: transform 2s ease-in-out, opacity 1s ease;
}

.door-img.zoom {
  transform: scale(1.8);
  opacity: 0;
}

.loading-text {
  position: absolute;
  bottom: 15%;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 16px;
  color: #c5975b;
  text-shadow: 0 0 10px rgba(197,151,91,0.8);
  opacity: 0;
  transition: opacity 0.5s;
}

.loading-text.show {
  opacity: 1;
}

/* ========== 화면 3: 카드 결과 ========== */
#screen-result {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  padding: 30px 20px 60px;
  background: radial-gradient(ellipse at center top, #1a1008 0%, #000 60%);
  opacity: 0;
  transition: opacity 1s ease;
}

#screen-result.show {
  opacity: 1;
}

.card-wrapper {
  width: 100%;
  max-width: 380px;
  background: linear-gradient(180deg, #1a1208 0%, #0a0a06 100%);
  border: 1px solid #3a2a1a;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(197,151,91,0.15);
}

.card-image-area {
  width: 100%;
  aspect-ratio: 1 / 1.1;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0a06;
}

.card-image-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-text-area {
  padding: 24px 20px;
}

.card-element-tag {
  display: inline-block;
  padding: 4px 12px;
  border: 1px solid #c5975b;
  border-radius: 20px;
  font-size: 12px;
  color: #c5975b;
  margin-bottom: 12px;
}

.card-title {
  font-size: 28px;
  font-weight: 900;
  color: #c5975b;
  margin-bottom: 8px;
  text-shadow: 0 0 15px rgba(197,151,91,0.3);
}

.card-oneliner {
  font-size: 15px;
  color: #e8d5b0;
  line-height: 1.6;
  margin-bottom: 16px;
  font-style: italic;
}

.card-description {
  font-size: 14px;
  color: #a89878;
  line-height: 1.8;
  margin-bottom: 20px;
}

.card-season {
  font-size: 13px;
  color: #8a7a5a;
  padding: 12px;
  background: rgba(197,151,91,0.05);
  border-left: 2px solid #c5975b;
  margin-bottom: 20px;
  line-height: 1.6;
}

/* 사기둥 */
.pillars-section {
  margin-bottom: 20px;
}

.pillars-title {
  font-size: 12px;
  color: #8a7a5a;
  margin-bottom: 8px;
}

.pillars-row {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.pillar-box {
  width: 60px;
  text-align: center;
  padding: 8px 4px;
  background: rgba(26,16,8,0.8);
  border: 1px solid #2a1a0a;
  border-radius: 6px;
}

.pillar-label {
  font-size: 10px;
  color: #8a7a5a;
  margin-bottom: 4px;
}

.pillar-hanja {
  font-size: 18px;
  color: #c5975b;
  font-weight: 700;
}

.pillar-hangul {
  font-size: 10px;
  color: #8a7a5a;
  margin-top: 2px;
}

/* 오행 게이지 */
.gauge-section {
  margin-bottom: 20px;
}

.gauge-title {
  font-size: 12px;
  color: #8a7a5a;
  margin-bottom: 10px;
}

.gauge-row {
  display: flex;
  align-items: center;
  margin-bottom: 6px;
  gap: 8px;
}

.gauge-label {
  width: 24px;
  font-size: 14px;
  text-align: center;
}

.gauge-bar-bg {
  flex: 1;
  height: 8px;
  background: #1a1208;
  border-radius: 4px;
  overflow: hidden;
}

.gauge-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 1.5s ease;
  width: 0;
}

.gauge-pct {
  width: 32px;
  font-size: 11px;
  color: #8a7a5a;
  text-align: right;
}

.gauge-wood .gauge-bar { background: #4a8c5c; }
.gauge-fire .gauge-bar { background: #c44a4a; }
.gauge-earth .gauge-bar { background: #b8963a; }
.gauge-metal .gauge-bar { background: #a0a0b0; }
.gauge-water .gauge-bar { background: #4a6a9c; }

/* CTA */
.cta-section {
  margin-top: 24px;
  text-align: center;
}

.cta-text {
  font-size: 14px;
  color: #8a7a5a;
  margin-bottom: 12px;
  line-height: 1.6;
}

.cta-btn {
  display: inline-block;
  padding: 14px 32px;
  background: linear-gradient(135deg, #8B1A1A, #5a1010);
  border: 1px solid #c5975b;
  border-radius: 8px;
  color: #e8d5b0;
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  letter-spacing: 2px;
  transition: all 0.3s;
}

.cta-btn:hover {
  background: linear-gradient(135deg, #a52020, #7a1a1a);
}

/* 다시하기 */
.retry-btn {
  margin-top: 20px;
  padding: 10px 24px;
  background: none;
  border: 1px solid #3a2a1a;
  border-radius: 8px;
  color: #8a7a5a;
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  cursor: pointer;
}

.watermark {
  margin-top: 24px;
  font-size: 11px;
  color: #3a2a1a;
}
</style>
</head>
<body>

<!-- ========== 화면 1: 입력 ========== -->
<div id="screen-input">
  <div class="logo-text">虎王堂</div>
  <div class="logo-sub">호왕패를 뽑아보거라</div>

  <div class="form-box">
    <div>
      <label>생년월일</label>
      <div class="form-row">
        <input type="number" id="birthYear" placeholder="년" min="1920" max="2025">
        <select id="birthMonth">
          <option value="" disabled selected>월</option>
          <option value="1">1월</option><option value="2">2월</option>
          <option value="3">3월</option><option value="4">4월</option>
          <option value="5">5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option>
          <option value="9">9월</option><option value="10">10월</option>
          <option value="11">11월</option><option value="12">12월</option>
        </select>
        <select id="birthDay">
          <option value="" disabled selected>일</option>
        </select>
      </div>
    </div>

    <div>
      <label>양력 / 음력</label>
      <div class="gender-row">
        <button class="gender-btn active" data-cal="solar" onclick="selectCal(this)">양력</button>
        <button class="gender-btn" data-cal="lunar" onclick="selectCal(this)">음력</button>
      </div>
    </div>

    <div>
      <label>성별</label>
      <div class="gender-row">
        <button class="gender-btn" data-gender="male" onclick="selectGender(this)">남</button>
        <button class="gender-btn" data-gender="female" onclick="selectGender(this)">여</button>
      </div>
    </div>

    <button class="submit-btn" onclick="submitForm()">패를 뽑다</button>
  </div>
</div>

<!-- ========== 화면 2: 로딩 ========== -->
<div id="screen-loading">
  <div class="door-container">
    <img class="door-img" src="https://audio.readmelab.co.kr/howang/door.jpeg" alt="호왕당 문">
    <div class="loading-text" id="loadingText"></div>
  </div>
</div>

<!-- ========== 화면 3: 결과 ========== -->
<div id="screen-result">
  <div class="card-wrapper">
    <div class="card-image-area">
      <img id="cardImage" src="" alt="호왕패">
    </div>
    <div class="card-text-area">
      <div class="card-element-tag" id="cardTag"></div>
      <div class="card-title" id="cardTitle"></div>
      <div class="card-oneliner" id="cardOneliner"></div>
      <div class="card-description" id="cardDescription"></div>
      <div class="card-season" id="cardSeason"></div>

      <div class="pillars-section">
        <div class="pillars-title">사주 원국 (四柱)</div>
        <div class="pillars-row">
          <div class="pillar-box">
            <div class="pillar-label">시주</div>
            <div class="pillar-hanja" id="pHour"></div>
            <div class="pillar-hangul" id="pHourH"></div>
          </div>
          <div class="pillar-box">
            <div class="pillar-label">일주</div>
            <div class="pillar-hanja" id="pDay"></div>
            <div class="pillar-hangul" id="pDayH"></div>
          </div>
          <div class="pillar-box">
            <div class="pillar-label">월주</div>
            <div class="pillar-hanja" id="pMonth"></div>
            <div class="pillar-hangul" id="pMonthH"></div>
          </div>
          <div class="pillar-box">
            <div class="pillar-label">년주</div>
            <div class="pillar-hanja" id="pYear"></div>
            <div class="pillar-hangul" id="pYearH"></div>
          </div>
        </div>
      </div>

      <div class="gauge-section">
        <div class="gauge-title">오행 분포</div>
        <div class="gauge-row gauge-wood">
          <div class="gauge-label">木</div>
          <div class="gauge-bar-bg"><div class="gauge-bar" id="gWood"></div></div>
          <div class="gauge-pct" id="gWoodPct"></div>
        </div>
        <div class="gauge-row gauge-fire">
          <div class="gauge-label">火</div>
          <div class="gauge-bar-bg"><div class="gauge-bar" id="gFire"></div></div>
          <div class="gauge-pct" id="gFirePct"></div>
        </div>
        <div class="gauge-row gauge-earth">
          <div class="gauge-label">土</div>
          <div class="gauge-bar-bg"><div class="gauge-bar" id="gEarth"></div></div>
          <div class="gauge-pct" id="gEarthPct"></div>
        </div>
        <div class="gauge-row gauge-metal">
          <div class="gauge-label">金</div>
          <div class="gauge-bar-bg"><div class="gauge-bar" id="gMetal"></div></div>
          <div class="gauge-pct" id="gMetalPct"></div>
        </div>
        <div class="gauge-row gauge-water">
          <div class="gauge-label">水</div>
          <div class="gauge-bar-bg"><div class="gauge-bar" id="gWater"></div></div>
          <div class="gauge-pct" id="gWaterPct"></div>
        </div>
      </div>

      <div class="cta-section">
        <div class="cta-text" id="ctaText"></div>
        <a class="cta-btn" href="https://howangdang.com" target="_blank">초견 풀이 받기</a>
      </div>
    </div>
  </div>

  <button class="retry-btn" onclick="retry()">다시 뽑기</button>
  <div class="watermark">@howangdang</div>
</div>

<script>
const API_URL = 'https://hw-server-1075269376260.asia-northeast3.run.app/api/howangpae';
const DOOR_SOUND = 'https://audio.readmelab.co.kr/howang/door_creak.mp3';

let selectedGender = '';
let selectedCal = 'solar';

// 일 선택지 채우기
const daySelect = document.getElementById('birthDay');
for (let i = 1; i <= 31; i++) {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = i + '일';
  daySelect.appendChild(opt);
}

function selectGender(btn) {
  document.querySelectorAll('[data-gender]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedGender = btn.dataset.gender;
}

function selectCal(btn) {
  document.querySelectorAll('[data-cal]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedCal = btn.dataset.cal;
}

async function submitForm() {
  const year = document.getElementById('birthYear').value;
  const month = document.getElementById('birthMonth').value;
  const day = document.getElementById('birthDay').value;

  if (!year || !month || !day) {
    alert('생년월일을 입력해주세요.');
    return;
  }
  if (!selectedGender) {
    alert('성별을 선택해주세요.');
    return;
  }

  // 화면 전환: 입력 → 로딩
  document.getElementById('screen-input').style.display = 'none';
  const loadingScreen = document.getElementById('screen-loading');
  loadingScreen.style.display = 'flex';

  // 문 소리 재생
  try {
    const audio = new Audio(DOOR_SOUND);
    audio.volume = 0.7;
    audio.play();
  } catch(e) {}

  // 로딩 텍스트 연출
  const messages = [
    '호왕이 사주를 살피는 중이다...',
    '사기둥을 펼치는 중이다...',
    '네 기운이 보인다...'
  ];

  const loadingText = document.getElementById('loadingText');

  for (let i = 0; i < messages.length; i++) {
    await wait(1200);
    loadingText.textContent = messages[i];
    loadingText.classList.add('show');
    await wait(1200);
    if (i < messages.length - 1) {
      loadingText.classList.remove('show');
      await wait(300);
    }
  }

  // API 호출
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        gender: selectedGender,
        birthYear: Number(year),
        birthMonth: Number(month),
        birthDay: Number(day),
        calendarType: selectedCal
      })
    });

    const data = await res.json();

    if (!data.success) {
      alert('오류가 발생했습니다: ' + (data.error || ''));
      retry();
      return;
    }

    // 문 줌인 + 페이드
    const doorImg = document.querySelector('.door-img');
    doorImg.classList.add('zoom');

    await wait(1500);

    // 카드 결과 렌더링
    renderCard(data);

    // 화면 전환: 로딩 → 결과
    loadingScreen.style.display = 'none';
    const resultScreen = document.getElementById('screen-result');
    resultScreen.style.display = 'flex';
    await wait(50);
    resultScreen.classList.add('show');

    // 오행 게이지 애니메이션
    await wait(300);
    animateGauge(data.spiProperties.elementGauge);

  } catch (err) {
    alert('서버 연결에 실패했습니다. 다시 시도해주세요.');
    retry();
  }
}

function renderCard(data) {
  const card = data.card;
  const spi = data.spiProperties;

  document.getElementById('cardImage').src = card.imageUrl;
  document.getElementById('cardTag').textContent = `${card.elementKo} ${card.animalKo} · ${spi.dayGan} 일간`;
  document.getElementById('cardTitle').textContent = card.title;
  document.getElementById('cardOneliner').textContent = `"${card.oneLiner}"`;
  document.getElementById('cardDescription').textContent = card.description;
  document.getElementById('cardSeason').textContent = card.seasonLine;

  // 사기둥
  document.getElementById('pYear').textContent = spi.fourPillars.year;
  document.getElementById('pMonth').textContent = spi.fourPillars.month;
  document.getElementById('pDay').textContent = spi.fourPillars.day;
  document.getElementById('pHour').textContent = spi.fourPillars.hour;
  document.getElementById('pYearH').textContent = spi.fourPillarsHangul.year;
  document.getElementById('pMonthH').textContent = spi.fourPillarsHangul.month;
  document.getElementById('pDayH').textContent = spi.fourPillarsHangul.day;
  document.getElementById('pHourH').textContent = spi.fourPillarsHangul.hour;

  // CTA
  document.getElementById('ctaText').textContent = card.cta;
}

function animateGauge(gauge) {
  const elements = ['wood', 'fire', 'earth', 'metal', 'water'];
  const ids = ['Wood', 'Fire', 'Earth', 'Metal', 'Water'];

  elements.forEach((el, i) => {
    const pct = gauge[el] || 0;
    document.getElementById('g' + ids[i]).style.width = pct + '%';
    document.getElementById('g' + ids[i] + 'Pct').textContent = pct + '%';
  });
}

function retry() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-result').classList.remove('show');
  document.getElementById('screen-loading').style.display = 'none';
  document.querySelector('.door-img').classList.remove('zoom');
  document.getElementById('screen-input').style.display = 'flex';
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}
</script>
</body>
</html>
