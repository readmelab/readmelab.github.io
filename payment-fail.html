<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나를읽다 연구소 | 결제 실패</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0a0a0f;color:#f0e6d3;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.wrap{max-width:400px}
.icon{font-size:3rem;margin-bottom:20px}
h1{font-size:1.2rem;margin-bottom:12px;color:#ef4444}
p{font-size:.85rem;color:#a09880;line-height:1.8;margin-bottom:8px}
.code{font-size:.75rem;color:#6a6455;margin-bottom:24px}
a{display:inline-block;padding:14px 40px;background:linear-gradient(135deg,#d4a853,#b8912a);color:#0a0a0f;font-size:.9rem;font-weight:700;border-radius:12px;text-decoration:none;letter-spacing:1px}
</style>
</head>
<body>
<div class="wrap">
    <div class="icon">⚠️</div>
    <h1>결제가 완료되지 않았습니다</h1>
    <p>다시 시도해 주세요.</p>
    <p class="code" id="errorMsg"></p>
    <a href="javascript:history.back()">돌아가기</a>
</div>
<script>
(function(){
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code') || '';
    var message = params.get('message') || '';
    if(message){
        document.getElementById('errorMsg').textContent = message;
    }
})();
</script>
</body>
</html>
