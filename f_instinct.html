<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>본능카드 | 나를읽다 연구소</title>
<meta name="description" content="MBTI는 겉모습, 사주는 본능. 둘이 같을까 다를까? 160가지 중 나만의 본능카드를 확인하세요.">

<!-- Open Graph -->
<meta property="og:title" content="나의 본능카드 | 나를읽다">
<meta property="og:description" content="MBTI와 사주 본능이 충돌할까, 조화를 이룰까? 무료로 확인하세요.">
<meta property="og:image" content="https://cards.readmelab.co.kr/og/instinct_og.jpg">
<meta property="og:url" content="https://readmelab.co.kr/f_instinct">

<!-- Kakao SDK -->
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --card-bg: #1a1a2e;
    --accent: #c9a96e;
    --accent-light: #e4cc9c;
    --text: #f0ede6;
    --text-dim: #8a8a9a;
    --clash: #d94a6a;
    --cross: #4a90d9;
    --harmony: #c9a96e;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 헤더 ── */
  .header {
    text-align: center;
    padding: 60px 20px 30px;
  }

  .header-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 30px;
  }

  .header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* ── 입력 폼 ── */
  .form-section {
    max-width: 420px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  .form-card {
    background: var(--surface);
    border: 1px solid rgba(201, 169, 110, 0.15);
    border-radius: 20px;
    padding: 32px 24px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .form-group select {
    width: 100%;
    padding: 14px 16px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.3s;
    -webkit-appearance: none;
  }

  .form-group select:focus {
    border-color: var(--accent);
  }

  .birth-selects {
    display: flex;
    gap: 8px;
  }

  .birth-selects select {
    flex: 1;
    padding: 14px 8px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.3s;
    -webkit-appearance: none;
    text-align: center;
  }

  .birth-selects select:focus {
    border-color: var(--accent);
  }

  .calendar-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .calendar-toggle button {
    flex: 1;
    padding: 10px;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .calendar-toggle button.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  .mbti-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .mbti-grid button {
    padding: 10px 0;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
  }

  .mbti-grid button.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }

  .mbti-grid button:hover {
    border-color: var(--accent);
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #b8943e);
    border: none;
    border-radius: 14px;
    color: var(--bg);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201, 169, 110, 0.3);
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* ── 로딩 ── */
  .loading-section {
    display: none;
    text-align: center;
    padding: 80px 20px;
  }

  .loading-section.show {
    display: block;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(201, 169, 110, 0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 24px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 16px;
    color: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── 결과 ── */
  .result-section {
    display: none;
    max-width: 420px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .result-section.show {
    display: block;
    animation: fadeUp 0.8s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── 본능 카드 ── */
  .card-capture {
    position: relative;
    width: 100%;
    aspect-ratio: 9/16;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 3px solid var(--accent);
  }

  .card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    z-index: 1;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 48%,
      rgba(10,10,15,0.4) 58%,
      rgba(10,10,15,0.85) 72%,
      rgba(10,10,15,0.97) 100%
    );
    z-index: 2;
  }

  .card-watermark {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    z-index: 3;
  }

  .card-content {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    padding: 0 24px 24px;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* 콤보 태그 */
  .combo-tag {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }

  /* 십성 라벨 */
  .sipseong-label {
    text-align: center;
    margin: 4px 0;
  }

  .sipseong-label .nickname {
    display: block;
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    margin-bottom: 2px;
  }

  .sipseong-label .hanja {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 4px;
  }

  /* 점수 */
  .score-section {
    width: 100%;
    text-align: center;
    margin: 6px 0;
  }

  .score-label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .score-number {
    font-size: 44px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 8px;
  }

  .gauge-track {
    width: 75%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    margin: 0 auto;
    overflow: hidden;
  }

  .gauge-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* 등급 뱃지 */
  .grade-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    margin-top: 2px;
  }

  /* 훅 텍스트 */
  .hook-text {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 1.7;
    word-break: keep-all;
    margin-top: 4px;
  }

  /* ── 설명 박스 (= flip-section 스타일) ── */
  .desc-section {
    background: var(--surface);
    border: 1px solid rgba(201, 169, 110, 0.15);
    border-radius: 16px;
    padding: 24px;
    margin-top: 20px;
    text-align: center;
  }

  .desc-label {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .desc-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
  }

  /* ── 버튼 ── */
  .action-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .action-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.3s;
  }

  .btn-save {
    background: var(--card-bg);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-share {
    background: #FEE500;
    color: #000;
  }

  .btn-save:hover { border-color: var(--accent); }
  .btn-share:hover { opacity: 0.9; }

  /* CTA */
  .cta-section {
    background: linear-gradient(135deg, rgba(201,169,110,0.1), rgba(201,169,110,0.05));
    border: 1px solid rgba(201, 169, 110, 0.2);
    border-radius: 16px;
    padding: 28px 24px;
    margin-top: 24px;
    text-align: center;
  }

  .cta-text {
    font-size: 15px;
    color: var(--accent-light);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .cta-btn {
    display: inline-block;
    padding: 14px 36px;
    background: linear-gradient(135deg, var(--accent), #b8943e);
    border: none;
    border-radius: 12px;
    color: var(--bg);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s;
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201, 169, 110, 0.3);
  }

  .retry-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.3s;
  }

  .retry-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* 에러 */
  .error-msg {
    display: none;
    text-align: center;
    padding: 16px;
    background: rgba(217, 74, 74, 0.1);
    border: 1px solid rgba(217, 74, 74, 0.3);
    border-radius: 12px;
    color: #d94a4a;
    font-size: 14px;
    margin-top: 16px;
  }

  .error-msg.show { display: block; }

  /* 푸터 */
  .footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 12px;
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }
</style>
</head>
<body>

<!-- ════════ 헤더 ════════ -->
<div class="header" id="headerSection">
  <div class="header-logo">나를읽다 연구소</div>
  <h1>본능 카드</h1>
  <p>MBTI는 겉모습, 사주는 본능.<br>둘이 같을까, 완전히 다를까?</p>
</div>

<!-- ════════ 입력 폼 ════════ -->
<div class="form-section" id="formSection">
  <div class="form-card">

    <div class="form-group">
      <label>생년월일</label>
      <div class="birth-selects">
        <select id="birthYear"></select>
        <select id="birthMonth"></select>
        <select id="birthDay"></select>
      </div>
    </div>

    <div class="calendar-toggle">
      <button type="button" class="active" data-cal="양력" onclick="setCalendar(this)">양력</button>
      <button type="button" data-cal="음력" onclick="setCalendar(this)">음력</button>
    </div>

    <div class="form-group">
      <label>성별</label>
      <select id="gender">
        <option value="남">남성</option>
        <option value="여">여성</option>
      </select>
    </div>

    <div class="form-group">
      <label>MBTI</label>
      <div class="mbti-grid" id="mbtiGrid">
        <button type="button" onclick="setMbti(this)">INTJ</button>
        <button type="button" onclick="setMbti(this)">INTP</button>
        <button type="button" onclick="setMbti(this)">ENTJ</button>
        <button type="button" onclick="setMbti(this)">ENTP</button>
        <button type="button" onclick="setMbti(this)">INFJ</button>
        <button type="button" onclick="setMbti(this)">INFP</button>
        <button type="button" onclick="setMbti(this)">ENFJ</button>
        <button type="button" onclick="setMbti(this)">ENFP</button>
        <button type="button" onclick="setMbti(this)">ISTJ</button>
        <button type="button" onclick="setMbti(this)">ISFJ</button>
        <button type="button" onclick="setMbti(this)">ESTJ</button>
        <button type="button" onclick="setMbti(this)">ESFJ</button>
        <button type="button" onclick="setMbti(this)">ISTP</button>
        <button type="button" onclick="setMbti(this)">ISFP</button>
        <button type="button" onclick="setMbti(this)">ESTP</button>
        <button type="button" onclick="setMbti(this)">ESFP</button>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="getMyCard()" disabled>본능 카드 뽑기</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- ════════ 로딩 ════════ -->
<div class="loading-section" id="loadingSection">
  <div class="spinner"></div>
  <div class="loading-text">사주 원국에서 본능을 읽고 있습니다...</div>
</div>

<!-- ════════ 결과 ════════ -->
<div class="result-section" id="resultSection">

  <!-- 카드 캡처 영역 -->
  <div class="card-capture" id="cardCapture">
    <div class="card-bg" id="cardBg"></div>
    <div class="card-overlay"></div>
    <div class="card-watermark">나를읽다 연구소</div>
    <div class="card-content">
      <div class="combo-tag" id="comboTag"></div>
      <div class="sipseong-label">
        <span class="nickname" id="sipNickname"></span>
        <span class="hanja" id="sipHanja"></span>
      </div>
      <div class="score-section">
        <div class="score-label">본능 일치도</div>
        <div class="score-number" id="scoreNum">0</div>
        <div class="gauge-track">
          <div class="gauge-fill" id="gaugeFill"></div>
        </div>
      </div>
      <div class="grade-badge" id="gradeBadge">
        <span id="gradeIcon"></span>
        <span id="gradeText"></span>
      </div>
      <p class="hook-text" id="hookText"></p>
    </div>
  </div>

  <!-- 설명 박스 -->
  <div class="desc-section">
    <div class="desc-label">INSTINCT MESSAGE</div>
    <div class="desc-text" id="descText"></div>
  </div>

  <!-- 버튼 -->
  <div class="action-buttons">
    <button class="action-btn btn-save" onclick="saveCard()">카드 저장</button>
    <button class="action-btn btn-share" onclick="shareKakao()">카카오 공유</button>
  </div>

  <!-- CTA -->
  <div class="cta-section">
    <div class="cta-text" id="ctaText"></div>
    <a href="https://readmelab.co.kr/#pricing" class="cta-btn">12,000자 전체 리포트 받기</a>
  </div>

  <button class="retry-btn" onclick="retry()">다른 생년월일로 다시 해보기</button>
</div>

<!-- ════════ 푸터 ════════ -->
<div class="footer">
  <p>© 2026 <a href="https://readmelab.co.kr">나를읽다 연구소</a>. All rights reserved.</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 설정
// ═══════════════════════════════════════════════════════════
const API_BASE = 'https://naread-server-1075269376260.asia-northeast3.run.app';
const IMG_BASE = 'https://cards.readmelab.co.kr/cards/instinct/';

const GRADE_CONFIG = {
  '완전충돌': { icon: '💥', label: '완전 충돌' },
  '충돌':     { icon: '⚡', label: '충돌' },
  '교차':     { icon: '🔀', label: '교차' },
  '조화':     { icon: '✨', label: '조화' },
  '완전일치': { icon: '🪞', label: '완전 일치' }
};

// ═══════════════════════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════════════════════
let selectedMbti = '';
let calendarType = '양력';

// ═══════════════════════════════════════════════════════════
// 폼 인터랙션
// ═══════════════════════════════════════════════════════════
function setCalendar(btn) {
  document.querySelectorAll('.calendar-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  calendarType = btn.dataset.cal;
}

function setMbti(btn) {
  document.querySelectorAll('.mbti-grid button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMbti = btn.textContent;
  document.getElementById('submitBtn').disabled = false;
}

// ═══════════════════════════════════════════════════════════
// API 호출
// ═══════════════════════════════════════════════════════════
async function getMyCard() {
  const year = document.getElementById('birthYear').value;
  const month = document.getElementById('birthMonth').value;
  const day = document.getElementById('birthDay').value;
  const gender = document.getElementById('gender').value;

  if (!year || !month || !day || !selectedMbti) {
    showError('생년월일과 MBTI를 모두 입력해주세요.');
    return;
  }

  hideError();
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('headerSection').style.display = 'none';
  document.getElementById('loadingSection').classList.add('show');
  document.getElementById('resultSection').classList.remove('show');

  try {
    const response = await fetch(`${API_BASE}/api/free-instinct`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        birthYear: year,
        birthMonth: month,
        birthDay: day,
        mbti: selectedMbti,
        isLunar: calendarType === '음력',
        gender: gender
      })
    });

    const data = await response.json();

    if (!response.ok || !data.success) {
      throw new Error(data.error || '카드를 찾을 수 없습니다');
    }

    renderCard(data.instinct);

  } catch (err) {
    console.error('에러:', err);
    document.getElementById('loadingSection').classList.remove('show');
    document.getElementById('formSection').style.display = 'block';
    document.getElementById('headerSection').style.display = 'block';
    showError(err.message || '서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
}

// ═══════════════════════════════════════════════════════════
// 카드 렌더링
// ═══════════════════════════════════════════════════════════
function renderCard(d) {
  const color = d.color || '#c9a96e';
  const grade = GRADE_CONFIG[d.grade] || { icon: '🔮', label: d.grade };

  // 카드 테두리 색상
  document.getElementById('cardCapture').style.borderColor = color;

  // 배경 이미지
  document.getElementById('cardBg').style.backgroundImage = 'url(' + d.imageUrl + ')';

  // 텍스트
  document.getElementById('comboTag').textContent = d.sipseong + ' × ' + d.mbti;
  document.getElementById('sipNickname').textContent = d.nickname;
  document.getElementById('sipHanja').textContent = d.hanja;
  document.getElementById('scoreNum').textContent = d.score;
  document.getElementById('scoreNum').style.color = color;
  document.getElementById('hookText').textContent = d.hook;

  // 등급 뱃지
  document.getElementById('gradeIcon').textContent = grade.icon;
  document.getElementById('gradeText').textContent = grade.label;
  document.getElementById('gradeBadge').style.borderColor = color;
  document.getElementById('gradeBadge').style.color = color;

  // 설명
  document.getElementById('descText').textContent = d.description;

  // CTA
  document.getElementById('ctaText').textContent = d.ctaShort || '이 본능에 숨겨진 인생 시나리오가 궁금하다면?';

  // 게이지 애니메이션
  const fill = document.getElementById('gaugeFill');
  fill.style.background = color;
  fill.style.width = '0%';
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      fill.style.width = d.score + '%';
    });
  });

  // UI 전환
  document.getElementById('loadingSection').classList.remove('show');
  document.getElementById('resultSection').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════
// 카드 저장
// ═══════════════════════════════════════════════════════════
async function saveCard() {
  const el = document.getElementById('cardCapture');

  try {
    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#0a0a0f'
    });

    const link = document.createElement('a');
    link.download = '나의_본능카드_나를읽다.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (err) {
    console.error('저장 실패:', err);
    alert('카드 저장에 실패했습니다. 스크린샷으로 저장해주세요.');
  }
}

// ═══════════════════════════════════════════════════════════
// 유틸

function retry() {
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('headerSection').style.display = 'block';

  // MBTI 초기화
  document.querySelectorAll('.mbti-grid button').forEach(b => b.classList.remove('active'));

  document.getElementById('submitBtn').disabled = true;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════
// 생년월일 셀렉트 초기화
// ═══════════════════════════════════════════════════════════
(function initBirthSelects() {
  const yearEl = document.getElementById('birthYear');
  const monthEl = document.getElementById('birthMonth');
  const dayEl = document.getElementById('birthDay');
  const currentYear = new Date().getFullYear();

  yearEl.innerHTML = '<option value="">년</option>';
  for (let y = currentYear; y >= 1940; y--) {
    yearEl.innerHTML += '<option value="' + y + '">' + y + '년</option>';
  }

  monthEl.innerHTML = '<option value="">월</option>';
  for (let m = 1; m <= 12; m++) {
    const mv = String(m).padStart(2, '0');
    monthEl.innerHTML += '<option value="' + mv + '">' + m + '월</option>';
  }

  function updateDays() {
    const y = parseInt(yearEl.value) || 2000;
    const m = parseInt(monthEl.value) || 1;
    const maxDay = new Date(y, m, 0).getDate();
    const prevDay = dayEl.value;

    dayEl.innerHTML = '<option value="">일</option>';
    for (let d = 1; d <= maxDay; d++) {
      const dv = String(d).padStart(2, '0');
      dayEl.innerHTML += '<option value="' + dv + '">' + d + '일</option>';
    }

    if (parseInt(prevDay) <= maxDay) {
      dayEl.value = prevDay;
    }
  }

  yearEl.addEventListener('change', updateDays);
  monthEl.addEventListener('change', updateDays);
  updateDays();
})();
</script>
