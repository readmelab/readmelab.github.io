<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나를읽다 | 운명 분석 리포트</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg-deep: #0a0a14;
            --bg-card: #12121f;
            --bg-card-alt: #0e0e1a;
            --gold: #c9a84c;
            --gold-dim: #c9a84c33;
            --gold-mid: #c9a84c66;
            --gold-bright: #e8c44c;
            --text-primary: #f5f0e8;
            --text-secondary: #a09880;
            --text-muted: #8a7a5a;
            --text-dim: #6a6050;
            --text-faint: #5a5040;
            --text-ghost: #3a3530;
            --font-serif: 'Noto Serif KR', serif;
            --font-sans: 'Noto Sans KR', sans-serif;
            --font-scale: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: calc(15px * var(--font-scale));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            line-height: 1.8;
            overflow-x: hidden;
        }
        .container { max-width: 480px; width: 100%; }

        /* ── 폰트 크기 조절 ── */
        .font-controls {
            position: fixed; top: 16px; right: 16px; z-index: 9999;
            display: flex; gap: 6px;
        }
        .font-btn {
            width: 34px; height: 34px; border-radius: 50%;
            border: 1px solid var(--gold-dim); background: var(--bg-card);
            color: var(--gold); font-size: 13px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .font-btn:active { transform: scale(0.92); }

        /* ── 로딩 ── */
        .loading-screen {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 80vh;
        }
        .loading-screen .spinner {
            width: 40px; height: 40px; border: 2px solid var(--gold-dim);
            border-top: 2px solid var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-screen p { color: var(--text-muted); font-size: 14px; }

        /* ── 에러 ── */
        .error-screen {
            display: none; min-height: 60vh; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        .error-screen h2 { font-family: var(--font-serif); color: var(--gold); font-size: 20px; margin-bottom: 12px; }
        .error-screen p { color: var(--text-muted); font-size: 14px; }

        /* ── 뒤로가기 ── */
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 20px; border: 1px solid var(--gold-dim); border-radius: 6px;
            background: transparent; color: var(--gold); font-size: 13px;
            cursor: pointer; transition: all 0.3s; margin-bottom: 24px;
        }
        .back-btn:hover { border-color: var(--gold); box-shadow: 0 0 15px var(--gold-dim); }

        /* ── 리포트 헤더 ── */
        .report-header {
            text-align: center; padding: 20px 0 32px;
        }
        .report-brand {
            font-family: var(--font-serif); font-size: 11px;
            color: var(--gold); letter-spacing: 6px; margin-bottom: 8px;
        }
        .report-title {
            font-family: var(--font-serif); font-size: 22px;
            color: var(--text-primary); margin-bottom: 4px;
        }
        .report-subtitle {
            font-size: 13px; color: var(--text-muted);
        }
        .report-oneliner {
            font-family: var(--font-serif); font-size: 16px;
            color: var(--gold-bright); font-style: italic;
            line-height: 1.9; margin: 24px 0; padding: 20px;
            border-top: 1px solid var(--gold-dim);
            border-bottom: 1px solid var(--gold-dim);
            text-align: center; word-break: keep-all;
        }

        /* ── 구분선 ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
            margin: 32px 0;
        }

        /* ══════════════════════════════════════
           오행 분포 차트 (SVG 도넛)
           ══════════════════════════════════════ */
        .viz-card {
            background: var(--bg-card); border: 1px solid var(--gold-dim);
            border-radius: 12px; padding: 28px 20px; margin-bottom: 28px;
        }
        .viz-title {
            font-family: var(--font-serif); font-size: 14px;
            color: var(--gold); letter-spacing: 2px; text-align: center; margin-bottom: 20px;
        }
        .oheng-chart-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
        .oheng-legend {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
        }
        .oheng-legend-item {
            display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary);
        }
        .oheng-dot { width: 10px; height: 10px; border-radius: 50%; }
        .oheng-info { text-align: center; margin-top: 12px; font-size: 12px; color: var(--text-dim); }

        /* ══════════════════════════════════════
           사주 팔자 표
           ══════════════════════════════════════ */
        .pillars-table {
            width: 100%; border-collapse: collapse; margin: 16px 0;
        }
        .pillars-table th {
            font-family: var(--font-serif); font-size: 11px;
            color: var(--gold); letter-spacing: 2px; padding: 8px;
            border-bottom: 1px solid var(--gold-dim); text-align: center;
        }
        .pillars-table td {
            text-align: center; padding: 12px 8px;
            border-bottom: 1px solid rgba(201,168,76,0.08);
        }
        .pillar-hanja {
            font-family: var(--font-serif); font-size: 24px;
            color: var(--text-primary); line-height: 1.4;
        }
        .pillar-hangul {
            font-size: 11px; color: var(--text-muted); margin-top: 4px;
        }
        .pillar-oheng {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 10px; margin-top: 4px;
        }

        /* ══════════════════════════════════════
           대운 타임라인
           ══════════════════════════════════════ */
        .daeun-timeline { position: relative; padding: 20px 0 20px 32px; }
        .daeun-line {
            position: absolute; left: 12px; top: 0; bottom: 0; width: 2px;
            background: linear-gradient(180deg, var(--gold-dim), var(--gold), var(--gold-dim));
        }
        .daeun-item {
            position: relative; margin-bottom: 20px; padding-left: 24px;
            opacity: 0; transform: translateX(-20px);
            animation: slideIn 0.5s ease forwards;
        }
        .daeun-item:nth-child(1) { animation-delay: 0.1s; }
        .daeun-item:nth-child(2) { animation-delay: 0.2s; }
        .daeun-item:nth-child(3) { animation-delay: 0.3s; }
        .daeun-item:nth-child(4) { animation-delay: 0.4s; }
        .daeun-item:nth-child(5) { animation-delay: 0.5s; }
        .daeun-item:nth-child(6) { animation-delay: 0.6s; }
        .daeun-item:nth-child(7) { animation-delay: 0.7s; }
        .daeun-item:nth-child(8) { animation-delay: 0.8s; }
        .daeun-item:nth-child(9) { animation-delay: 0.9s; }
        .daeun-item:nth-child(10) { animation-delay: 1.0s; }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
        .daeun-dot {
            position: absolute; left: -30px; top: 4px; width: 10px; height: 10px;
            border-radius: 50%; border: 2px solid var(--gold-dim); background: var(--bg-deep);
        }
        .daeun-item.current .daeun-dot {
            border-color: var(--gold); background: var(--gold);
            box-shadow: 0 0 12px rgba(201,168,76,0.5);
        }
        .daeun-age { font-size: 11px; color: var(--gold); letter-spacing: 1px; }
        .daeun-pillar {
            font-family: var(--font-serif); font-size: 18px;
            color: var(--text-primary); margin: 2px 0;
        }
        .daeun-year { font-size: 11px; color: var(--text-dim); }

        /* ══════════════════════════════════════
           챕터 카드
           ══════════════════════════════════════ */
        .chapter-card {
            padding: 48px 0; margin-bottom: 0;
            border-bottom: 1px solid var(--gold-dim);
            opacity: 0; transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .chapter-card.visible { opacity: 1; transform: translateY(0); }
        .chapter-card:last-child { border-bottom: none; }
        .chapter-header {
            text-align: center; margin-bottom: 36px;
            padding-bottom: 24px; border-bottom: 1px solid rgba(201,168,76,0.08);
        }
        .chapter-number {
            font-family: var(--font-serif); font-size: 10px;
            color: var(--text-dim); letter-spacing: 4px; margin-bottom: 12px;
        }
        .chapter-title {
            font-family: var(--font-serif); font-size: 20px;
            color: var(--gold); font-weight: 700; line-height: 1.6;
        }
        .chapter-body {
            font-size: calc(15px * var(--font-scale));
            color: var(--text-primary); line-height: 2.1; word-break: keep-all;
        }
        .chapter-body p { margin-bottom: 24px; }
        .chapter-body p:last-child { margin-bottom: 0; }

        /* ── 챕터 구분자 ── */
        .chapter-divider {
            display: flex; align-items: center; justify-content: center; padding: 20px 0;
        }
        .chapter-divider-dot {
            width: 4px; height: 4px; background: var(--gold-dim);
            border-radius: 50%; margin: 0 8px;
        }
        .chapter-divider-dot:nth-child(2) { width: 6px; height: 6px; background: var(--gold-mid); }

        /* ── 마무리 ── */
        .closing-section {
            text-align: center; padding: 40px 0;
        }
        .closing-text {
            font-family: var(--font-serif); font-size: 15px;
            color: var(--text-muted); line-height: 2.0; font-style: italic;
        }

        /* ── 푸터 ── */
        .footer {
            text-align: center; padding: 40px 0 24px;
            border-top: 1px solid var(--gold-dim); margin-top: 40px;
        }
        .footer-brand {
            font-family: var(--font-serif); font-size: 11px;
            color: var(--text-faint); letter-spacing: 2px;
        }
        .footer-sub { font-size: 11px; color: var(--text-ghost); margin-top: 4px; }

        /* ── 스크롤 진행률 바 ── */
        .progress-bar {
            position: fixed; top: 0; left: 0; height: 2px; width: 0;
            background: linear-gradient(90deg, var(--gold), var(--gold-bright));
            z-index: 9999; transition: width 0.1s;
        }

        /* ── 목차 (TOC) ── */
        .toc-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 9998;
            width: 44px; height: 44px; border-radius: 50%;
            border: 1px solid var(--gold-dim); background: var(--bg-card);
            color: var(--gold); font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .toc-panel {
            position: fixed; bottom: 80px; right: 20px; z-index: 9997;
            width: 260px; max-height: 400px; overflow-y: auto;
            background: var(--bg-card); border: 1px solid var(--gold-dim);
            border-radius: 12px; padding: 16px; display: none;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        .toc-panel.open { display: block; }
        .toc-item {
            display: block; padding: 8px 12px; border-radius: 6px;
            font-size: 13px; color: var(--text-secondary);
            cursor: pointer; transition: all 0.2s; text-decoration: none;
        }
        .toc-item:hover { background: rgba(201,168,76,0.08); color: var(--gold); }
        .toc-item.active { color: var(--gold); background: rgba(201,168,76,0.06); }

        /* ── 모바일 ── */
        @media (max-width: 380px) {
            body { padding: 16px; }
            .pillar-hanja { font-size: 20px; }
        }

        @media print {
            .font-controls, .toc-btn, .toc-panel, .progress-bar, .back-btn { display: none !important; }
            body { background: white; color: #222; }
            .chapter-card { opacity: 1; transform: none; break-inside: avoid; }
            .viz-card { break-inside: avoid; border-color: #ddd; }
        }
    </style>
</head>
<body>
    <!-- 스크롤 진행률 -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- 폰트 크기 조절 -->
    <div class="font-controls">
        <button class="font-btn" onclick="changeFontSize(-1)">A-</button>
        <button class="font-btn" onclick="changeFontSize(1)">A+</button>
    </div>

    <!-- 목차 버튼 -->
    <button class="toc-btn" id="tocBtn" onclick="toggleToc()" style="display:none;">☰</button>
    <div class="toc-panel" id="tocPanel"></div>

    <div class="container">
        <!-- 로딩 -->
        <div class="loading-screen" id="loadingScreen">
            <div class="spinner"></div>
            <p>리포트를 준비하고 있습니다...</p>
        </div>

        <!-- 에러 -->
        <div class="error-screen" id="errorScreen">
            <h2>리포트를 찾을 수 없습니다</h2>
            <p>보증서 페이지에서 다시 접속해주세요</p>
        </div>

        <!-- 리포트 본문 -->
        <div id="reportWrap" style="display:none;"></div>
    </div>

    <script>
    /* ═══════════════════════════════════════
       설정
       ═══════════════════════════════════════ */
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbwyuXY4ZSqDX60kjXeD9oc4ftXf-QSHuA8QnnHnPzIDg22AEYp8-bgjod1XEikMoRxy7g/exec';
    var DATA_BASE = '';

    var OHENG_COLORS = {
        '목': '#4a9e6e', '화': '#c75050', '토': '#c9a84c', '금': '#a0a0a0', '수': '#4a7ab5'
    };
    var OHENG_HANJA = { '목': '木', '화': '火', '토': '土', '금': '金', '수': '水' };

    var fontScale = 1;

    /* ═══════════════════════════════════════
       초기화
       ═══════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', async function() {
        var code = new URLSearchParams(window.location.search).get('code');
        if (!code) { showError(); return; }

        var data = null;

        // 1차: sessionStorage (인트로에서 프리로드된 데이터)
        try {
            var cached = sessionStorage.getItem('naread_report');
            if (cached) {
                data = JSON.parse(cached);
                console.log('✅ sessionStorage 캐시 사용');
            }
        } catch(e) {}

        // 2차: 정적 JSON
        if (!data && DATA_BASE) {
            try {
                var res = await fetch(DATA_BASE + '/data/' + code + '.json');
                if (res.ok) { data = await res.json(); console.log('✅ 정적 JSON'); }
            } catch(e) {}
        }

        // 3차: GAS
        if (!data) {
            try {
                var res = await fetch(GAS_URL + '?code=' + encodeURIComponent(code));
                data = await res.json();
                console.log('✅ GAS API');
            } catch(e) { showError(); return; }
        }

        if (!data || data.error || data.valid === false) { showError(); return; }

        // 리포트 데이터 추출
        var report = null;
        if (data.report) report = data.report;
        else if (data.webReportData) {
            report = data.webReportData;
            if (typeof report === 'string') try { report = JSON.parse(report); } catch(e) { report = null; }
        }

        if (!report) { showError(); return; }

        renderReport(report);
    });

    /* ═══════════════════════════════════════
       렌더링
       ═══════════════════════════════════════ */
    function renderReport(r) {
        var wrap = document.getElementById('reportWrap');
        var html = '';

        // 뒤로가기
        var code = new URLSearchParams(window.location.search).get('code') || '';
        html += '<button class="back-btn" onclick="history.back()">← 보증서로 돌아가기</button>';

        // 헤더
        var name = (r.meta && r.meta.name) || '';
        var mbti = (r.meta && r.meta.mbti) || '';
        html += '<div class="report-header">';
        html += '<div class="report-brand">나를읽다</div>';
        html += '<div class="report-title">' + name + ' 님의 운명 분석</div>';
        if (mbti) html += '<div class="report-subtitle">' + mbti + ' · 사주 심층 분석</div>';
        html += '</div>';

        // oneLiner
        if (r.oneLiner) {
            html += '<div class="report-oneliner">' + escapeHtml(r.oneLiner) + '</div>';
        }

        // ── 시각화 섹션 ──

        // 1. 오행 분포 도넛 차트
        if (r.dashboard && r.dashboard.ohengDistribution) {
            html += renderOhengChart(r.dashboard.ohengDistribution, r.dashboard.dominantElement, r.dashboard.weakestElement);
        }

        // 2. 사주 팔자 표
        if (r.dashboard && r.dashboard.fourPillars) {
            html += renderPillarsTable(r.dashboard.fourPillars, r.sajuSummary);
        }

        // 3. 대운 타임라인
        if (r.dashboard && r.dashboard.luckCycles && r.dashboard.luckCycles.currentDaeun) {
            html += renderDaeunTimeline(r.dashboard.luckCycles.currentDaeun);
        }

        html += '<div class="divider"></div>';

        // ── 챕터 ──
        var chapters = r.chapters || [];
        var tocItems = [];

        for (var i = 0; i < chapters.length; i++) {
            var ch = chapters[i];
            var chId = 'chapter-' + i;
            tocItems.push({ id: chId, title: ch.title || ('섹션 ' + ch.number) });

            html += '<div class="chapter-card" id="' + chId + '">';
            html += '<div class="chapter-header">';
            html += '<div class="chapter-number">CHAPTER ' + ch.number + '</div>';
            html += '<div class="chapter-title">' + escapeHtml(ch.title || '') + '</div>';
            html += '</div>';
            html += '<div class="chapter-body">' + formatBody(ch.body || '') + '</div>';
            html += '</div>';

            if (i < chapters.length - 1) {
                html += '<div class="chapter-divider"><div class="chapter-divider-dot"></div><div class="chapter-divider-dot"></div><div class="chapter-divider-dot"></div></div>';
            }
        }

        // 마무리
        if (r.closingLine) {
            html += '<div class="closing-section"><div class="divider"></div>';
            html += '<div class="closing-text">' + escapeHtml(r.closingLine) + '</div>';
            html += '</div>';
        }

        // 푸터
        html += '<div class="footer"><div class="footer-brand">나를읽다 연구소</div>';
        html += '<div class="footer-sub">사주 × MBTI × AI 운명 분석</div></div>';

        wrap.innerHTML = html;
        wrap.style.display = 'block';
        document.getElementById('loadingScreen').style.display = 'none';

        // 목차
        buildToc(tocItems);

        // 스크롤 애니메이션
        observeChapters();
        initProgressBar();
    }

    /* ═══════════════════════════════════════
       오행 도넛 차트 (SVG)
       ═══════════════════════════════════════ */
    function renderOhengChart(dist, dominant, weakest) {
        var total = 0;
        var items = [];
        ['목','화','토','금','수'].forEach(function(k) {
            var v = dist[k] ? (dist[k].count || 0) : 0;
            total += v;
            items.push({ name: k, count: v, color: OHENG_COLORS[k] });
        });
        if (total === 0) total = 1;

        var cx = 80, cy = 80, r = 60, strokeW = 20;
        var circumference = 2 * Math.PI * r;
        var offset = 0;

        var svg = '<svg viewBox="0 0 160 160" width="160" height="160">';
        // 배경 원
        svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="#1a1a2e" stroke-width="' + strokeW + '"/>';

        items.forEach(function(item) {
            if (item.count === 0) return;
            var pct = item.count / total;
            var dashLen = pct * circumference;
            var dashGap = circumference - dashLen;
            svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none"'
                + ' stroke="' + item.color + '" stroke-width="' + strokeW + '"'
                + ' stroke-dasharray="' + dashLen + ' ' + dashGap + '"'
                + ' stroke-dashoffset="' + (-offset) + '"'
                + ' transform="rotate(-90 ' + cx + ' ' + cy + ')"'
                + ' style="transition: stroke-dasharray 1s ease;"/>';
            offset += dashLen;
        });

        // 중앙 텍스트
        svg += '<text x="' + cx + '" y="' + (cy - 6) + '" text-anchor="middle" fill="#c9a84c" font-size="11" font-family="Noto Serif KR">오행</text>';
        svg += '<text x="' + cx + '" y="' + (cy + 12) + '" text-anchor="middle" fill="#f5f0e8" font-size="14" font-family="Noto Serif KR" font-weight="700">분포</text>';
        svg += '</svg>';

        var html = '<div class="viz-card">';
        html += '<div class="viz-title">오 행 분 포</div>';
        html += '<div class="oheng-chart-wrap">' + svg + '</div>';
        html += '<div class="oheng-legend">';
        items.forEach(function(item) {
            var pct = Math.round(item.count / total * 100);
            html += '<div class="oheng-legend-item">';
            html += '<div class="oheng-dot" style="background:' + item.color + ';"></div>';
            html += OHENG_HANJA[item.name] + ' ' + item.name + ' ' + item.count + '개 (' + pct + '%)';
            html += '</div>';
        });
        html += '</div>';
        if (dominant || weakest) {
            html += '<div class="oheng-info">';
            if (dominant) html += '강: <b style="color:' + (OHENG_COLORS[dominant]||'var(--gold)') + '">' + dominant + '</b>';
            if (dominant && weakest) html += ' · ';
            if (weakest) html += '약: <b style="color:' + (OHENG_COLORS[weakest]||'var(--text-dim)') + '">' + weakest + '</b>';
            html += '</div>';
        }
        html += '</div>';
        return html;
    }

    /* ═══════════════════════════════════════
       사주 팔자 표
       ═══════════════════════════════════════ */
    function renderPillarsTable(pillars, sajuSummary) {
        var order = ['시주','일주','월주','년주'];
        var labels = ['시주(時)','일주(日)','월주(月)','년주(年)'];
        var sp = (sajuSummary && sajuSummary.fourPillars) || {};

        var html = '<div class="viz-card">';
        html += '<div class="viz-title">사 주 팔 자</div>';
        html += '<table class="pillars-table"><thead><tr>';
        labels.forEach(function(l) { html += '<th>' + l + '</th>'; });
        html += '</tr></thead><tbody>';

        // 천간
        html += '<tr>';
        order.forEach(function(k) {
            var p = pillars[k] || {};
            var s = sp[k === '년주' ? 'year' : k === '월주' ? 'month' : k === '일주' ? 'day' : 'hour'] || {};
            var gan = p.gan || (s.hanja ? s.hanja.charAt(0) : '');
            var ganOheng = p.ganOheng || '';
            var color = OHENG_COLORS[ganOheng] || 'var(--text-primary)';
            html += '<td><div class="pillar-hanja" style="color:' + color + '">' + (gan || '?') + '</div>';
            if (ganOheng) html += '<div class="pillar-oheng" style="background:' + color + '22;color:' + color + '">' + ganOheng + '</div>';
            html += '</td>';
        });
        html += '</tr>';

        // 지지
        html += '<tr>';
        order.forEach(function(k) {
            var p = pillars[k] || {};
            var s = sp[k === '년주' ? 'year' : k === '월주' ? 'month' : k === '일주' ? 'day' : 'hour'] || {};
            var ji = p.ji || (s.hanja ? s.hanja.charAt(1) : '');
            var jiOheng = p.jiOheng || '';
            var color = OHENG_COLORS[jiOheng] || 'var(--text-primary)';
            html += '<td><div class="pillar-hanja" style="color:' + color + '">' + (ji || '?') + '</div>';
            if (jiOheng) html += '<div class="pillar-oheng" style="background:' + color + '22;color:' + color + '">' + jiOheng + '</div>';
            html += '</td>';
        });
        html += '</tr>';

        // 한글
        html += '<tr>';
        order.forEach(function(k) {
            var p = pillars[k] || {};
            var s = sp[k === '년주' ? 'year' : k === '월주' ? 'month' : k === '일주' ? 'day' : 'hour'] || {};
            var hangul = p.hangul || s.hangul || '';
            html += '<td><div class="pillar-hangul">' + hangul + '</div></td>';
        });
        html += '</tr>';

        html += '</tbody></table></div>';
        return html;
    }

    /* ═══════════════════════════════════════
       대운 타임라인
       ═══════════════════════════════════════ */
    function renderDaeunTimeline(daeunData) {
        var daeuns = daeunData.daeuns || [];
        if (daeuns.length === 0) return '';

        var currentYear = new Date().getFullYear();

        var html = '<div class="viz-card">';
        html += '<div class="viz-title">대 운 흐 름</div>';
        html += '<div class="daeun-timeline"><div class="daeun-line"></div>';

        daeuns.forEach(function(d) {
            var isCurrent = (d.startYear <= currentYear && (!d.endYear || d.endYear > currentYear));
            // 간단한 endYear 추정: 다음 대운 시작년 - 1
            var endYear = d.startYear + 9;
            if (d.startYear <= currentYear && currentYear <= endYear) isCurrent = true;
            else isCurrent = false;

            html += '<div class="daeun-item' + (isCurrent ? ' current' : '') + '">';
            html += '<div class="daeun-dot"></div>';
            html += '<div class="daeun-age">' + d.age + '세 ~ ' + (d.age + 9) + '세</div>';
            html += '<div class="daeun-pillar">' + (d.pillar || '') + '</div>';
            html += '<div class="daeun-year">' + d.startYear + ' ~ ' + endYear + '</div>';
            html += '</div>';
        });

        html += '</div></div>';
        return html;
    }

    /* ═══════════════════════════════════════
       유틸리티
       ═══════════════════════════════════════ */
    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatBody(text) {
        if (!text) return '';
        var paragraphs = text.split(/\n\n+/);
        return paragraphs.map(function(p) {
            p = p.trim();
            if (!p) return '';
            p = escapeHtml(p).replace(/\n/g, '<br>');
            return '<p>' + p + '</p>';
        }).join('');
    }

    /* ── 목차 ── */
    function buildToc(items) {
        if (items.length < 2) return;
        var panel = document.getElementById('tocPanel');
        var html = '';
        items.forEach(function(item) {
            html += '<a class="toc-item" data-target="' + item.id + '" onclick="scrollToChapter(\'' + item.id + '\')">' + item.title + '</a>';
        });
        panel.innerHTML = html;
        document.getElementById('tocBtn').style.display = 'flex';
    }

    function toggleToc() {
        document.getElementById('tocPanel').classList.toggle('open');
    }

    function scrollToChapter(id) {
        var el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.getElementById('tocPanel').classList.remove('open');
    }

    /* ── 스크롤 애니메이션 (IntersectionObserver) ── */
    function observeChapters() {
        var cards = document.querySelectorAll('.chapter-card');
        if (!('IntersectionObserver' in window)) {
            cards.forEach(function(c) { c.classList.add('visible'); });
            return;
        }
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });
        cards.forEach(function(c) { observer.observe(c); });
    }

    /* ── 스크롤 진행률 바 ── */
    function initProgressBar() {
        window.addEventListener('scroll', function() {
            var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            var pct = docHeight > 0 ? (scrollTop / docHeight * 100) : 0;
            document.getElementById('progressBar').style.width = pct + '%';
        });
    }

    /* ── 폰트 크기 ── */
    function changeFontSize(dir) {
        fontScale = Math.max(0.8, Math.min(1.4, fontScale + dir * 0.1));
        document.documentElement.style.setProperty('--font-scale', fontScale);
    }

    /* ── 에러/로딩 ── */
    function showError() {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display = 'flex';
    }
    </script>
</body>
