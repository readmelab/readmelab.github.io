<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나를읽다 연구소 | 주문하기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4a853;--gold-light:#e8c97a;--bg:#0a0a0f;--card:#111118;--text:#f0e6d3;--sub:#a09880;--border:rgba(212,168,83,.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 120px}
.top-bar{background:rgba(10,10,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px}
.top-bar a{color:var(--gold);text-decoration:none;font-size:1.2rem}
.top-bar h1{font-size:.95rem;font-weight:700;color:var(--gold-light)}
.container{max-width:480px;margin:0 auto;padding:24px 16px}

/* 상품 요약 */
.product-summary{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px}
.product-summary .label{font-size:.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.product-summary .name{font-size:1.1rem;font-weight:700;margin-bottom:16px;line-height:1.5}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid rgba(255,255,255,.05);font-size:.85rem}
.price-row .orig{text-decoration:line-through;color:#6a6455}
.price-row .final{font-size:1.2rem;font-weight:900;color:var(--gold-light)}

/* 쿠폰 */
.coupon-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.coupon-section h3{font-size:.85rem;margin-bottom:12px;color:var(--gold-light)}
.coupon-row{display:flex;gap:8px}
.coupon-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:.85rem;outline:none}
.coupon-row input:focus{border-color:var(--gold)}
.coupon-row button{padding:12px 20px;background:linear-gradient(135deg,var(--gold),#b8912a);color:var(--bg);font-weight:700;font-size:.8rem;border:none;border-radius:10px;cursor:pointer;white-space:nowrap}
.coupon-msg{font-size:.75rem;margin-top:8px;min-height:1.2em}
.coupon-msg.success{color:#4ade80}
.coupon-msg.error{color:#f87171}

/* 업셀 */
.upsell-card{background:linear-gradient(135deg,rgba(212,168,83,.08),rgba(212,168,83,.02));border:1px solid rgba(212,168,83,.25);border-radius:16px;padding:20px;margin-bottom:16px;display:none}
.upsell-card h3{font-size:.85rem;color:var(--gold-light);margin-bottom:8px}
.upsell-card p{font-size:.78rem;color:var(--sub);line-height:1.6;margin-bottom:12px}
.upsell-btn{width:100%;padding:12px;background:rgba(212,168,83,.12);border:1px solid rgba(212,168,83,.3);color:var(--gold-light);font-size:.82rem;font-weight:600;border-radius:10px;cursor:pointer}

/* 결제 수단 선택 */
.method-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.method-section h3{font-size:.85rem;margin-bottom:14px;color:var(--gold-light)}
.method-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.method-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px 8px;background:rgba(255,255,255,.03);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s;font-size:.72rem;color:var(--sub);text-align:center}
.method-item:hover{border-color:rgba(212,168,83,.4);background:rgba(212,168,83,.05)}
.method-item.selected{border-color:var(--gold);background:rgba(212,168,83,.1);color:var(--gold-light)}
.method-item .m-icon{font-size:1.3rem}
.method-item .m-label{font-weight:500;line-height:1.3}

/* 결제 버튼 */
.pay-section{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:16px 20px;z-index:100}
.pay-section .inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.pay-total{font-size:.8rem;color:var(--sub)}
.pay-total span{display:block;font-size:1.2rem;font-weight:900;color:var(--gold-light)}
.pay-btn{padding:16px 36px;background:linear-gradient(135deg,var(--gold),#b8912a);color:var(--bg);font-size:.95rem;font-weight:800;border:none;border-radius:14px;cursor:pointer;letter-spacing:1px;transition:transform .2s}
.pay-btn:active{transform:scale(.97)}

/* 안내 */
.info-note{font-size:.7rem;color:#6a6455;line-height:1.8;text-align:center;margin-top:16px;padding:0 12px}
</style>
</head>
<body>

<div class="top-bar">
    <a href="/landing.html">←</a>
    <h1>주문서</h1>
</div>

<div class="container">

    <!-- 상품 요약 -->
    <div class="product-summary">
        <div class="label">선택 상품</div>
        <div class="name" id="productName">상품 로딩 중...</div>
        <div class="price-row">
            <span>정가</span>
            <span class="orig" id="origPrice">—</span>
        </div>
        <div class="price-row">
            <span>할인가</span>
            <span class="final" id="salePrice">—</span>
        </div>
        <div class="price-row" id="couponRow" style="display:none">
            <span>쿠폰 적용</span>
            <span class="final" id="couponPrice" style="color:#4ade80">—</span>
        </div>
        <div class="price-row" style="border-top:1px solid rgba(212,168,83,.2);padding-top:12px;margin-top:8px">
            <span style="font-weight:700">최종 결제금액</span>
            <span class="final" id="finalPrice">—</span>
        </div>
    </div>

    <!-- 쿠폰 입력 -->
    <div class="coupon-section">
        <h3>🎫 할인 쿠폰</h3>
        <div class="coupon-row">
            <input type="text" id="couponInput" placeholder="쿠폰 코드를 입력하세요" maxlength="20" autocomplete="off">
            <button onclick="applyCoupon()">적용</button>
        </div>
        <div class="coupon-msg" id="couponMsg"></div>
    </div>

    <!-- 업셀 카드 -->
    <div class="upsell-card" id="upsellCard">
        <h3>⬆️ 업그레이드 추천</h3>
        <p id="upsellDesc"></p>
        <button class="upsell-btn" id="upsellBtn" onclick="doUpsell()">업그레이드하기</button>
    </div>

    <!-- 결제 수단 선택 -->
    <div class="method-section">
        <h3>💳 결제 수단 선택</h3>
        <div class="method-grid" id="methodGrid">
            <div class="method-item selected" data-method="CARD" onclick="selectMethod(this)">
                <span class="m-icon">💳</span>
                <span class="m-label">신용·체크카드</span>
            </div>
            <div class="method-item" data-method="TRANSFER" onclick="selectMethod(this)">
                <span class="m-icon">🏦</span>
                <span class="m-label">계좌이체</span>
            </div>
            <div class="method-item" data-method="TOSSPAY" onclick="selectMethod(this)">
                <span class="m-icon">🔵</span>
                <span class="m-label">토스페이</span>
            </div>
            <div class="method-item" data-method="KAKAOPAY" onclick="selectMethod(this)">
                <span class="m-icon">💬</span>
                <span class="m-label">카카오페이</span>
            </div>
            <div class="method-item" data-method="NAVERPAY" onclick="selectMethod(this)">
                <span class="m-icon">🟢</span>
                <span class="m-label">네이버페이</span>
            </div>
            <div class="method-item" data-method="SAMSUNGPAY" onclick="selectMethod(this)">
                <span class="m-icon">📱</span>
                <span class="m-label">삼성페이</span>
            </div>
        </div>
    </div>

    <div class="info-note">
        결제 완료 후 운명 분석에 필요한 정보 입력 페이지로 이동합니다.<br>
        문의: abkomp400@gmail.com · 010-9847-1152
    </div>

</div>

<!-- 하단 결제 버튼 -->
<div class="pay-section">
    <div class="inner">
        <div class="pay-total">
            결제금액
            <span id="payAmount">—</span>
        </div>
        <button class="pay-btn" id="payBtn" onclick="requestPayment()">결제하기</button>
    </div>
</div>

<!-- Toss Payments SDK -->
<script src="https://js.tosspayments.com/v2/standard"></script>

<script>
(function(){

    /* ============================================
       1. 라이브 / 테스트 전환 플래그
       ============================================ */
    var IS_LIVE = false;  // ← 라이브 전환 시 true로 변경

    var KEYS = {
        test: 'test_gck_ex6BJGQOVDPnJWjkJENQVW4w2zNb',
        live: 'live_gck_kYG57Eba3GKeDWE9OO1k3pWDOxmA'
    };

    var clientKey = IS_LIVE ? KEYS.live : KEYS.test;

    var GAS_URL = 'https://script.google.com/macros/s/AKfycbwyuXY4ZSqDX60kjXeD9oc4ftXf-QSHuA8QnnHnPzIDg22AEYp8-bgjod1XEikMoRxy7g/exec';


    /* ============================================
       2. 상품 정의
       ============================================ */
    var PRODUCTS = {
        N1: { name: '나를 읽다 — 기본 분석', code: 'N1', line: 'N', orig: 59000, price: 29900, form: '/form.html' },
        N2: { name: '나를 읽다 — 심화 분석', code: 'N2', line: 'N', orig: 79000, price: 39800, form: '/form.html' },
        W1: { name: '우리를 읽다 — 기본 궁합', code: 'W1', line: 'W', orig: 99000, price: 49700, form: '/form-w.html' },
        W2: { name: '우리를 읽다 — 심화 궁합', code: 'W2', line: 'W', orig: 129000, price: 59600, form: '/form-w.html' }
    };


    /* ============================================
       3. 쿠폰 정의
       ============================================ */
    var COUPONS = {
        'BETA50':    { type: 'percent', value: 50, label: '베타 테스터 50% 할인', maxUse: 100 },
        'FRIEND30':  { type: 'percent', value: 30, label: '지인 추천 30% 할인', maxUse: 50 },
        'WELCOME':   { type: 'amount',  value: 10000, label: '첫 주문 1만원 할인', maxUse: 200 },
        'READMELAB': { type: 'percent', value: 100, label: '나를읽다 100% 쿠폰', maxUse: 10 },
        'TEST100':   { type: 'percent', value: 100, label: '테스트 100% 할인', maxUse: 999 }
    };


    /* ============================================
       4. 업셀 매핑
       ============================================ */
    var UPSELL_MAP = {
        N1: { to: 'N2', desc: '심화 분석으로 업그레이드하면 더 깊은 인생 리포트를 받을 수 있습니다.' },
        W1: { to: 'W2', desc: '심화 궁합으로 업그레이드하면 두 분의 관계를 더 세밀하게 분석합니다.' }
    };


    /* ============================================
       5. 상태 변수
       ============================================ */
    var params = new URLSearchParams(window.location.search);
    var currentProduct = params.get('product') || 'N1';
    var appliedCoupon = null;
    var selectedMethod = 'CARD';


    /* ============================================
       6. Toss SDK 초기화
       ============================================ */
    var tossPayments = TossPayments(clientKey);
    var customerKey = 'CUST_' + Math.random().toString(36).substr(2, 12);
    var payment = tossPayments.payment({ customerKey: customerKey });


    /* ============================================
       7. UI 갱신 함수
       ============================================ */
    function refreshUI() {
        var p = PRODUCTS[currentProduct];
        if (!p) { alert('잘못된 상품 코드입니다.'); return; }

        document.getElementById('productName').textContent = p.name;
        document.getElementById('origPrice').textContent = p.orig.toLocaleString() + '원';
        document.getElementById('salePrice').textContent = p.price.toLocaleString() + '원';

        var finalAmount = p.price;

        if (appliedCoupon) {
            var c = COUPONS[appliedCoupon];
            if (c.type === 'percent') {
                finalAmount = Math.round(p.price * (1 - c.value / 100));
            } else {
                finalAmount = Math.max(0, p.price - c.value);
            }
            document.getElementById('couponRow').style.display = 'flex';
            document.getElementById('couponPrice').textContent = '-' + (p.price - finalAmount).toLocaleString() + '원';
        } else {
            document.getElementById('couponRow').style.display = 'none';
        }

        document.getElementById('finalPrice').textContent = finalAmount.toLocaleString() + '원';
        document.getElementById('payAmount').textContent = finalAmount.toLocaleString() + '원';

        // 업셀
        var upsell = UPSELL_MAP[currentProduct];
        var upsellCard = document.getElementById('upsellCard');
        if (upsell) {
            var upProduct = PRODUCTS[upsell.to];
            document.getElementById('upsellDesc').textContent = upsell.desc + ' (+' + (upProduct.price - p.price).toLocaleString() + '원)';
            upsellCard.style.display = 'block';
        } else {
            upsellCard.style.display = 'none';
        }
    }


    /* ============================================
       8. 쿠폰 적용
       ============================================ */
    window.applyCoupon = function() {
        var code = document.getElementById('couponInput').value.trim().toUpperCase();
        var msgEl = document.getElementById('couponMsg');

        if (!code) {
            msgEl.className = 'coupon-msg error';
            msgEl.textContent = '쿠폰 코드를 입력해 주세요.';
            return;
        }
        if (!COUPONS[code]) {
            msgEl.className = 'coupon-msg error';
            msgEl.textContent = '유효하지 않은 쿠폰입니다.';
            return;
        }
        appliedCoupon = code;
        msgEl.className = 'coupon-msg success';
        msgEl.textContent = '✅ ' + COUPONS[code].label + ' 적용됨';
        refreshUI();
    };


    /* ============================================
       9. 업셀
       ============================================ */
    window.doUpsell = function() {
        var upsell = UPSELL_MAP[currentProduct];
        if (upsell) {
            currentProduct = upsell.to;
            refreshUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };


    /* ============================================
       10. 결제 수단 선택
       ============================================ */
    window.selectMethod = function(el) {
        document.querySelectorAll('.method-item').forEach(function(item) {
            item.classList.remove('selected');
        });
        el.classList.add('selected');
        selectedMethod = el.getAttribute('data-method');
    };


    /* ============================================
       11. 결제 요청
       ============================================ */
    window.requestPayment = function() {
        var p = PRODUCTS[currentProduct];
        if (!p) return;

        var finalAmount = p.price;
        if (appliedCoupon) {
            var c = COUPONS[appliedCoupon];
            if (c.type === 'percent') {
                finalAmount = Math.round(p.price * (1 - c.value / 100));
            } else {
                finalAmount = Math.max(0, p.price - c.value);
            }
        }

        // 주문 ID 생성
        var prefix = p.line === 'W' ? 'W-' : 'N-';
        var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        var random = '';
        for (var i = 0; i < 8; i++) { random += chars.charAt(Math.floor(Math.random() * chars.length)); }
        var orderId = prefix + random;

        var formPage = p.form;

        // ── 무료 쿠폰 (100% 할인) ──
        if (finalAmount <= 100) {
            document.getElementById('payBtn').textContent = '처리 중...';
            document.getElementById('payBtn').disabled = true;

            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                    type: 'ORDER_REGISTER',
                    orderId: orderId,
                    product: currentProduct,
                    productName: p.name,
                    price: 0,
                    paymentKey: 'FREE_COUPON',
                    coupon: appliedCoupon || '',
                    timestamp: new Date().toISOString()
                })
            })
            .then(function(){ return new Promise(function(r){ setTimeout(r, 2000); }); })
            .then(function(){
                window.location.href = formPage
                    + '?code=' + encodeURIComponent(orderId)
                    + '&product=' + encodeURIComponent(currentProduct);
            })
            .catch(function(){
                window.location.href = formPage
                    + '?code=' + encodeURIComponent(orderId)
                    + '&product=' + encodeURIComponent(currentProduct);
            });
            return;
        }

        // ── 유료 결제 ──
        var baseUrl = window.location.origin;
        var successUrl = baseUrl + '/payment-success.html'
            + '?formPage=' + encodeURIComponent(formPage)
            + '&product=' + encodeURIComponent(currentProduct)
            + '&coupon=' + encodeURIComponent(appliedCoupon || '')
            + '&productName=' + encodeURIComponent(p.name)
            + '&price=' + finalAmount;

        var failUrl = baseUrl + '/payment-fail.html';

        // 결제 수단별 파라미터 구성
        var requestParams;

        if (selectedMethod === 'CARD') {
            requestParams = {
                method: 'CARD',
                amount: { currency: 'KRW', value: finalAmount },
                orderId: orderId,
                orderName: p.name,
                successUrl: successUrl,
                failUrl: failUrl,
                card: {
                    useEscrow: false,
                    flowMode: 'DEFAULT',
                    useCardPoint: false,
                    useAppCardOnly: false
                }
            };
        } else if (selectedMethod === 'TRANSFER') {
            requestParams = {
                method: 'TRANSFER',
                amount: { currency: 'KRW', value: finalAmount },
                orderId: orderId,
                orderName: p.name,
                successUrl: successUrl,
                failUrl: failUrl
            };
        } else {
            // 간편결제: TOSSPAY, KAKAOPAY, NAVERPAY, SAMSUNGPAY
            var providerMap = {
                'TOSSPAY': '토스페이',
                'KAKAOPAY': '카카오페이',
                'NAVERPAY': '네이버페이',
                'SAMSUNGPAY': '삼성페이'
            };
            requestParams = {
                method: 'EASYPAY',
                amount: { currency: 'KRW', value: finalAmount },
                orderId: orderId,
                orderName: p.name,
                successUrl: successUrl,
                failUrl: failUrl,
                easyPay: {
                    provider: providerMap[selectedMethod] || '토스페이'
                }
            };
        }

        payment.requestPayment(requestParams)
            .catch(function(err) {
                if (err.code === 'USER_CANCEL') return;
                alert('결제 요청 중 오류가 발생했습니다: ' + (err.message || ''));
            });
    };


    /* ============================================
       12. 초기 실행
       ============================================ */
    refreshUI();

})();
</script>

</body>
</html>
