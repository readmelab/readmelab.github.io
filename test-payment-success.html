<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>테스트 결제 결과</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#07070c;color:#d4d0c8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.wrap{max-width:480px;width:100%}
.badge{text-align:center;font-size:.7rem;color:#4ade80;background:rgba(74,222,128,.08);padding:6px 14px;border-radius:8px;border:1px solid rgba(74,222,128,.2);margin-bottom:20px;display:inline-block}
.card{background:#111119;border:1px solid rgba(74,222,128,.2);border-radius:14px;padding:24px;margin-bottom:16px}
.card h2{font-size:1rem;margin-bottom:16px;text-align:center}
.card h2 .icon{font-size:1.8rem;display:block;margin-bottom:8px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem}
.row:last-child{border-bottom:none}
.row .label{color:#8a8780}
.row .value{color:#e8c97a;font-weight:500;text-align:right;max-width:60%;word-break:break-all}
.row .value.ok{color:#4ade80}
.result-box{text-align:center;padding:16px;border-radius:10px;font-size:.85rem;margin-bottom:16px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80;line-height:1.8}
.back-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#d4a853,#b8912a);color:#0a0a0f;font-size:.9rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;text-align:center;text-decoration:none;letter-spacing:1px}
.note{font-size:.7rem;color:#6a6455;text-align:center;line-height:1.8;margin-bottom:16px}
.checklist{background:#0a0a12;border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:14px;margin-bottom:16px;font-size:.75rem;line-height:2}
.checklist .ok{color:#4ade80}
.checklist .fail{color:#ef4444}
</style>
</head>
<body>
<div class="wrap">
  <div style="text-align:center"><span class="badge">✅ TEST MODE — 결제 흐름 검증 완료</span></div>

  <div class="card">
    <h2><span class="icon">✅</span>테스트 성공</h2>
    <div class="row"><span class="label">경로</span><span class="value" id="vRoute">—</span></div>
    <div class="row"><span class="label">주문번호</span><span class="value" id="vOrderId">—</span></div>
    <div class="row"><span class="label">상품</span><span class="value" id="vProduct">—</span></div>
    <div class="row"><span class="label">금액</span><span class="value" id="vAmount">—</span></div>
    <div class="row"><span class="label">쿠폰</span><span class="value" id="vCoupon">—</span></div>
    <div class="row"><span class="label">formPage</span><span class="value" id="vFormPage">—</span></div>
    <div class="row"><span class="label">paymentKey</span><span class="value ok" id="vPaymentKey" style="font-size:.65rem">—</span></div>
  </div>

  <div class="checklist" id="checklist"></div>

  <div class="result-box">
    토스 결제창 → 결제 성공 → 리다이렉트 → 파라미터 전달<br>
    전체 결제 흐름이 정상입니다
  </div>

  <div class="note">
    토스 승인 API는 서버에서만 호출 가능하므로 이 테스트에서는 생략됩니다.<br>
    실제 라이브 결제 시 payment-success.html → GAS/server.js에서 승인이 처리됩니다.
  </div>

  <a class="back-btn" href="/test-payment.html">← 테스트 콘솔로 돌아가기</a>
</div>

<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var route       = params.get('route') || '?';
  var paymentKey  = params.get('paymentKey') || '';
  var orderId     = params.get('orderId') || '';
  var amount      = params.get('amount') || '0';
  var product     = params.get('product') || '';
  var productName = params.get('productName') || '';
  var formPage    = params.get('formPage') || '';
  var coupon      = params.get('coupon') || '';

  var ROUTE_NAMES = {
    '1': '경로1 — 매력리포트 (f_charm)',
    '2': '경로2 — N1 매력리포트 할인',
    '3': '경로3 — 정가 구매',
    '5': '경로5 — W1 궁합 할인'
  };

  document.getElementById('vRoute').textContent = ROUTE_NAMES[route] || '경로 ' + route;
  document.getElementById('vOrderId').textContent = orderId || '없음';
  document.getElementById('vProduct').textContent = product + (productName ? ' / ' + productName : '');
  document.getElementById('vAmount').textContent = parseInt(amount).toLocaleString() + '원';
  document.getElementById('vCoupon').textContent = coupon || '없음';
  document.getElementById('vFormPage').textContent = formPage || '없음';
  document.getElementById('vPaymentKey').textContent = paymentKey ? '수신됨 (' + paymentKey.substring(0,20) + '...)' : '없음';

  /* 체크리스트 */
  var checks = [
    { name: '토스 결제창 표시', ok: true },
    { name: 'paymentKey 수신', ok: !!paymentKey },
    { name: 'orderId 수신', ok: !!orderId },
    { name: 'amount 수신', ok: !!amount && amount !== '0' },
    { name: 'product 파라미터', ok: !!product },
    { name: 'productName 파라미터', ok: !!productName },
    { name: 'formPage 파라미터', ok: !!formPage }
  ];

  if(coupon) checks.push({ name: 'coupon 파라미터', ok: true });

  var html = '';
  checks.forEach(function(c){
    html += '<div class="' + (c.ok ? 'ok' : 'fail') + '">' + (c.ok ? '✅' : '❌') + ' ' + c.name + '</div>';
  });
  document.getElementById('checklist').innerHTML = html;
})();
</script>
</body>
</html>
