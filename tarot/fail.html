<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>결제 실패 | 나를읽다 타로</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
    :root{--midnight:#1a1428;--midnight-2:#241b37;--midnight-3:#100c19;--gold:#c9a961;--gold-light:#ead79d;--gold-deep:#8d7134;--lavender:#8b7aa8;--ivory:#f4e8d0;--muted:#c9bdd9;--font-display:'Instrument Serif','Noto Serif KR',serif;--font-body:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--midnight);font-family:var(--font-body);color:var(--ivory)}.page{max-width:460px;margin:0 auto;min-height:100vh;background:radial-gradient(circle at 50% -10%,rgba(201,169,97,.2),transparent 36%),radial-gradient(circle at 0% 30%,rgba(139,122,168,.25),transparent 34%),linear-gradient(180deg,var(--midnight) 0%,var(--midnight-2) 58%,var(--midnight-3) 100%);position:relative;overflow:hidden}.page::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(244,232,208,.38) 0 1px,transparent 1.5px),radial-gradient(circle,rgba(201,169,97,.28) 0 1px,transparent 1.5px);background-size:54px 54px,91px 91px;background-position:9px 17px,35px 5px;opacity:.22}.aura{position:absolute;border-radius:999px;filter:blur(58px);opacity:.48}.aura1{width:230px;height:230px;background:#5b437f;top:70px;right:-100px}.aura2{width:230px;height:230px;background:#6e5527;bottom:90px;left:-110px}.display{font-family:var(--font-display)}.cta{background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 48%,var(--gold-deep) 100%);color:#1b1425;box-shadow:0 18px 35px rgba(201,169,97,.28)}.glass{background:linear-gradient(180deg,rgba(36,27,55,.78),rgba(20,15,31,.72));backdrop-filter:blur(20px);border:1px solid rgba(201,169,97,.24);box-shadow:0 24px 60px rgba(0,0,0,.32),inset 0 1px rgba(244,232,208,.06)}.muted{color:var(--muted)}
  </style>
</head>
<body>
  <main class="page px-7 py-12 flex items-center justify-center text-center">
    <div class="aura aura1"></div><div class="aura aura2"></div>
    <section class="relative z-10 glass rounded-[34px] p-8 w-full">
      <p class="text-[12px] tracking-[.16em] uppercase text-[#8b7aa8] mb-7">read me lab · tarot</p>
      <h1 class="display text-[54px] leading-none mb-5">결제가<br><em class="italic text-[#c9a961]">완료되지</em><br>않았어요</h1>
      <p id="msg" class="text-[15px] leading-8 muted mb-8">괜찮아요. 다시 시도해볼까요?</p>
      <a href="./love-mind.html" class="cta block rounded-full py-5 font-bold">다시 시도하기</a>
      <a href="./love-mind.html" class="block mt-5 text-[13px] text-[#8b7aa8]">처음으로 돌아가기</a>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const m = params.get('message');
    if(m) document.getElementById('msg').textContent = m;
  </script>
</body>
</html>
