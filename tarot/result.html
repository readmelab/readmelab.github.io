<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>타로 결과 | 나를읽다</title>
  <meta property="og:title" content="나를읽다 타로 결과" />
  <meta property="og:description" content="그 사람의 마음을 카드로 열어봤어요." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
    :root{--midnight:#1a1428;--midnight-2:#241b37;--midnight-3:#100c19;--gold:#c9a961;--gold-light:#ead79d;--gold-deep:#8d7134;--lavender:#8b7aa8;--ivory:#f4e8d0;--muted:#c9bdd9;--danger:#e0a5a5;--font-display:'Instrument Serif','Noto Serif KR',serif;--font-serif:'Noto Serif KR',serif;--font-body:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--midnight);color:var(--ivory);font-family:var(--font-body)}body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");opacity:.06;pointer-events:none;z-index:50;mix-blend-mode:screen}.page{max-width:460px;margin:0 auto;min-height:100vh;overflow:hidden;background:radial-gradient(circle at 50% -10%,rgba(201,169,97,.2),transparent 36%),radial-gradient(circle at 0% 28%,rgba(139,122,168,.25),transparent 35%),linear-gradient(180deg,var(--midnight) 0%,var(--midnight-2) 60%,var(--midnight-3) 100%);position:relative;box-shadow:0 0 80px rgba(0,0,0,.32)}.page::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(244,232,208,.38) 0 1px,transparent 1.5px),radial-gradient(circle,rgba(201,169,97,.28) 0 1px,transparent 1.5px);background-size:54px 54px,91px 91px;background-position:9px 17px,35px 5px;opacity:.22}.aura{position:absolute;border-radius:999px;filter:blur(58px);opacity:.48;animation:float 15s ease-in-out infinite}.aura1{width:220px;height:220px;background:#5b437f;top:60px;right:-100px}.aura2{width:230px;height:230px;background:#6e5527;top:430px;left:-115px;animation-delay:-5s}@keyframes float{50%{transform:translate(18px,-20px) scale(1.08)}}.display{font-family:var(--font-display)}.serif{font-family:var(--font-serif)}.glass{background:linear-gradient(180deg,rgba(36,27,55,.78),rgba(20,15,31,.72));backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid rgba(201,169,97,.24);box-shadow:0 24px 60px rgba(0,0,0,.32),inset 0 1px rgba(244,232,208,.06)}.small-caps{letter-spacing:.14em;text-transform:uppercase;font-size:11px;color:var(--lavender)}.cta{background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 48%,var(--gold-deep) 100%);color:#1b1425;box-shadow:0 18px 35px rgba(201,169,97,.28);transition:.25s}.cta:active{transform:scale(.97)}.card-img{width:178px;height:296px;object-fit:cover;border-radius:20px;box-shadow:0 32px 62px rgba(0,0,0,.45);border:1px solid rgba(201,169,97,.38)}.section-card{min-height:180px}.section-card:nth-child(1){transform:rotate(-.8deg)}.section-card:nth-child(2){transform:rotate(.7deg)}.section-card:nth-child(3){transform:rotate(.5deg)}.section-card:nth-child(4){transform:rotate(-.6deg)}.reveal{opacity:0;transform:translateY(28px);transition:opacity .8s ease,transform .8s ease}.reveal.revealed{opacity:1;transform:translateY(0)}.dot{width:12px;height:12px;border-radius:50%;background:var(--gold);opacity:.25;animation:pulse 1.2s infinite}.dot:nth-child(2){animation-delay:.22s}.dot:nth-child(3){animation-delay:.44s}@keyframes pulse{50%{opacity:1;transform:scale(1.25)}}.loading-copy{min-height:56px}.bento{display:grid;grid-template-columns:1fr;gap:16px}.share-btn{background:rgba(244,232,208,.08);border:1px solid rgba(201,169,97,.2);color:var(--ivory)}.addon-btn{width:100%;text-align:left;border-radius:22px;padding:20px;background:rgba(26,20,40,.62);border:1px solid rgba(201,169,97,.2);transition:.2s;cursor:pointer;font-family:var(--font-body);color:var(--ivory)}.addon-btn:hover{background:rgba(201,169,97,.1);transform:translateY(-1px)}.addon-btn:active{transform:scale(.98)}.addon-btn b{display:block;font-size:15px;color:var(--ivory);margin-bottom:4px}.addon-btn span{display:block;font-size:13px;color:var(--muted)}.muted{color:var(--muted)}.body-text{color:var(--muted);white-space:pre-line}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(16px);width:min(400px,calc(100vw - 32px));background:rgba(16,12,25,.95);border:1px solid rgba(201,169,97,.3);border-radius:999px;color:var(--ivory);padding:14px 18px;text-align:center;font-size:13px;z-index:80;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <main class="page pb-12">
    <div class="aura aura1"></div><div class="aura aura2"></div>
    <section id="loading" class="relative z-10 min-h-screen px-7 py-16 flex flex-col justify-center items-center text-center">
      <div class="relative mb-9">
        <div class="flex gap-3"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      </div>
      <h1 class="display text-[48px] leading-none mb-5">카드를<br><em class="italic text-[#c9a961]">읽고 있어요</em></h1>
      <p id="loadingCopy" class="loading-copy text-[15px] leading-8 muted">카드가 말하는 흐름을 조심스럽게 정리하고 있어요.</p>
      <p class="mt-8 text-[13px] text-[#8b7aa8]">최대 1분 정도 걸릴 수 있어요.</p>
    </section>

    <section id="resultView" class="relative z-10 hidden px-6 pt-12">
      <p class="small-caps mb-8">read me lab · result</p>
      <div class="text-center mb-12 reveal">
        <p class="text-[13px] text-[#8b7aa8] mb-4">당신이 뽑은 카드</p>
        <img id="mainCardImg" class="card-img mx-auto" alt="선택한 카드" loading="lazy" />
        <h1 id="mainCardName" class="display italic text-[44px] leading-none mt-7"></h1>
        <p class="text-[14px] muted mt-2">이 카드가 지금 관계의 첫 문을 열었어요</p>
      </div>
      <div id="freeBox" class="glass rounded-[30px] p-6 mb-6 reveal">
        <p class="small-caps mb-3">first card</p>
        <p id="freeResult" class="text-[15px] leading-8 body-text"></p>
      </div>
      <div id="sections" class="bento mb-9"></div>
      <div class="glass rounded-[30px] p-6 mb-7 reveal">
        <p class="small-caps mb-3">deeper?</p>
        <h2 class="serif text-[30px] leading-tight">더 깊이<br>들어가볼까요?</h2>
        <div id="addon-container" class="mt-5 space-y-3"></div>
      </div>
      <div class="glass rounded-[30px] p-6 reveal">
        <h2 class="serif text-[29px] leading-tight mb-4">이 결과,<br>보관하시겠어요?</h2>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="copyLink()" class="share-btn rounded-full py-4 text-sm font-semibold">링크 복사</button>
          <button onclick="shareKakaoLike()" class="share-btn rounded-full py-4 text-sm font-semibold">카톡 공유</button>
        </div>
        <button onclick="gift()" class="cta w-full rounded-full py-4 text-sm font-bold mt-3">친구에게 타로 선물하기</button>
        <p id="shareMsg" class="text-center text-[12px] text-[#8b7aa8] mt-3"></p>
      </div>
    </section>

    <section id="errorView" class="hidden relative z-10 min-h-screen px-7 py-16 flex flex-col justify-center text-center">
      <h1 class="display text-[52px] leading-none mb-5">잠시<br><em class="italic text-[#c9a961]">멈췄어요</em></h1>
      <p id="errorMsg" class="text-[15px] leading-8 muted">결과를 불러오지 못했어요.</p>
      <a href="./love-mind.html" class="cta rounded-full py-5 mt-8 font-bold">처음으로 돌아가기</a>
    </section>
  </main>
  <div id="toast" class="toast"></div>

  <script>
    const API_BASE='https://tarot-server-1075269376260.asia-northeast3.run.app';
    const TOPIC_SLUG='love-mind';
    const CARD_BACK_URL='https://audio.readmelab.co.kr/tarot/back/default.webp';
    const url = new URL(location.href);
    const token = url.searchParams.get('token');
    const paymentKey = url.searchParams.get('paymentKey');
    const orderId = url.searchParams.get('orderId');
    const amount = url.searchParams.get('amount');
    const copies=['카드가 말하는 흐름을 조심스럽게 정리하고 있어요.','지금 가장 중요한 감정의 결을 찾고 있어요.','당신이 놓치지 말아야 할 신호를 고르고 있어요.','조금만 더... 문장이 정리되고 있어요.','결과가 열리면 네 개의 흐름으로 보여드릴게요.'];
    let copyIndex=0; setInterval(()=>{copyIndex=(copyIndex+1)%copies.length; const el=document.getElementById('loadingCopy'); if(!el || document.getElementById('loading').classList.contains('hidden')) return; gsap.to(el,{opacity:0,y:-6,duration:.25,onComplete:()=>{el.textContent=copies[copyIndex]; gsap.to(el,{opacity:1,y:0,duration:.35});}})},2600);
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('revealed')}),{threshold:.12});

    boot();
    async function boot(){
      if(!token){ return showError('결과 토큰이 없어요. 링크를 다시 확인해 주세요.'); }
      try{
        if(paymentKey && orderId && amount){
          const res=await fetch(`${API_BASE}/api/tarot/payment/confirm`,{method:'POST',headers:{'Content-Type':'application/json; charset=utf-8'},body:JSON.stringify({paymentKey, orderId, amount:Number(amount)})});
          const data=await res.json(); if(!res.ok || data.success === false) throw new Error(data.detail || data.error || '결제 승인에 실패했어요.');
          history.replaceState(null,'',`./result.html?token=${token}`);
        }
        await pollResult(token);
      }catch(e){ showError(e.message); }
    }
    async function pollResult(t){
      for(let i=0;i<60;i++){
        const res=await fetch(`${API_BASE}/api/tarot/result/${t}`); const data=await res.json();
        if(!res.ok || data.success === false) throw new Error(data.error || '결과를 불러오지 못했어요.');
        if(data.mode==='full'){ return renderResult(data); }
        if(data.mode==='failed'||data.mode==='timeout'){ return showError(data.generation_error || '해석 생성이 지연되고 있어요. 잠시 후 다시 확인해 주세요.'); }
        await new Promise(r=>setTimeout(r,2000));
      }
      showError('결과를 불러오지 못했어요. 잠시 후 다시 시도해주세요.');
    }
    async function decodeImage(img){ try{ if(img.decode) await img.decode(); }catch(e){} }
    async function renderResult(data){
      document.getElementById('loading').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden');
      const selected = data.selected_card || (data.selected_cards||[]).find(c=>String(c.id)===String(data.selected_card_id)) || (data.selected_cards||[])[0] || (data.cards||[])[0] || {};
      const img=document.getElementById('mainCardImg'); img.src=selected.image_url || CARD_BACK_URL; img.onerror=()=>{img.onerror=null; img.src=CARD_BACK_URL}; await decodeImage(img);
      document.getElementById('mainCardName').textContent=selected.name_ko || '선택한 카드';
      document.getElementById('freeResult').textContent=data.free_result || '';
      const wrap=document.getElementById('sections'); wrap.innerHTML='';
      (data.sections||[]).forEach((s,idx)=>{
        const div=document.createElement('article'); div.className='section-card glass rounded-[28px] p-6 reveal';
        const num = String(idx+1).padStart(2,'0');
        div.innerHTML=`<p class="small-caps mb-3">${num}</p><h3 class="serif text-[28px] leading-tight mb-4">${escapeHtml(s.title)}</h3><p class="text-[15px] leading-8 body-text">${escapeHtml(s.body)}</p>`;
        wrap.appendChild(div);
      });
      renderAddons(data.topic_slug || TOPIC_SLUG);
      document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
      gsap.from('#mainCardImg',{y:24,opacity:0,scale:.94,duration:.8,ease:'power3.out'});
    }
    async function renderAddons(topicSlug){
      const container = document.getElementById('addon-container'); if(!container) return;
      container.innerHTML = '<p class="text-[13px] text-[#8b7aa8] text-center py-3">추가 리딩을 불러오는 중이에요...</p>';
      try {
        const res = await fetch(`${API_BASE}/api/tarot/topic/${topicSlug}`); const data = await res.json();
        if(!res.ok || data.success === false) throw new Error(data.error || '상품 정보를 불러오지 못했어요.');
        const topic = data.topic || data;
        const products = Array.isArray(data.products) ? data.products : (Array.isArray(topic.products) ? topic.products : []);
        const addons = products.filter(p => p.type === 'addon');
        container.innerHTML = '';
        if(addons.length === 0){ container.innerHTML = '<p class="text-[13px] text-[#8b7aa8] text-center py-3">추가 리딩은 곧 열릴 예정이에요.</p>'; return; }
        addons.forEach(p => {
          const btn = document.createElement('button'); btn.className = 'addon-btn';
          const price = (p.price != null) ? Number(p.price).toLocaleString('ko-KR') : '';
          btn.innerHTML = `<b>${escapeHtml(p.title || '추가 리딩')}</b><span>${price ? '+' + escapeHtml(price) + '원 · ' : ''}곧 연결 예정</span>`;
          btn.onclick = () => showToast('애드온 결제는 곧 열릴 예정이에요.');
          container.appendChild(btn);
        });
      } catch(e){ console.warn('addon render failed', e); container.innerHTML = '<p class="text-[13px] text-[#8b7aa8] text-center py-3">추가 리딩을 불러오지 못했어요.</p>'; }
    }
    function showError(msg){ document.getElementById('loading').classList.add('hidden'); document.getElementById('resultView').classList.add('hidden'); document.getElementById('errorView').classList.remove('hidden'); document.getElementById('errorMsg').textContent=msg; }
    function escapeHtml(str){return String(str||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
    async function copyLink(){try{await navigator.clipboard.writeText(location.href); msg('링크를 복사했어요. 30일 동안 다시 볼 수 있어요.')}catch(e){msg('복사에 실패했어요. 주소창의 링크를 직접 복사해 주세요.')}}
    async function shareKakaoLike(){ if(navigator.share){try{await navigator.share({title:'나를읽다 타로 결과',text:'내 타로 결과를 저장해뒀어요.',url:location.href}); msg('공유 창을 열었어요.')}catch(e){}} else { copyLink(); }}
    function gift(){ location.href='./love-mind.html?gift=1'; }
    function msg(t){document.getElementById('shareMsg').textContent=t;}
    function showToast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show'); clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>el.classList.remove('show'),1800); }
  </script>
</body>
</html>
