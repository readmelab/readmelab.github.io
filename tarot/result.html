<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>타로 결과 | 나를읽다</title>
  <meta property="og:title" content="나를읽다 타로 결과" />
  <meta property="og:description" content="그 사람의 속마음을 카드로 열어봤어요." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+KR:wght@400;500;700&family=Pretendard:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
    :root{--bg-cream:#FAF5F0;--bg-blush:#F5E6E0;--rose-soft:#E8B4B8;--rose-deep:#C8707C;--lavender-soft:#CDB8E0;--lavender-deep:#8B7AA8;--gold-warm:#D4A574;--gold-foil:#B89968;--ink-black:#2D1B1E;--ink-muted:#6B5B5E;--ink-whisper:#A89A9C;--gradient-foil:linear-gradient(120deg,#D4A574 0%,#F0D9A8 50%,#B89968 100%);--font-display:'Instrument Serif','Cormorant Garamond','Noto Serif KR',serif;--font-body:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--bg-cream);color:var(--ink-black);font-family:var(--font-body)}body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E");opacity:.055;pointer-events:none;z-index:50;mix-blend-mode:multiply}.page{max-width:440px;margin:0 auto;min-height:100vh;overflow:hidden;background:linear-gradient(180deg,#FAF5F0 0%,#F5E6E0 60%,#FAF5F0 100%);position:relative}.blob{position:absolute;border-radius:999px;filter:blur(50px);opacity:.42;animation:float 14s ease-in-out infinite}.blob1{width:210px;height:210px;background:#E8B4B8;top:60px;right:-90px}.blob2{width:230px;height:230px;background:#CDB8E0;top:420px;left:-110px}@keyframes float{50%{transform:translate(18px,-20px) scale(1.08)}}.serif{font-family:'Cormorant Garamond','Noto Serif KR',serif}.display{font-family:var(--font-display)}.glass{background:rgba(255,255,255,.6);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,.45);box-shadow:0 24px 55px rgba(200,112,124,.13)}.small-caps{letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:var(--ink-whisper)}.cta{background:var(--gradient-foil);color:#3b2426;box-shadow:0 18px 35px rgba(184,153,104,.32);transition:.25s}.cta:active{transform:scale(.97)}.card-img{width:178px;height:296px;object-fit:cover;border-radius:20px;box-shadow:0 32px 62px rgba(45,27,30,.22);border:1px solid rgba(255,255,255,.7)}.section-card{min-height:180px}.section-card:nth-child(1){transform:rotate(-.8deg)}.section-card:nth-child(2){transform:rotate(.7deg)}.section-card:nth-child(3){transform:rotate(.5deg)}.section-card:nth-child(4){transform:rotate(-.6deg)}.reveal{opacity:0;transform:translateY(28px);transition:opacity .8s ease,transform .8s ease}.reveal.revealed{opacity:1;transform:translateY(0)}.dot{width:12px;height:12px;border-radius:50%;background:#D4A574;opacity:.25;animation:pulse 1.2s infinite}.dot:nth-child(2){animation-delay:.22s}.dot:nth-child(3){animation-delay:.44s}@keyframes pulse{50%{opacity:1;transform:scale(1.25)}}.loading-copy{min-height:56px}.bento{display:grid;grid-template-columns:1fr;gap:16px}.share-btn{background:rgba(255,255,255,.66);border:1px solid rgba(255,255,255,.65)}.addon-btn{width:100%;text-align:left;border-radius:22px;padding:20px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.7);transition:.2s;cursor:pointer;font-family:var(--font-body)}.addon-btn:hover{background:rgba(255,255,255,.8);transform:translateY(-1px)}.addon-btn:active{transform:scale(.98)}.addon-btn b{display:block;font-size:15px;color:var(--ink-black);margin-bottom:4px}.addon-btn span{display:block;font-size:13px;color:#8b7f82}
  </style>
</head>
<body>
  <main class="page pb-12">
    <div class="blob blob1"></div><div class="blob blob2"></div>
    <section id="loading" class="relative z-10 min-h-screen px-7 py-16 flex flex-col justify-center items-center text-center">
      <div class="flex gap-3 mb-8"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <h1 class="display text-[48px] leading-none mb-5">카드를<br><em class="italic text-[#C8707C]">읽고 있어요</em></h1>
      <p id="loadingCopy" class="loading-copy text-[15px] leading-8 text-[#6B5B5E]">그 사람의 마음을 한 겹 한 겹 벗겨내는 중이에요.</p>
      <p class="mt-8 text-[13px] text-[#A89A9C]">조금만 더 기다려주세요...</p>
    </section>

    <section id="resultView" class="relative z-10 hidden px-6 pt-12">
      <p class="small-caps mb-8">read me lab · result</p>
      <div class="text-center mb-12 reveal">
        <p class="text-[13px] text-[#A89A9C] mb-4">당신이 뽑은 카드</p>
        <img id="mainCardImg" class="card-img mx-auto" alt="선택한 카드" loading="lazy" />
        <h1 id="mainCardName" class="display italic text-[44px] leading-none mt-7"></h1>
        <p class="text-[14px] text-[#8b7f82] mt-2">이 카드가 지금 관계의 첫 문을 열었어요</p>
      </div>
      <div id="freeBox" class="glass rounded-[30px] p-6 mb-6 reveal">
        <p class="small-caps mb-3">first card</p>
        <p id="freeResult" class="text-[15px] leading-8 text-[#6B5B5E]"></p>
      </div>
      <div id="sections" class="bento mb-9"></div>
      <div class="glass rounded-[30px] p-6 mb-7 reveal">
        <p class="small-caps mb-3">deeper?</p>
        <h2 class="serif text-[31px] leading-tight">더 깊이<br>들어가볼까요?</h2>
        <div id="addon-container" class="mt-5 space-y-3"></div>
      </div>
      <div class="glass rounded-[30px] p-6 reveal">
        <h2 class="serif text-[30px] leading-tight mb-4">이 결과,<br>보관하시겠어요?</h2>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="copyLink()" class="share-btn rounded-full py-4 text-sm font-semibold">링크 복사</button>
          <button onclick="shareKakaoLike()" class="share-btn rounded-full py-4 text-sm font-semibold">카톡 저장/공유</button>
        </div>
        <button onclick="gift()" class="cta w-full rounded-full py-4 text-sm font-bold mt-3">친구에게 타로 선물하기</button>
        <p id="shareMsg" class="text-center text-[12px] text-[#A89A9C] mt-3"></p>
      </div>
    </section>

    <section id="errorView" class="hidden relative z-10 min-h-screen px-7 py-16 flex flex-col justify-center text-center">
      <h1 class="display text-[52px] leading-none mb-5">잠시<br><em class="italic text-[#C8707C]">멈췄어요</em></h1>
      <p id="errorMsg" class="text-[15px] leading-8 text-[#6B5B5E]">결과를 불러오지 못했어요.</p>
      <a href="./love-mind.html" class="cta rounded-full py-5 mt-8 font-bold">처음으로 돌아가기</a>
    </section>
  </main>

  <script>
    const API_BASE='https://tarot-server-1075269376260.asia-northeast3.run.app';
    const TOPIC_SLUG='love-mind';
    const token = new URL(location.href).searchParams.get('token');
    const paymentKey = new URL(location.href).searchParams.get('paymentKey');
    const orderId = new URL(location.href).searchParams.get('orderId');
    const amount = new URL(location.href).searchParams.get('amount');
    const copies=['그 사람의 마음을 한 겹 한 겹 벗겨내는 중이에요.','카드가 말하는 흐름을 조심스럽게 정리하고 있어요.','지금 가장 중요한 감정의 결을 찾고 있어요.','조금만 더... 거의 다 열렸어요.','당신이 놓치지 말아야 할 신호를 고르고 있어요.'];
    let copyIndex=0; setInterval(()=>{copyIndex=(copyIndex+1)%copies.length; const el=document.getElementById('loadingCopy'); gsap.to(el,{opacity:0,y:-6,duration:.25,onComplete:()=>{el.textContent=copies[copyIndex]; gsap.to(el,{opacity:1,y:0,duration:.35});}})},2600);
    const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('revealed')}),{threshold:.12});

    boot();
    async function boot(){
      if(!token){ return showError('결과 토큰이 없어요. 링크를 다시 확인해 주세요.'); }
      try{
        if(paymentKey && orderId && amount){
          const res=await fetch(`${API_BASE}/api/tarot/payment/confirm`,{method:'POST',headers:{'Content-Type':'application/json; charset=utf-8'},body:JSON.stringify({paymentKey, orderId, amount:Number(amount)})});
          const data=await res.json(); if(!data.success) throw new Error(data.detail || data.error || '결제 승인에 실패했어요.');
          history.replaceState(null,'',`./result.html?token=${token}`);
        }
        await pollResult(token);
      }catch(e){ showError(e.message); }
    }
    async function pollResult(t){
      for(let i=0;i<60;i++){
        const res=await fetch(`${API_BASE}/api/tarot/result/${t}`); const data=await res.json();
        if(!data.success) throw new Error(data.error || '결과를 불러오지 못했어요.');
        if(data.mode==='full'){ return renderResult(data); }
        if(data.mode==='failed'||data.mode==='timeout'){ return showError(data.generation_error || '해석 생성이 지연되고 있어요. 잠시 후 다시 확인해 주세요.'); }
        await new Promise(r=>setTimeout(r,2000));
      }
      showError('결과 생성이 조금 지연되고 있어요. 잠시 후 이 링크로 다시 들어와 주세요.');
    }
    function renderResult(data){
      document.getElementById('loading').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden');
      const selected = (data.selected_cards||[]).find(c=>String(c.id)===String(data.selected_card_id)) || (data.selected_cards||[])[0] || {};
      const img=document.getElementById('mainCardImg'); img.src=selected.image_url || 'https://audio.readmelab.co.kr/tarot/placeholder/back.webp'; img.onerror=()=>{img.src='https://audio.readmelab.co.kr/tarot/placeholder/back.webp'};
      document.getElementById('mainCardName').textContent=selected.name_ko || '선택한 카드';
      document.getElementById('freeResult').textContent=data.free_result || '';
      const wrap=document.getElementById('sections'); wrap.innerHTML='';
      (data.sections||[]).forEach((s,idx)=>{
        const div=document.createElement('article'); div.className='section-card glass rounded-[28px] p-6 reveal';
        const num = String(idx+1).padStart(2,'0');
        div.innerHTML=`<p class="small-caps mb-3">${num}</p><h3 class="serif text-[29px] leading-tight mb-4">${escapeHtml(s.title)}</h3><p class="text-[15px] leading-8 text-[#6B5B5E]">${escapeHtml(s.body)}</p>`;
        wrap.appendChild(div);
      });
      renderAddons(data.topic_slug || TOPIC_SLUG);
      document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
      gsap.from('#mainCardImg',{y:24,opacity:0,scale:.94,duration:.8,ease:'power3.out'});
    }

    async function renderAddons(topicSlug){
      const container = document.getElementById('addon-container');
      if(!container) return;
      try {
        const res = await fetch(`${API_BASE}/api/tarot/topic/${topicSlug}`);
        const data = await res.json();
        const products = (data && (data.products || (data.topic && data.topic.products))) || [];
        const addons = products.filter(p => p.type === 'addon');
        container.innerHTML = '';
        if(addons.length === 0){
          container.innerHTML = '<p class="text-[13px] text-[#A89A9C] text-center py-3">추가 리딩은 곧 열릴 예정이에요.</p>';
          return;
        }
        addons.forEach(p => {
          const btn = document.createElement('button');
          btn.className = 'addon-btn';
          const price = (p.price != null) ? p.price.toLocaleString('ko-KR') : '';
          btn.innerHTML = `<b>${escapeHtml(p.title || '추가 리딩')}</b><span>+${escapeHtml(price)}원 · 곧 연결 예정</span>`;
          btn.onclick = () => { alert('애드온 결제는 곧 열릴 예정이에요.'); };
          container.appendChild(btn);
        });
      } catch(e){
        console.warn('addon render failed', e);
        container.innerHTML = '<p class="text-[13px] text-[#A89A9C] text-center py-3">추가 리딩을 불러오지 못했어요.</p>';
      }
    }

    function showError(msg){ document.getElementById('loading').classList.add('hidden'); document.getElementById('resultView').classList.add('hidden'); document.getElementById('errorView').classList.remove('hidden'); document.getElementById('errorMsg').textContent=msg; }
    function escapeHtml(str){return String(str||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
    async function copyLink(){try{await navigator.clipboard.writeText(location.href); msg('링크를 복사했어요. 30일 동안 다시 볼 수 있어요.')}catch(e){msg('복사에 실패했어요. 주소창의 링크를 직접 복사해 주세요.')}}
    async function shareKakaoLike(){ if(navigator.share){try{await navigator.share({title:'나를읽다 타로 결과',text:'내 타로 결과를 저장해뒀어요.',url:location.href}); msg('공유 창을 열었어요.')}catch(e){}} else { copyLink(); }}
    function gift(){ location.href='./love-mind.html?gift=1'; }
    function msg(t){document.getElementById('shareMsg').textContent=t;}
  </script>
</body>
</html>
